<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lo raro</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
font-family:Courier New;
image-rendering:pixelated;
height:100vh;

background:
linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.9)),
url("fondiris.jpg") center center / cover no-repeat;
}

/* FILTRO PIXEL */
/* VIÑETA PULSANTE */

body::before{

content:"";

position:fixed;
inset:0;

pointer-events:none;

background:
radial-gradient(
circle,
transparent 30%,
rgba(0,0,0,0.25) 55%,
rgba(0,0,0,0.75) 100%
);

animation:vignettePulse 3s ease-in-out infinite;

mix-blend-mode:multiply;

z-index:998;

}

@keyframes vignettePulse{

0%{
opacity:.7;
transform:scale(1);
}

50%{
opacity:1;
transform:scale(1.04);
}

100%{
opacity:.7;
transform:scale(1);
}

}

/* VHS SUPER MARCADO */

.glitchOverlay{

background:

repeating-linear-gradient(
90deg,

rgba(255,0,120,.09) 0px,
rgba(255,0,120,.09) 2px,

rgba(0,255,255,.09) 3px,
rgba(0,255,255,.09) 4px,

transparent 6px,
transparent 10px

),

repeating-linear-gradient(

0deg,

rgba(255,255,255,.04) 0px,
rgba(255,255,255,.04) 2px,

transparent 4px,
transparent 6px

);

background-size:
100% 100%,
100% 5px;

animation:

glitchFlicker .22s infinite,
vhsShake .15s infinite;

opacity:.95;

filter:
contrast(1.3)
saturate(1.4);

}

/* BARRIDO VHS */

body{

animation:vhsWarp 6s linear infinite;

}

@keyframes vhsWarp{

0%{
filter:
contrast(1)
brightness(1)
hue-rotate(0deg);
}

25%{
filter:
contrast(1.15)
brightness(.95)
hue-rotate(2deg);
}

50%{
filter:
contrast(1.3)
brightness(1.04)
hue-rotate(-2deg);
}

100%{
filter:
contrast(1)
brightness(1)
hue-rotate(0deg);
}

}

@keyframes vhsShake{

0%{
transform:
translateX(0px);
}

25%{
transform:
translateX(-2px);
}

50%{
transform:
translateX(3px);
}

75%{
transform:
translateX(-1px);
}

100%{
transform:
translateX(0px);
}

}

/* BOTON VOLVER */

.backButton{

position:fixed;

top:18px;
right:18px;

z-index:999999;

padding:14px 24px;

font-size:18px;

font-family:Courier New;

color:#ddd;

cursor:pointer;

background:
linear-gradient(
to bottom,
#444,
#111
);

border:

4px solid #777;

box-shadow:

0 0 20px rgba(255,255,255,.08),
0 0 40px rgba(0,0,0,.8),
inset 0 0 10px rgba(255,255,255,.08);

text-shadow:

2px 2px black;

animation:

buttonFloat 2s ease-in-out infinite,
glitchFlicker .4s infinite;

transition:.2s;

}

.backButton:hover{

transform:
scale(1.08)
rotate(-2deg);

filter:
brightness(1.3);

}

.backButton:active{

transform:
scale(.95);

}
body::after{

content:"";
position:fixed;
inset:0;

background:
repeating-linear-gradient(
0deg,
rgba(255,255,255,0.02) 0px,
rgba(255,255,255,0.02) 1px,
transparent 8px,
transparent 9px
);

pointer-events:none;
mix-blend-mode:overlay;
z-index:999;

}

/* GLITCH FANTASMAL */

.glitchOverlay{
position:fixed;
inset:0;
pointer-events:none;
z-index:50;

background:
repeating-linear-gradient(
90deg,
rgba(255,0,255,0.04) 0px,
rgba(0,255,255,0.03) 2px,
transparent 6px,
transparent 10px
);

mix-blend-mode:screen;
animation:glitchFlicker 2.8s infinite;
opacity:0.6;
}

@keyframes glitchFlicker{
0%{transform:translate(0,0); opacity:0.4;}
20%{transform:translate(-2px,1px); opacity:0.6;}
40%{transform:translate(2px,-1px); opacity:0.3;}
60%{transform:translate(-1px,2px); opacity:0.7;}
80%{transform:translate(1px,-2px); opacity:0.5;}
100%{transform:translate(0,0); opacity:0.4;}
}

/* ATMOSFERA */

.particles{

position:fixed;
width:100%;
height:100%;
pointer-events:none;
z-index:1;

background:
radial-gradient(circle at 20% 30%,rgba(255,255,255,0.03),transparent 1%),
radial-gradient(circle at 70% 40%,rgba(255,255,255,0.03),transparent 1%),
radial-gradient(circle at 50% 80%,rgba(255,255,255,0.03),transparent 1%);

animation:fog 10s linear infinite;

}

@keyframes fog{

0%{transform:translateX(0px);}
50%{transform:translateX(20px);}
100%{transform:translateX(0px);}

}

/* GIF */

.topGif{

position:absolute;
top:2%;
left:50%;

transform:translateX(-50%);

width:520px;

filter:
grayscale(0.5)
brightness(0.7)
contrast(1.2);

image-rendering:pixelated;

animation:floatGif 5s ease-in-out infinite;

z-index:2;

}

@keyframes floatGif{

0%{transform:translateX(-50%) translateY(0px);}
50%{transform:translateX(-50%) translateY(-12px);}
100%{transform:translateX(-50%) translateY(0px);}

}

/* ESCENA (BAJADA LIGERA) */

.scene{

position:absolute;
bottom:-35%;
left:50%;

transform:
translateX(-50%)
perspective(2500px)
rotateX(58deg);

width:1300px;
height:850px;

display:flex;
justify-content:center;
align-items:center;

z-index:10;

}

/* GLOW */

.bookGlow{

position:absolute;

width:1200px;
height:700px;

background:
radial-gradient(circle,
rgba(180,180,180,0.14) 0%,
rgba(120,120,120,0.08) 30%,
transparent 70%);

filter:blur(50px);

animation:glowPulse 4s ease-in-out infinite;

}

@keyframes glowPulse{

0%{opacity:0.5;transform:scale(1);}
50%{opacity:1;transform:scale(1.04);}
100%{opacity:0.5;transform:scale(1);}

}

/* LIBRO */

.book{

position:relative;

width:950px;
height:560px;

transform-style:preserve-3d;

animation:bookFloat 6s ease-in-out infinite;

}

@keyframes bookFloat{

0%{transform:translateY(0px) rotateZ(-1deg);}
50%{transform:translateY(-10px) rotateZ(1deg);}
100%{transform:translateY(0px) rotateZ(-1deg);}

}

/* SOMBRA */

.shadow{

position:absolute;

width:140%;
height:140%;

background:rgba(0,0,0,0.75);

border-radius:50%;

filter:blur(90px);

top:18%;
left:-20%;

transform:translateZ(-300px);

animation:shadowPulse 6s ease-in-out infinite;

}

@keyframes shadowPulse{

0%{transform:scale(1);opacity:0.7;}
50%{transform:scale(1.08);opacity:1;}
100%{transform:scale(1);opacity:0.7;}

}

/* GROSOR */

.pageStack1,.pageStack2,.pageStack3,.pageStack4,
.pageStack5,.pageStack6,.pageStack7,.pageStack8,
.pageStack9,.pageStack10,.pageStack11,.pageStack12{

position:absolute;

width:100%;
height:100%;

border:4px solid #2d2d2d;

background:#8e8e8e;

}

.pageStack1{top:30px;left:30px;}
.pageStack2{top:27px;left:27px;}
.pageStack3{top:24px;left:24px;}
.pageStack4{top:21px;left:21px;}
.pageStack5{top:18px;left:18px;}
.pageStack6{top:15px;left:15px;}
.pageStack7{top:12px;left:12px;}
.pageStack8{top:9px;left:9px;}
.pageStack9{top:7px;left:7px;}
.pageStack10{top:5px;left:5px;}
.pageStack11{top:3px;left:3px;}
.pageStack12{top:1px;left:1px;}

/* PORTADA */

.cover{

position:absolute;

width:100%;
height:100%;

background:
linear-gradient(to right,#2d2d2d,#161616);

border:8px solid #0a0a0a;

display:flex;

overflow:hidden;

box-shadow:
0 0 40px rgba(0,0,0,0.8),
0 0 120px rgba(255,255,255,0.08),
inset 0 0 20px rgba(255,255,255,0.04);

}

/* PAGINAS */

.leftPage{

width:50%;
height:100%;

background:
linear-gradient(to right,#a3a3a3,#c7c7c7);

position:relative;

display:flex;
justify-content:center;
align-items:center;

overflow:hidden;

}

.rightPage{

width:50%;
height:100%;

background:
linear-gradient(to left,#a3a3a3,#cfcfcf);

padding:45px;

color:#222;

font-size:21px;

line-height:1.8;

position:relative;

overflow:hidden;

}

/* CENTRO */

.centerShadow{

position:absolute;
top:0;
width:40px;
height:100%;

background:rgba(0,0,0,0.18);

filter:blur(14px);

}

.leftShadow{right:-15px;}
.rightShadow{left:-15px;}

/* IMAGEN */

.pageImage{

width:80%;

border:6px solid #3b3b3b;

cursor:pointer;

transition:0.4s;

filter:
grayscale(0.25)
contrast(1.1);

box-shadow:0 0 20px rgba(0,0,0,0.5);

}

.pageImage:hover{transform:scale(1.04);}

/* PAGINA VOLTEANDO */

.flipPage{

position:absolute;

right:0;
top:0;

width:50%;
height:100%;

background:
linear-gradient(to left,#a4a4a4,#dddddd);

transform-origin:left center;

transform-style:preserve-3d;

display:none;

z-index:100;

border-left:3px solid rgba(0,0,0,0.2);

box-shadow:-20px 0px 40px rgba(0,0,0,0.5);

}

/* BOTONES (EFECTO VOLUMEN) */

.bookButton{

position:absolute;

top:50%;

transform:translateY(-50%);

width:90px;
height:90px;

border:none;

cursor:pointer;

background:
linear-gradient(to bottom,#444,#151515);

border:5px solid #666;

color:#ddd;

font-size:34px;

transition:0.25s;

box-shadow:
0 10px 0 rgba(0,0,0,0.9),
0 0 25px rgba(0,0,0,0.8),
inset 0 0 12px rgba(255,255,255,0.08);

z-index:200;

animation:buttonFloat 2.5s ease-in-out infinite;

}

@keyframes buttonFloat{

0%{transform:translateY(-50%) translateY(0px);}
50%{transform:translateY(-50%) translateY(-18px);}
100%{transform:translateY(-50%) translateY(0px);}

}

.bookButton:hover{

transform:translateY(-50%) scale(1.12) rotate(2deg);

box-shadow:
0 0 60px rgba(255,255,255,0.2),
0 14px 0 rgba(0,0,0,0.9);

}

.bookButton:active{
transform:translateY(-50%) scale(0.95);
box-shadow:0 4px 0 rgba(0,0,0,0.9);
}

.leftBtn{left:-120px;}
.rightBtn{right:-120px;}

/* MODAL */

.modal{

display:none;

position:fixed;

inset:0;

background:rgba(0,0,0,0.95);

justify-content:center;
align-items:center;

z-index:9999;

backdrop-filter:blur(6px);

}

.modal img{

max-width:85%;
max-height:85%;

border:8px solid #666;

image-rendering:pixelated;

box-shadow:0 0 40px black;

}

/* DIALOGO RPG */

.intro{

position:fixed;
inset:0;

background:rgba(0,0,0,0.92);

display:flex;
justify-content:center;
align-items:flex-end;

padding-bottom:80px;

z-index:99999;

backdrop-filter:blur(6px);

animation:fadeIn 1s;

}

.introBox{

width:900px;

background:
linear-gradient(to bottom,#2b2b2b,#111);

border:8px solid #7a7a7a;

padding:35px;

position:relative;

box-shadow:0 0 40px black,0 0 80px rgba(255,255,255,0.05);

animation:dialogFloat 3s ease-in-out infinite;

}

.introBox::before{

content:"";
position:absolute;
inset:8px;

border:4px solid rgba(255,255,255,0.08);

pointer-events:none;

}

.dialogName{
font-size:24px;
color:#d6d6d6;
margin-bottom:18px;
}

.dialogText{
font-size:32px;
line-height:1.5;
color:#f1f1f1;
text-shadow:2px 2px 0px black;
}

.introBtn{

margin-top:30px;

padding:14px 36px;

font-size:24px;

background:linear-gradient(to bottom,#555,#222);

border:4px solid #888;

color:white;

cursor:pointer;

float:right;

transition:0.3s;

font-family:Courier New;

}

.introBtn:hover{
transform:scale(1.08);
box-shadow:0 0 20px rgba(255,255,255,0.2);
}

@keyframes dialogFloat{
0%{transform:translateY(0px);}
50%{transform:translateY(-5px);}
100%{transform:translateY(0px);}
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}



/* LLUVIA */
.rain{position:fixed;inset:0;pointer-events:none;z-index:30;overflow:hidden}
.drop{position:absolute;width:1px;height:14px;background:rgba(220,220,255,.16);animation:rainFall linear infinite}
.spark{position:absolute;width:2px;height:2px;background:white;box-shadow:0 0 6px white;animation:sparkle 2s linear infinite;opacity:.5}
@keyframes rainFall{from{transform:translateY(-100vh)}to{transform:translateY(100vh)}}
@keyframes sparkle{0%,100%{opacity:0}50%{opacity:.7}}
/* quitar mover boton */
.backButton{animation:vhsMove .2s infinite !important}
body::before{animation:vignetteBlink 7s infinite !important}
.sideMsg{position:fixed;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.18);font-size:22px;z-index:99990;max-width:220px;font-family:Courier New;opacity:0;transition:1.5s;text-shadow:0 0 8px black;pointer-events:none}
.leftMsg{left:20px}.rightMsg{right:20px;text-align:right}
.showMsg{opacity:1}

</style>
</head>

<body>


<div class='rain' id='rain'></div>
<div class='sideMsg leftMsg' id='leftMsg'></div><div class='sideMsg rightMsg' id='rightMsg'></div>

<div class="particles"></div>
<div class="glitchOverlay"></div>

<!-- DIALOGO RPG -->

<div class="intro" id="intro">

<div class="introBox">

<div class="dialogName">
Iris:
</div>

<div class="dialogText">
Mira, aquí está lo que te decía, el trabajo como reportera si que te deja cada cosa...
    <br>
    Puedes clickear las fotos para verlas de cerca.
</div>

<button class="introBtn" onclick="startExperience()">
Mirar
</button>

</div>

</div>

<!-- AUDIO -->

<audio id="bgMusic" loop>
<source src="libro.mp3" type="audio/mpeg">
</audio>

<!-- GIF -->

<img class="topGif" src="lkm.gif">

<!-- ESCENA -->

<div class="scene">

<div class="bookGlow"></div>

<div class="book">

<div class="shadow"></div>

<div class="pageStack1"></div>
<div class="pageStack2"></div>
<div class="pageStack3"></div>
<div class="pageStack4"></div>
<div class="pageStack5"></div>
<div class="pageStack6"></div>
<div class="pageStack7"></div>
<div class="pageStack8"></div>
<div class="pageStack9"></div>
<div class="pageStack10"></div>
<div class="pageStack11"></div>
<div class="pageStack12"></div>

<div class="cover">

<div class="leftPage">

<div class="centerShadow leftShadow"></div>

<img id="pageImage" class="pageImage"
src="f0.jpg"
onclick="openImage(this.src)">

</div>

<div class="rightPage">

<div class="centerShadow rightShadow"></div>

<h1 id="title">Lo desconocido</h1>
<br>
<p id="text">
Las torres del reino colapsaron mientras el cielo se volvía completamente negro.
</p>

</div>

</div>

<div id="flipPage" class="flipPage"></div>

<button class="bookButton leftBtn" onclick="prevPage()">◀</button>
<button class="bookButton rightBtn" onclick="nextPage()">▶</button>

</div>
</div>

<!-- MODAL -->

<div id="modal" class="modal" onclick="closeImage()">
<img id="modalImg">
</div>

<script>

const pages = [
{title:"Déjà vu",text:"El viajero comenzó a perder su cordura, pensó que todo había terinado, ¿ya había visto esto antes?,¿Ya había estado aquí?, ¿tenía otra forma?, quizás sólo es un mal recuerdo.",image:"f0.jpg"},
{title:"Redención",text:"Un día, repentinamente todas las aves del cielo cayeron muertas a nuestros pies. Entonces, astuta y vigorosa, la muerte les ofrece volver a empezar, sin memoria, sin culpa. Pero sin culpa esta redención es sólo otra manera de morir.",image:"f1.jpeg"},
{title:"Contrato",text:"Firmaste sin leer tu nombre, ahora lo usa otra voz, te promete continuidad a cambio de tu forma, no lo puedes ver, se esconde en el segundo piso, esperando a saltar sobre él...",image:"f2.jpeg"},
{title:"Luz",text:"Una luna roja iluminó las páginas mientras símbolos antiguos aparecían lentamente, ¿era tu nombre?",image:"f4.jpeg"},
{title:"Mantenimiento",text:"Te notifican que habrá una pausa breve. Durante esa pausa, alguien ajusta tus reacciones, elimina inconsistencias, pule recuerdos demasiado ruidosos. Cuando vuelves, funcionas mejor, pero no sabes si eso es un beneficio o una sustitución gradual.",image:"f3.jpeg"},

{title:"Casa",text:"El lugar no tiene entrada ni salida, es una costumbre de permanecer. Las sillas están ocupadas por versiones incompletas, la realidad está probando configuraciones antes de decidir cuál dejar activa. Nadie habla de la muerte, porque aquí ya es parte del mobiliario.",image:"f5.jpeg"},
{title:"Amigo",text:"Lo ví arrastrandose por la calle, me reconoció, pero al hacerlo, giró la cabeza e intentó huir.",image:"f6.jpeg"},
{title:"Estrella",text:"Él vió que la puerta sellada finalmente se abrió, revelando un ███████████████.",image:"imagen1.png"},
{title:"Salta",text:"El viajero cerró el libro sabiendo que jamás volvería a ser el mismo.",image:"f8.jpeg"}

];

let current = 0;

function animateFlip(callback){

const flip = document.getElementById("flipPage");

flip.style.display = "block";
flip.style.transform = "rotateY(0deg)";
flip.style.opacity = "1";

flip.innerHTML = `<div style="width:100%;height:100%;background:linear-gradient(to left,#9d9d9d,#efefef);position:absolute;"></div>`;

setTimeout(()=>{

flip.style.transition = "1.6s cubic-bezier(.22,.61,.36,1)";
flip.style.transform = "rotateY(-180deg) translateX(-10px)";
flip.style.filter = "brightness(1.08)";

},30);

setTimeout(()=>{flip.style.opacity="0.4";},900);

setTimeout(()=>{

flip.style.display="none";
flip.style.transition="none";
flip.style.opacity="1";
callback();

},1600);

}

function updatePage(){
document.getElementById("title").innerText = pages[current].title;
document.getElementById("text").innerText = pages[current].text;
document.getElementById("pageImage").src = pages[current].image;
}

function nextPage(){
animateFlip(()=>{
current++;
if(current>=pages.length) current=0;
updatePage();
});
}

function prevPage(){
animateFlip(()=>{
current--;
if(current<0) current=pages.length-1;
updatePage();
});
}

function openImage(src){
document.getElementById("modal").style.display="flex";
document.getElementById("modalImg").src=src;
}

function closeImage(){
document.getElementById("modal").style.display="none";
}

function startExperience(){
document.getElementById("intro").style.display="none";
document.getElementById("bgMusic").play();
}


const rain=document.getElementById('rain');
for(let i=0;i<90;i++){let d=document.createElement('div');d.className='drop';d.style.left=Math.random()*100+'%';d.style.animationDuration=(.7+Math.random()*1.8)+'s';d.style.animationDelay=(Math.random()*4)+'s';rain.appendChild(d);}
for(let i=0;i<12;i++){let s=document.createElement('div');s.className='spark';s.style.left=Math.random()*100+'%';s.style.bottom=(Math.random()*18)+'%';s.style.animationDelay=(Math.random()*5)+'s';rain.appendChild(s);}
const msgs=['¿Porqué no puedo mirar a la gente a los ojos?','¿Cómo se supone que hago esto?','Todos parecen saber algo menos yo.','No recuerdo cuándo empezó esto.','Finjo entender para no preocupar a nadie.','Hay algo raro en mi voz hoy.'];
function flashMsg(){let l=document.getElementById('leftMsg'),r=document.getElementById('rightMsg');l.innerText=msgs[Math.random()*msgs.length|0];r.innerText=msgs[Math.random()*msgs.length|0];l.classList.add('showMsg');r.classList.add('showMsg');setTimeout(()=>{l.classList.remove('showMsg');r.classList.remove('showMsg')},9000)}
setInterval(flashMsg,60000);

</script>


<style>
body::before{content:"";position:fixed;inset:0;pointer-events:none;background:radial-gradient(circle,transparent 18%,rgba(0,0,0,.15) 30%,rgba(0,0,0,.4) 50%,rgba(0,0,0,.75) 75%,rgba(0,0,0,.97) 100%);mix-blend-mode:multiply;animation:vignettePulse 2.3s infinite ease-in-out,vignetteBlink 7s infinite;z-index:999999;}
@keyframes vignettePulse{0%{transform:scale(1);opacity:.8;}50%{transform:scale(.94);opacity:1;}100%{transform:scale(1);opacity:.8;}}
@keyframes vignetteBlink{95%{filter:brightness(1)}96%{filter:brightness(.55)}98%{filter:brightness(.25)}100%{filter:brightness(1)}}
.glitchOverlay{position:fixed!important;inset:0;pointer-events:none;z-index:999998!important;opacity:.95!important;mix-blend-mode:screen!important;animation:vhsMove .08s infinite,rgbSplit .3s infinite!important;filter:contrast(1.7) brightness(1.1) saturate(1.5)!important;}
@keyframes vhsMove{20%{transform:translate(-3px,1px)}40%{transform:translate(4px,-1px)}60%{transform:translate(-4px,2px)}80%{transform:translate(2px,-2px)}}
@keyframes rgbSplit{50%{filter:contrast(2) hue-rotate(8deg)}}
body::after{animation:crtMove 6s linear infinite!important;z-index:999997!important;}
@keyframes crtMove{0%{transform:translateY(-20px)}100%{transform:translateY(20px)}}
.backButton{position:fixed;top:18px;right:18px;z-index:99999999;padding:14px 24px;background:linear-gradient(to bottom,#4d4d4d,#111);border:4px solid #888;font-family:Courier New;font-size:18px;color:white;cursor:pointer;text-shadow:2px 2px black;box-shadow:0 0 20px rgba(255,255,255,.08),0 0 40px rgba(0,255,255,.15);animation:vhsMove .2s infinite,buttonFloat 2s infinite;}
</style>
<button class="backButton" onclick="history.back()">VOLVER</button>

</body>
</html>
