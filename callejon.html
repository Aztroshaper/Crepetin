<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Callejón</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505; /* Cielo oscuro monocromo */
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }
        
        #ui-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: rgba(5, 5, 5, 1);
            z-index: 10;
        }
        
        #btn-entrar {
            padding: 20px 40px;
            font-size: 28px;
            color: #aaaaaa; /* Gris monocromo */
            background-color: transparent;
            border: 2px solid #aaaaaa;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(170, 170, 170, 0.5);
            transition: all 0.3s;
            font-family: inherit;
            letter-spacing: 2px;
        }
        
        #btn-entrar:hover {
            background-color: #aaaaaa;
            color: black;
            box-shadow: 0 0 30px #aaaaaa;
        }

        #texto-instruccion {
            position: absolute;
            top: 30px;
            width: 100vw;
            text-align: center;
            color: #ffffff;
            font-size: 20px;
            letter-spacing: 3px;
            opacity: 0; 
            z-index: 5;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            animation: parpadeo 3s infinite alternate;
        }

        @keyframes parpadeo {
            0% { opacity: 0.2; }
            100% { opacity: 0.8; }
        }

        /* --- EFECTO DE ESTÁTICA AÑADIDO --- */
        .estatica-overlay {
            position: fixed;
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh;
            pointer-events: none; /* Permite clickear los botones debajo */
            z-index: 20; /* Por encima de la escena 3D */
            opacity: 0.15;
            background-image: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
            animation: animEstatica 0.2s steps(2, end) infinite;
        }

        @keyframes animEstatica {
            0% { background-position: 0 0; }
            20% { background-position: -5% -10%; }
            40% { background-position: -15% 5%; }
            60% { background-position: 7% -25%; }
            80% { background-position: 20% 25%; }
            100% { background-position: -25% 10%; }
        }
    </style>
</head>
<body>

    <div class="estatica-overlay"></div>

    <div id="ui-container">
        <button id="btn-entrar">¿Entrar al callejón?</button>
    </div>

    <div id="texto-instruccion">camina bajo la lluvia...</div>

    <audio id="musicaFondo" loop>
        <source src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_3d1a3ebdd3.mp3?filename=rain-and-thunder-16705.mp3" type="audio/mpeg">
    </audio>
    <audio id="sonidoPasos" loop>
        <source src="agua.mp3" type="audio/mpeg">
    </audio>
    <audio id="audioElCan" loop>
        <source src="elcan.wav" type="audio/wav">
    </audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
    
    <script>
        // 1. ESCENA, CIELO NUBLADO Y NIEBLA (Monocromo)
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505); 
        scene.fog = new THREE.FogExp2(0x0a0a0a, 0.06); 

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // FUNCIÓN PARA GENERAR TEXTURA DE PARED (Bloques de concreto)
        function crearTexturaPared() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');

            // Fondo base gris 
            ctx.fillStyle = '#333333';
            ctx.fillRect(0, 0, 512, 512);

            // Generar ruido/suciedad
            for (let i = 0; i < 25000; i++) {
                const x = Math.random() * 512;
                const y = Math.random() * 512;
                const c = Math.floor(Math.random() * 30 + 10);
                ctx.fillStyle = `rgb(${c},${c},${c})`;
                ctx.fillRect(x, y, 2, 2);
            }

            // Dibujar líneas de bloques de concreto
            ctx.fillStyle = '#111111'; // Líneas oscuras
            const altoBloque = 64;
            const anchoBloque = 128;
            for (let y = 0; y < 512; y += altoBloque) {
                ctx.fillRect(0, y, 512, 4); // División horizontal
                const offset = (y / altoBloque) % 2 === 0 ? 0 : anchoBloque / 2;
                for (let x = 0; x < 512; x += anchoBloque) {
                    ctx.fillRect(x + offset, y, 4, altoBloque); // División vertical
                }
            }

            const textura = new THREE.CanvasTexture(canvas);
            textura.wrapS = THREE.RepeatWrapping;
            textura.wrapT = THREE.RepeatWrapping;
            textura.repeat.set(12, 4); // Repetir textura a lo largo del callejón
            return textura;
        }

        // FUNCIÓN PARA GENERAR TEXTURA DE BOLSA DE BASURA (Plástico arrugado)
        function crearTexturaBolsa() {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');

            // Fondo negro/gris muy oscuro
            ctx.fillStyle = '#111111';
            ctx.fillRect(0, 0, 256, 256);

            // Trazar arrugas claras para simular el brillo del plástico
            ctx.strokeStyle = '#333333';
            ctx.lineWidth = 1.5;
            for (let i = 0; i < 60; i++) {
                ctx.beginPath();
                ctx.moveTo(Math.random() * 256, Math.random() * 256);
                ctx.bezierCurveTo(
                    Math.random() * 256, Math.random() * 256,
                    Math.random() * 256, Math.random() * 256,
                    Math.random() * 256, Math.random() * 256
                );
                ctx.stroke();
            }

            // Un poco de grano fino para textura de microplástico
            for (let i = 0; i < 8000; i++) {
                ctx.fillStyle = Math.random() > 0.5 ? '#000000' : '#1a1a1a';
                ctx.fillRect(Math.random() * 256, Math.random() * 256, 1, 1);
            }

            const textura = new THREE.CanvasTexture(canvas);
            return textura;
        }

        const texturaPared = crearTexturaPared();
        const texturaBolsa = crearTexturaBolsa();

        // 2. CONSTRUCCIÓN DEL CALLEJÓN
        const sueloGeo = new THREE.PlaneGeometry(10, 60);
        const sueloMat = new THREE.MeshPhongMaterial({ 
            color: 0x222222, 
            shininess: 80 
        });
        const suelo = new THREE.Mesh(sueloGeo, sueloMat);
        suelo.rotation.x = -Math.PI / 2;
        suelo.position.y = -3;
        scene.add(suelo);

        // Paredes (Aplicando la nueva textura de concreto)
        const paredGeo = new THREE.PlaneGeometry(60, 20);
        const paredMat = new THREE.MeshStandardMaterial({ 
            color: 0x666666, // Base aclarada para que la textura se note en la oscuridad
            map: texturaPared,
            roughness: 0.9 
        });
        
        const paredIzq = new THREE.Mesh(paredGeo, paredMat);
        paredIzq.position.set(-4, 2, 0);
        paredIzq.rotation.y = Math.PI / 2;
        scene.add(paredIzq);

        const paredDer = new THREE.Mesh(paredGeo, paredMat);
        paredDer.position.set(4, 2, 0);
        paredDer.rotation.y = -Math.PI / 2;
        scene.add(paredDer);

        // 3. OBJETOS DEL CALLEJÓN (Generación Aleatoria)
        for (let z = 20; z > -25; z -= 3) {
            
            // BOTES DE BASURA 
            if (Math.random() > 0.7) {
                const bote = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.4, 0.3, 1.2, 16), 
                    new THREE.MeshStandardMaterial({ color: 0x555555, metalness: 0.5 })
                );
                const ladoX = Math.random() > 0.5 ? -3.3 : 3.3;
                bote.position.set(ladoX, -2.4, z + Math.random());
                scene.add(bote);
            }

            // BOLSAS DE BASURA (Aplicando la nueva textura de plástico arrugado)
            if (Math.random() > 0.6) {
                const bolsa = new THREE.Mesh(
                    new THREE.DodecahedronGeometry(0.4, 1), 
                    new THREE.MeshStandardMaterial({ 
                        color: 0x222222, 
                        map: texturaBolsa,
                        roughness: 0.2, // Menor roughness para que el "plástico" brille
                        metalness: 0.1
                    })
                );
                const ladoX = Math.random() > 0.5 ? -3.0 : 3.0;
                bolsa.position.set(ladoX, -2.7, z + Math.random() * 2);
                bolsa.scale.set(1, 0.7, 1);
                scene.add(bolsa);
            }

            // MANCHAS RARAS (Ahora en tonos grises para mantener el monocromo)
            if (Math.random() > 0.75) {
                const mancha = new THREE.Mesh(
                    new THREE.PlaneGeometry(Math.random() * 2 + 1, Math.random() * 2 + 1),
                    new THREE.MeshBasicMaterial({ color: 0x1a1a1a, transparent: true, opacity: 0.8 })
                );
                mancha.rotation.x = -Math.PI / 2;
                mancha.rotation.z = Math.random() * Math.PI;
                mancha.position.set((Math.random() - 0.5) * 5, -2.99, z);
                scene.add(mancha);
            }

            // ESCALERAS DE TUBO
            if (z % 12 === 0) {
                const ladoX = Math.random() > 0.5 ? -3.9 : 3.9;
                const materialTubo = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.8 });
                
                const tuboVert1 = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 10), materialTubo);
                tuboVert1.position.set(ladoX, 2, z - 0.4);
                scene.add(tuboVert1);
                
                const tuboVert2 = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 10), materialTubo);
                tuboVert2.position.set(ladoX, 2, z + 0.4);
                scene.add(tuboVert2);

                for (let y = -2; y < 7; y += 0.8) {
                    const peldaño = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.8), materialTubo);
                    peldaño.rotation.x = Math.PI / 2;
                    peldaño.position.set(ladoX, y, z);
                    scene.add(peldaño);
                }
            }
        }

        // 4. SISTEMA DE LLUVIA
        const cantidadGotas = 3000;
        const lluviaGeo = new THREE.BufferGeometry();
        const lluviaPos = new Float32Array(cantidadGotas * 3);
        const lluviaVel = [];

        for(let i = 0; i < cantidadGotas; i++) {
            lluviaPos[i*3] = (Math.random() - 0.5) * 15;     
            lluviaPos[i*3+1] = Math.random() * 20 - 3;       
            lluviaPos[i*3+2] = (Math.random() - 0.5) * 60;   
            lluviaVel.push(0.3 + Math.random() * 0.2);       
        }

        lluviaGeo.setAttribute('position', new THREE.BufferAttribute(lluviaPos, 3));
        const lluviaMat = new THREE.PointsMaterial({
            color: 0xaaaaaa, 
            size: 0.05, 
            transparent: true, 
            opacity: 0.6
        });
        const lluvia = new THREE.Points(lluviaGeo, lluviaMat);
        scene.add(lluvia);

        // 5. LUCES (Tonos blancos y grises, pero con la misma intensidad)
        const linterna = new THREE.PointLight(0xdddddd, 0.8, 15); 
        scene.add(linterna);

        const luzAmbiente = new THREE.AmbientLight(0x111111, 1);
        scene.add(luzAmbiente);

        const luzFinal = new THREE.PointLight(0xffffff, 2, 20);
        luzFinal.position.set(0, 0, -29);
        scene.add(luzFinal);

        const geometrySalida = new THREE.PlaneGeometry(8, 10);
        const materialSalida = new THREE.MeshBasicMaterial({ color: 0xffffff }); 
        const salida = new THREE.Mesh(geometrySalida, materialSalida);
        salida.position.set(0, -1, -29.9);
        scene.add(salida);

        // 6. CONTROLES Y CÁMARA
        const controls = new THREE.PointerLockControls(camera, document.body);
        scene.add(controls.getObject());
        controls.getObject().position.set(0, -1, 28); 

        // 7. VARIABLES Y EVENTOS
        let moviendose = false;
        const velocidad = 0.08; 
        let tiempoPasos = 0;

        const btnEntrar = document.getElementById('btn-entrar');
        const uiContainer = document.getElementById('ui-container');
        const textoInstruccion = document.getElementById('texto-instruccion');
        const musicaFondo = document.getElementById('musicaFondo');
        const sonidoPasos = document.getElementById('sonidoPasos');
        const audioElCan = document.getElementById('audioElCan');

        musicaFondo.volume = 0.6;
        sonidoPasos.volume = 0.9;
        audioElCan.volume = 0.8; // Ajuste de volumen para el audio en bucle

        btnEntrar.addEventListener('click', () => {
            uiContainer.style.display = 'none'; 
            textoInstruccion.style.display = 'block'; 
            
            controls.lock();

            // Reproducir lluvia
            let playLluvia = musicaFondo.play();
            if (playLluvia !== undefined) {
                playLluvia.catch(e => console.warn("Cargando ambiente..."));
            }

            // Reproducir elcan.wav en bucle continuo
            let playElCan = audioElCan.play();
            if (playElCan !== undefined) {
                playElCan.catch(e => console.warn("Cargando elcan.wav..."));
            }
        });

        document.addEventListener('keydown', (event) => {
            const tecla = event.key.toLowerCase();
            if (tecla === 'w' || event.key === 'ArrowUp') {
                moviendose = true;
            }
        });

        document.addEventListener('keyup', (event) => {
            const tecla = event.key.toLowerCase();
            if (tecla === 'w' || event.key === 'ArrowUp') {
                moviendose = false;
            }
        });

        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        });

        // 8. BUCLE DE ANIMACIÓN
        function iniciarJuego() {
            requestAnimationFrame(iniciarJuego);

            // Animar caída de la lluvia
            const posicionesGotas = lluvia.geometry.attributes.position.array;
            for(let i = 0; i < cantidadGotas; i++) {
                posicionesGotas[i*3+1] -= lluviaVel[i]; 
                if(posicionesGotas[i*3+1] < -3) {
                    posicionesGotas[i*3+1] = 15;
                }
            }
            lluvia.geometry.attributes.position.needsUpdate = true;

            if (controls.isLocked === true) {
                if (moviendose) {
                    controls.getObject().position.z -= velocidad;
                    
                    tiempoPasos += 0.2;
                    
                    const caminarY = Math.abs(Math.sin(tiempoPasos)) * 0.1;
                    const caminarX = Math.cos(tiempoPasos * 0.5) * 0.05;
                    const shakeY = (Math.random() - 0.5) * 0.015;

                    controls.getObject().position.y = -1 + caminarY + shakeY;
                    controls.getObject().position.x = caminarX;

                    if (sonidoPasos.paused) {
                        let playPasos = sonidoPasos.play();
                        if (playPasos !== undefined) {
                            playPasos.catch(e => console.warn("Esperando agua.mp3...")); 
                        }
                    }
                } else {
                    controls.getObject().position.y = -1;
                    controls.getObject().position.x = 0;
                    
                    if (!sonidoPasos.paused) {
                        sonidoPasos.pause();
                    }
                }
            }

            // La linterna te sigue
            linterna.position.copy(controls.getObject().position);

            // Redirección al llegar al final
            if (controls.getObject().position.z <= -28) {
                window.location.href = 'libro.html'; 
            }

            renderer.render(scene, camera);
        }

        iniciarJuego();
    </script>
</body>
</html>
