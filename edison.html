<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Camino en el Desierto</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            display: block;
        }
        #instructions {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            text-align: center;
            background: rgba(0, 0, 0, 0.8);
            padding: 30px;
            border: 2px solid #555;
            pointer-events: none;
            z-index: 10;
        }
        #end-screen {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: black;
            color: red;
            justify-content: center;
            align-items: center;
            font-size: 5rem;
            z-index: 100;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-align: center;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>
</head>
<body>
    <div id="instructions">
        <h2>HAZ CLIC PARA ENTRAR</h2>
        <p>Usa W, A, S, D para moverte por el desierto.</p>
        <p>Usa el ratón para mirar.</p>
    </div>

    <div id="end-screen">
        NO DEBERÍAS ESTAR AQUÍ
    </div>

    <script type="module">
        import * as THREE from 'three';

        // 1. Escena, Niebla e Iluminación (Más detallada)
        const scene = new THREE.Scene();
        const fogColor = new THREE.Color(0x3e2a1d); // Niebla tono tierra oscura/desierto nocturno
        scene.background = fogColor;
        scene.fog = new THREE.Fog(fogColor, 2, 40); // Niebla densa

        // Añadir luces para generar volumen y sombras
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xffddaa, 0.8);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. Generación de Texturas (Carretera con líneas)
        function createRoadTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            // Asfalto rústico
            ctx.fillStyle = '#222222';
            ctx.fillRect(0, 0, 512, 512);
            
            // Líneas amarillas centrales discontinuas
            ctx.fillStyle = '#ffd700';
            ctx.fillRect(240, 50, 32, 150);
            ctx.fillRect(240, 312, 32, 150);
            
            // Líneas blancas laterales
            ctx.fillStyle = '#dddddd';
            ctx.fillRect(20, 0, 15, 512);
            ctx.fillRect(477, 0, 15, 512);

            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = THREE.RepeatWrapping;
            tex.wrapT = THREE.RepeatWrapping;
            tex.repeat.set(1, 40); // Repetir a lo largo de la carretera
            return tex;
        }

        const roadGeo = new THREE.PlaneGeometry(10, 200);
        const roadMat = new THREE.MeshStandardMaterial({ 
            map: createRoadTexture(),
            roughness: 0.9 
        });
        const road = new THREE.Mesh(roadGeo, roadMat);
        road.rotation.x = -Math.PI / 2;
        road.position.z = -90;
        scene.add(road);

        // Suelo desértico
        const groundGeo = new THREE.PlaneGeometry(200, 200);
        const groundMat = new THREE.MeshStandardMaterial({ 
            color: 0x8b5a2b, // Color arena/tierra oscura
            roughness: 1.0 
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.05;
        ground.position.z = -90;
        scene.add(ground);

        // 3. Decoración del desierto (Cactus y Rocas)
        function addDesertDetails() {
            const rockGeo = new THREE.DodecahedronGeometry(0.5);
            const rockMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.8 });
            
            const cactusGeo = new THREE.CylinderGeometry(0.2, 0.2, 2);
            const cactusMat = new THREE.MeshStandardMaterial({ color: 0x2e4a1a, roughness: 0.9 });

            for(let i = 0; i < 40; i++) {
                // Posiciones aleatorias a los lados del camino
                let x = (Math.random() > 0.5 ? 1 : -1) * (Math.random() * 20 + 6);
                let z = -(Math.random() * 180);

                if (Math.random() > 0.5) {
                    // Roca
                    const rock = new THREE.Mesh(rockGeo, rockMat);
                    rock.position.set(x, 0, z);
                    rock.rotation.set(Math.random(), Math.random(), Math.random());
                    rock.scale.setScalar(Math.random() * 1.5 + 0.5);
                    scene.add(rock);
                } else {
                    // Cactus
                    const cactus = new THREE.Mesh(cactusGeo, cactusMat);
                    cactus.position.set(x, 1, z);
                    scene.add(cactus);
                }
            }
        }
        addDesertDetails();

        // 4. Cruces con el nombre TALLADO/ESCRITO dentro
        function createWoodTexture(name) {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            
            // Fondo de madera
            ctx.fillStyle = '#3d2817';
            ctx.fillRect(0, 0, 512, 128);
            
            // Texto del nombre (simulando tallado o pintado rústico)
            ctx.fillStyle = '#0a0a0a';
            ctx.font = 'bold 60px Courier New';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(name, 256, 64);

            return new THREE.CanvasTexture(canvas);
        }

        const verticalWoodMat = new THREE.MeshStandardMaterial({ color: 0x3d2817, roughness: 1 });

        function createCross(x, z, name) {
            const crossGroup = new THREE.Group();

            // Poste vertical
            const verticalGeo = new THREE.BoxGeometry(0.3, 2.5, 0.3);
            const vertical = new THREE.Mesh(verticalGeo, verticalWoodMat);
            vertical.position.y = 1.25;

            // Poste horizontal (con el nombre)
            const horizontalGeo = new THREE.BoxGeometry(1.8, 0.4, 0.35);
            // Aplicamos la textura con el nombre solo a la barra horizontal
            const nameMat = new THREE.MeshStandardMaterial({ 
                map: createWoodTexture(name),
                roughness: 1 
            });
            const horizontal = new THREE.Mesh(horizontalGeo, nameMat);
            horizontal.position.y = 1.7;

            crossGroup.add(vertical);
            crossGroup.add(horizontal);

            // Rotar la cruz un poco para que apunte hacia el camino
            if (x > 0) {
                crossGroup.rotation.y = -0.3; // Lado derecho
            } else {
                crossGroup.rotation.y = 0.3; // Lado izquierdo
            }

            crossGroup.position.set(x, 0, z);
            scene.add(crossGroup);
        }

        // Colocar las cruces especificadas
        createCross(-6, -15, "Miguel");
        createCross(6, -35, "Martha");
        createCross(-6, -55, "Vivian");
        createCross(6, -75, "Goio");

        // 5. Puerta Brillante al final
        const doorGroup = new THREE.Group();
        const doorGeo = new THREE.BoxGeometry(5, 8, 0.5);
        const doorMat = new THREE.MeshBasicMaterial({ color: 0xffffff }); // Blanco incandescente
        const door = new THREE.Mesh(doorGeo, doorMat);
        door.position.y = 4;
        doorGroup.add(door);

        const doorLight = new THREE.PointLight(0xffaa55, 5, 40); // Luz cálida saliendo de la puerta
        doorLight.position.set(0, 4, 2);
        doorGroup.add(doorLight);

        doorGroup.position.set(0, 0, -100);
        scene.add(doorGroup);

        // 6. Controles y Movimiento
        let isLocked = false;
        const instructions = document.getElementById('instructions');

        document.body.addEventListener('click', () => {
            if (!isLocked) document.body.requestPointerLock();
        });

        document.addEventListener('pointerlockchange', () => {
            isLocked = document.pointerLockElement === document.body;
            instructions.style.display = isLocked ? 'none' : 'block';
        });

        let pitch = 0, yaw = 0;
        document.addEventListener('mousemove', (e) => {
            if (isLocked) {
                yaw -= e.movementX * 0.002;
                pitch -= e.movementY * 0.002;
                pitch = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, pitch));
                camera.rotation.set(pitch, yaw, 0, 'YXZ');
            }
        });

        const keys = { w: false, a: false, s: false, d: false };
        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (keys.hasOwnProperty(key)) keys[key] = true;
        });
        document.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (keys.hasOwnProperty(key)) keys[key] = false;
        });

        // 7. Evento de los 60 segundos
        setTimeout(() => {
            const endScreen = document.getElementById('end-screen');
            endScreen.style.display = 'flex';
            document.exitPointerLock();
            
            setTimeout(() => {
                window.close();
                document.body.innerHTML = '<div style="background:black;height:100vh;width:100vw;color:red;display:flex;justify-content:center;align-items:center;font-size:5rem;font-family:monospace;text-align:center;">NO DEBERÍAS ESTAR AQUÍ</div>';
            }, 2000);
        }, 60000);

        // 8. Bucle de Renderizado
        const speed = 0.12;
        const direction = new THREE.Vector3();
        const right = new THREE.Vector3();

        function animate() {
            requestAnimationFrame(animate);

            if (isLocked) {
                camera.getWorldDirection(direction);
                direction.y = 0; 
                direction.normalize();
                right.crossVectors(camera.up, direction).normalize();

                if (keys.w) camera.position.addScaledVector(direction, speed);
                if (keys.s) camera.position.addScaledVector(direction, -speed);
                if (keys.a) camera.position.addScaledVector(right, speed);
                if (keys.d) camera.position.addScaledVector(right, -speed);
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
