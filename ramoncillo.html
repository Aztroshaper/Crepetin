<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>El Peso del Ayer</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; }
        
    
        #ramoncilo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150px; /* Tamaño del GIF ajustado a 150px */
            height: auto;
            z-index: 20; /* Superior al UI */
            pointer-events: none; /* Para que no bloquee clics si los hubiera */
        }

        #ui { position: absolute; bottom: 10%; left: 10%; width: 80%; color: #fff; font-family: 'Courier New', monospace; z-index: 10; pointer-events: none; }
        #dialogue-box { background: rgba(0,0,0,0.7); padding: 20px; border-left: 4px solid #fff; }
        #choices { display: none; pointer-events: auto; margin-top: 10px; }
        button { background: transparent; color: white; border: 1px solid white; padding: 10px 20px; cursor: pointer; margin-right: 10px; }
    </style>
</head>
<body>

<img id="ramoncilo" src="ramoncillo.gif" alt="Ramoncillo">

<div id="ui">
    <div id="dialogue-box"><span id="text"></span></div>
    <div id="choices">
        <button onclick="decidir(false)">Dejarlo vivir</button>
        <button onclick="decidir(true)">Terminar con esto</button>
    </div>
</div>

<script type="importmap">
  { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x111111, 0.05);
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);


    const light = new THREE.DirectionalLight(0x444444, 1);
    light.position.set(0, 5, 5);
    scene.add(light, new THREE.AmbientLight(0x222222));

    const spotLight = new THREE.SpotLight(0xffffff, 50);
    spotLight.position.set(0, 5, 0);
    spotLight.angle = Math.PI / 6;
    spotLight.penumbra = 0.5;
    scene.add(spotLight);

 
    const calf = new THREE.Group();
    const body = new THREE.Mesh(new THREE.BoxGeometry(1, 0.8, 1.5), new THREE.MeshPhongMaterial({color: 0x000000}));
    const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), new THREE.MeshPhongMaterial({color: 0x111111}));
    head.position.set(0, 0.5, 1);
    calf.add(body, head);
    scene.add(calf);
    camera.position.z = 5;

    // Pasto
    const grass = new THREE.Mesh(new THREE.PlaneGeometry(20, 20), new THREE.MeshPhongMaterial({color: 0x0a1a0a}));
    grass.rotation.x = -Math.PI / 2;
    grass.position.y = -1;
    scene.add(grass);

    // Lluvia
    const rainGeo = new THREE.BufferGeometry();
    const rainCount = 5000;
    const pos = new Float32Array(rainCount * 3);
    for(let i=0; i<rainCount*3; i++) pos[i] = (Math.random() - 0.5) * 20;
    rainGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    const rainMat = new THREE.PointsMaterial({color: 0xaaaaaa, size: 0.02});
    const rain = new THREE.Points(rainGeo, rainMat);
    scene.add(rain);

 
    const texto = "??? : Míralo. Cada gota de lluvia que lo golpea es una oportunidad que ignoraste. Sigue ahí, esperando que lo alimentes con tu culpa. ¿Realmente crees que si lo matas, el suelo dejará de estar mojado?";
    let i = 0;
    function typeWriter() {
        if (i < texto.length) {
            document.getElementById('text').innerHTML += texto.charAt(i++);
            setTimeout(typeWriter, 40);
        } else {
            document.getElementById('choices').style.display = 'block';
        }
    }

    window.decidir = (matar) => {
        if (matar) {
            calf.scale.set(0.1, 0.1, 0.1);
            setTimeout(() => window.location.href = 'ere.html', 1000);
        } else {
            alert("La inacción es también una decisión.");
        }
    };

    function animate() {
        requestAnimationFrame(animate);
        calf.rotation.y += 0.005;
        rain.rotation.y += 0.002;
        renderer.render(scene, camera);
    }
    animate();
    typeWriter();
</script>
</body>
</html>
