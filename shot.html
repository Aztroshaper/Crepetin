<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Construyendo Sonrisas - Edición Pesadilla</title>
    <style>
        body, html {
            margin: 0; padding: 0; overflow: hidden;
            width: 100%; height: 100%;
            background-color: #030205;
            font-family: 'Courier New', monospace;
            user-select: none;
        }
        #viewport-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            /* Filtro estilo monitor CRT viejo y desgastado */
            filter: contrast(1.3) brightness(0.85) saturate(1.1);
        }
        #gameCanvas {
            display: block; width: 100%; height: 100%;
            image-rendering: pixelated;
        }
        /* Efecto de viñeta para mayor claustrofobia */
        #vignette {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.92) 95%);
            pointer-events: none; z-index: 2;
        }
        #audio-unlocker {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #050408;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: #ff3333; z-index: 30; text-align: center; cursor: pointer;
        }
        #rpg-dialogue-box {
            position: absolute; bottom: 40px; left: 50%;
            transform: translateX(-50%);
            width: 85%; max-width: 800px; background-color: rgba(5, 4, 8, 0.95);
            border: 3px solid #ff1111; padding: 25px; z-index: 10;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.2);
            box-sizing: border-box;
        }
        #rpg-speaker {
            color: #ffaa00; font-weight: bold; font-size: 20px; margin-bottom: 12px;
            text-transform: uppercase; letter-spacing: 3px; border-bottom: 1px dashed #ff1111;
            padding-bottom: 5px;
        }
        #rpg-text {
            color: #ddd; font-size: 16px; line-height: 1.6; min-height: 80px;
        }
        #start-btn {
            display: none; margin: 20px auto 0 auto; background-color: #880000; color: #fff;
            border: 2px solid #ff3333; padding: 12px 30px; font-family: 'Courier New', monospace;
            font-size: 15px; font-weight: bold; letter-spacing: 3px; cursor: pointer;
            box-shadow: 0 0 15px rgba(255,0,0,0.4); animation: pulse 1.5s infinite;
        }
        #start-btn:hover { background-color: #ff1111; }
        @keyframes pulse {
            0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; }
        }
        #ui {
            position: absolute; top: 30px; left: 30px;
            color: #fff; font-size: 18px; pointer-events: none; z-index: 5;
            text-shadow: 2px 2px #000; letter-spacing: 2px; display: none;
        }
        #radar-container {
            position: absolute; top: 30px; right: 30px;
            width: 160px; height: 160px; border: 2px solid #ff1111;
            background-color: rgba(3,2,6,0.9); z-index: 5;
            box-shadow: 0 0 20px rgba(0,0,0,0.8); display: none;
        }
        #end-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            z-index: 20; text-align: center; font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>

    <div id="viewport-container">
        <div id="vignette"></div>
        
        <div id="audio-unlocker" onclick="unlockAudioAndStartIntro()">
            <h1 style="letter-spacing: 8px; text-shadow: 0 0 20px #ff0000; font-size: 36px;">CONSTRUYENDO SONRISAS</h1>
            <h2 style="color: #ffaa00; letter-spacing: 4px; font-size: 14px; margin-top: 25px; animation: pulse 2s infinite;">[ CLICK PARA ENLAZAR TRANSMISIÓN SENSORIAL ]</h2>
        </div>

        <div id="rpg-dialogue-box" style="display: none;">
            <div id="rpg-speaker">Arquitecto Burdo</div>
            <div id="rpg-text"></div>
            <button id="start-btn" onclick="releaseTheStorm()">INICIAR OPERATIVO URBANO</button>
        </div>

        <div id="end-screen">
            <h1 id="end-title" style="font-size: 55px; letter-spacing: 8px; text-shadow: 0 0 20px rgba(0,0,0,0.8);"></h1>
            <p id="end-desc" style="color: #fff; font-size: 16px; max-width: 600px; line-height: 1.8; padding: 20px;"></p>
        </div>

        <div id="ui">
            <div id="hearts" style="color: #ff3333;">ESTADO CORPORAL: [IIIII]</div>
            <div id="ammo" style="color: #ffaa00; margin-top: 8px;">CARTUCHOS: 10</div>
            <div id="score" style="color: #00ff66; margin-top: 8px;">ANOMALÍAS DEPURADAS: 0 / 3</div>
        </div>

        <div id="radar-container">
            <canvas id="radarCanvas" width="160" height="160"></canvas>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const radarCanvas = document.getElementById('radarCanvas');
        const rCtx = radarCanvas.getContext('2d');

        const PIXEL_SCALE = 3; 
        function resize() {
            canvas.width = window.innerWidth / PIXEL_SCALE;
            canvas.height = window.innerHeight / PIXEL_SCALE;
        }
        window.addEventListener('resize', resize);
        resize();

        let player = { x: 40, y: 40, angle: 0.8, health: 5, ammo: 10, score: 0, z: 0, vSpeed: 0, isJumping: false };
        const MAP_SIZE = 320; 
        let gameRunning = false;
        let isIntroActive = false;
        let damageFlashActive = 0;
        let bullets3D = [];

        let dialogueStep = 0;
        const dialogues = [
            "Menos mal que logramos interceptar tu señal... La edificación de complejos habitacionales aquí en Torreon't se ha salido por completo de los márgenes geométricos.",
            "Hay una entidad orgánica desplazándose sin patrón fijo por las inmediaciones del sector de construcción. No tiene registros biológicos, camina desnuda, posee una mandíbula hiper-extendida y su hostilidad es matemáticamente perfecta.",
            "Nuestras cuadrillas de albañilería son desmanteladas en segundos cuando intentan levantar las fachadas. Tu única directiva es limpiar el perímetro. Extírpalo de la realidad para que podamos continuar la obra.",
            "Llevas un rifle de choque cinético. Cuida tu integridad estructural. Si logras disolver su presencia 3 veces, el terreno quedará santificado para el uso del concreto. Muévete, ya olió tu frecuencia..."
        ];

        let textElement = document.getElementById('rpg-text');
        let charIndex = 0;
        let introMusicInterval = null;

        // ELEMENTOS DE AUDIO REAL (Web Audio API Avanzado)
        let audioCtx = null;
        let sndSmile, sndGal, sndGal2;
        let distortionNode, delayNode, feedbackNode;

        function initAudioPipeline() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();

         
            sndSmile = new Audio('smile.wav');
            sndGal = new Audio('gal.mp3');
            sndGal.loop = true;
            sndGal2 = new Audio('gal2.wav');

            // Crear efectos para la Entidad (Distorsión + Eco)
            distortionNode = audioCtx.createWaveShaper();
            distortionNode.curve = makeDistortionCurve(120);
            distortionNode.oversample = '4x';

            delayNode = audioCtx.createDelay();
            delayNode.delayTime.value = 0.35; // Tiempo del eco

            feedbackNode = audioCtx.createGain();
            feedbackNode.gain.value = 0.45; // Retroalimentación del eco

            // Conectar el bucle de eco
            delayNode.connect(feedbackNode);
            feedbackNode.connect(delayNode);

            // Enrutar smile.wav a través del procesador de horror
            try {
                let sourceSmile = audioCtx.createMediaElementSource(sndSmile);
                sourceSmile.connect(distortionNode);
                distortionNode.connect(delayNode);
                distortionNode.connect(audioCtx.destination);
                delayNode.connect(audioCtx.destination);
            } catch(e) {
                console.log("Audio Routing semi-bloqueado localmente. Usando fallback nativo.");
            }
        }

        function makeDistortionCurve(amount) {
            let k = typeof amount === 'number' ? amount : 50,
                n_samples = 44100,
                curve = new Float32Array(n_samples),
                deg = Math.PI / 180, i = 0, x;
            for ( ; i < n_samples; ++i ) {
                x = ( i * 2 ) / n_samples - 1;
                curve[i] = ( ( 3 + k ) * x * 20 * deg ) / ( Math.PI + k * Math.abs(x) );
            }
            return curve;
        }

        function playDistortedSmile() {
            if (!audioCtx) return;
            sndSmile.currentTime = 0;
            sndSmile.volume = 0.9;
            sndSmile.play().catch(()=>{});

            // Disparar gal2.wav repentinamente "detrás" o desfasado con un pequeño retraso
            setTimeout(() => {
                if (monster.active) {
                    sndGal2.currentTime = 0;
                    sndGal2.volume = 0.85;
                    sndGal2.play().catch(()=>{});
                }
            }, 300 + Math.random() * 400);
        }

        function typeDialogue() {
            if (dialogueStep < dialogues.length) {
                let currentText = dialogues[dialogueStep];
                if (charIndex < currentText.length) {
                    textElement.innerText += currentText.charAt(charIndex);
                    charIndex++;
                    playTypeClick();
                    setTimeout(typeDialogue, 25);
                } else {
                    dialogueStep++;
                    charIndex = 0;
                    if (dialogueStep < dialogues.length) {
                        setTimeout(() => {
                            textElement.innerText = "";
                            typeDialogue();
                        }, 3000);
                    } else {
                        document.getElementById('start-btn').style.display = "block";
                    }
                }
            }
        }

        function playTypeClick() {
            if (!audioCtx) return;
            try {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(80 + Math.random() * 40, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.01, audioCtx.currentTime);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.02);
            } catch(e){}
        }

        function startIntroMusic() {
            let notes = [70, 75, 70, 65, 70, 80, 60, 55];
            let idx = 0;
            introMusicInterval = setInterval(() => {
                if (!isIntroActive) return;
                try {
                    let osc = audioCtx.createOscillator();
                    let gain = audioCtx.createGain();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(notes[idx], audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.02, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.7);
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.75);
                    idx = (idx + 1) % notes.length;
                } catch(e){}
            }, 700);
        }

        function unlockAudioAndStartIntro() {
            initAudioPipeline();
            document.getElementById('audio-unlocker').style.display = 'none';
            document.getElementById('rpg-dialogue-box').style.display = 'block';
            try { canvas.requestPointerLock(); } catch(e){}
            isIntroActive = true;
            startIntroMusic();
            typeDialogue();
        }

        let keys = {};
        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (e.code === 'Space' && !player.isJumping && gameRunning) {
                player.vSpeed = 11.0; player.isJumping = true;
            }
        });
        window.addEventListener('keyup', e => keys[e.code] = false);
        window.addEventListener('mousemove', e => {
            if (gameRunning || isIntroActive) player.angle += e.movementX * 0.0022;
        });
        canvas.addEventListener('click', () => {
            if(gameRunning || isIntroActive) { try { canvas.requestPointerLock(); } catch(e){} }
        });

        // ESTRUCTURAS DETALLADAS DEL ESCENARIO
        let houses = [];
        let lampposts = [];
        let natureObjects = [];
        let debrisParticles = [];

        function initEnvironment() {
            const spacing = 70;
            for (let x = 50; x < MAP_SIZE - 40; x += spacing) {
                for (let y = 50; y < MAP_SIZE - 40; y += spacing) {
                    if (Math.abs(x - 40) < 50 && Math.abs(y - 40) < 50) continue;

                    let houseHeightVariation = 20 + Math.floor(Math.random() * 15);
                    houses.push({
                        x: x, y: y,
                        w: 26, h: 26,
                        roof: Math.random() > 0.4 ? 'pyramid' : 'wedge',
                        height: houseHeightVariation,
                        seed: Math.random()
                    });

                    // Decoraciones fijas (Postes y Farolas rotas)
                    lampposts.push({ x: x - 6, y: y - 6 });
                    
                    // Escombros procedimentales en el piso
                    for(let d=0; d<3; d++) {
                        debrisParticles.push({
                            x: x + Math.random()*40 - 20,
                            y: y + Math.random()*40 - 20,
                            w: 2 + Math.random()*3,
                            h: 1 + Math.random()*2,
                            col: Math.random() > 0.5 ? '#222' : '#3d2525'
                        });
                    }

                    // Vegetación marchita
                    for (let k = 0; k < 6; k++) {
                        let offsetX = (Math.random() - 0.5) * 55;
                        let offsetY = (Math.random() - 0.5) * 55;
                        let type = Math.random() > 0.5 ? 'dead_tree' : 'rubble_pile';
                        let scale = 0.6 + Math.random() * 0.8;
                        natureObjects.push({
                            x: x + 30 + offsetX, y: y + 30 + offsetY,
                            type: type, scale: scale, rad: type === 'dead_tree' ? 3 : 0
                        });
                    }
                }
            }
        }
        initEnvironment();

        let ammoBoxes = [];
        function spawnAmmo() {
            while(ammoBoxes.length < 6) {
                let h = houses[Math.floor(Math.random() * houses.length)];
                ammoBoxes.push({ x: h.x + 13, y: h.y - 8, seed: Math.random() });
            }
        }
        spawnAmmo();

        // INTELIGENCIA ARTIFICIAL DE ELEVADO RAZONAMIENTO
        // Estados: 0 = Buscando, 1 = Acechando (Flanqueo encubierto), 2 = Carga Frenética
        let monster = { 
            x: 0, y: 0, health: 4, active: false, timer: 0, 
            state: 0, walkAnim: 0, rad: 6, speed: 2.2, stalkAngle: 0 
        };

        function updateMonsterAI(delta) {
            if (!monster.active) {
                monster.timer += delta;
                if (monster.timer > 2000) { // Respawn
                    let rh = houses[Math.floor(Math.random() * houses.length)];
                    monster.x = rh.x + 13 + (Math.random() > 0.5 ? 35 : -35);
                    monster.y = rh.y + 13 + (Math.random() > 0.5 ? 35 : -35);
                    monster.health = 4;
                    monster.state = Math.random() > 0.5 ? 1 : 0; // Inicia buscando o acechando
                    monster.active = true;
                    monster.timer = 0;
                    monster.speed = 2.1 + (4 - monster.health) * 0.4;
                    
                    playDistortedSmile();
                }
            } else {
                monster.timer += delta;
                monster.walkAnim += delta * 0.012;
                
                let dx = player.x - monster.x;
                let dy = player.y - monster.y;
                let dist = Math.sqrt(dx*dx + dy*dy);

                // Re-evaluar razonamiento de ruta cada 2 segundos
                if (Math.floor(monster.timer) % 120 === 0) {
                    let angleToPlayer = Math.atan2(dy, dx);
                    let viewDiff = Math.abs(Math.atan2(Math.sin(player.angle - angleToPlayer), Math.cos(player.angle - angleToPlayer)));
                    
                    if (viewDiff < 0.6 && dist > 50) {
                        // Si el jugador lo está mirando directamente de lejos, cambia a estado ACECHANDO Detrás de casas
                        monster.state = 1; 
                    } else if (monster.health < 2 || dist < 45) {
                        // Si está herido o muy cerca, entra en furia total (Carga directa)
                        monster.state = 2;
                    }
                }

                let targetX = player.x;
                let targetY = player.y;

                if (monster.state === 1) { 
                    // RAZONAMIENTO ELEVADO: Flanqueo circular usando coberturas estructurales
                    monster.stalkAngle += 0.03;
                    targetX = player.x + Math.cos(monster.stalkAngle) * 40;
                    targetY = player.y + Math.sin(monster.stalkAngle) * 40;
                }

                let tDx = targetX - monster.x;
                let tDy = targetY - monster.y;
                let tDist = Math.sqrt(tDx*tDx + tDy*tDy);

                if (tDist > 2) {
                    let moveStep = (monster.state === 2 ? monster.speed * 1.4 : monster.speed);
                    let stepX = (tDx / tDist) * moveStep;
                    let stepY = (tDy / tDist) * moveStep;

                    let nextX = monster.x + stepX;
                    let nextY = monster.y + stepY;
                    let collides = false;

                    // Colisión inteligente contra entorno
                    for (let h of houses) {
                        let m = monster.rad + 2;
                        if (nextX > h.x - m && nextX < h.x + h.w + m && nextY > h.y - m && nextY < h.y + h.h + m) {
                            collides = true;
                        }
                    }
                    if (nextX < 15 || nextX > MAP_SIZE - 15 || nextY < 15 || nextY > MAP_SIZE - 15) collides = true;

                    if (!collides) {
                        monster.x = nextX;
                        monster.y = nextY;
                    } else {
                        // Si choca, rompe el bloqueo moviéndose de lado de forma impredecible
                        monster.x += Math.sin(monster.walkAnim) * 2;
                        monster.y += Math.cos(monster.walkAnim) * 2;
                    }
                }

                // Daño al jugador
                if (dist < 14 && player.z < 18) {
                    player.health--;
                    damageFlashActive = 5;
                    let hb = "[";
                    for(let h=0; h<5; h++) hb += (h < player.health) ? "I" : ".";
                    hb += "]";
                    document.getElementById('hearts').innerText = "ESTADO CORPORAL: " + hb;
                    
                    monster.active = false;
                    monster.timer = 0;
                    if (player.health <= 0) endGame(false);
                }

                if (monster.timer > 22000) { monster.active = false; monster.timer = 0; }
            }
        }

        function movePlayer() {
            if (player.isJumping) {
                player.z += player.vSpeed;
                player.vSpeed -= 0.9;
                if (player.z <= 0) { player.z = 0; player.vSpeed = 0; player.isJumping = false; }
            }

            let moveX = 0, moveY = 0;
            let speed = keys['ShiftLeft'] ? 2.5 : 1.6;

            if (keys['KeyW']) { moveX += Math.cos(player.angle); moveY += Math.sin(player.angle); }
            if (keys['KeyS']) { moveX -= Math.cos(player.angle); moveY -= Math.sin(player.angle); }
            if (keys['KeyA']) { moveX += Math.sin(player.angle); moveY -= Math.cos(player.angle); }
            if (keys['KeyD']) { moveX -= Math.sin(player.angle); moveY += Math.cos(player.angle); }

            let nx = player.x + moveX * speed;
            let ny = player.y + moveY * speed;

            let blocked = false;
            for (let h of houses) {
                if (nx > h.x - 4 && nx < h.x + h.w + 4 && ny > h.y - 4 && ny < h.y + h.h + 4) blocked = true;
            }
            if (nx < 12 || nx > MAP_SIZE - 12 || ny < 12 || ny > MAP_SIZE - 12) blocked = true;

            if (!blocked) { player.x = nx; player.y = ny; }

            for (let i = ammoBoxes.length - 1; i >= 0; i--) {
                let b = ammoBoxes[i];
                if (Math.sqrt(Math.pow(player.x - b.x, 2) + Math.pow(player.y - b.y, 2)) < 12) {
                    player.ammo += 5;
                    document.getElementById('ammo').innerText = "CARTUCHOS: " + player.ammo;
                    ammoBoxes.splice(i, 1);
                    spawnAmmo();
                }
            }
        }

        // MOTOR DE RENDERIZADO DETALLADO POR RAYCASTING
        let rain = [];
        for(let i=0; i<90; i++) rain.push({ x: Math.random() * window.innerWidth, y: Math.random() * -window.innerHeight, v: Math.random()*7 + 12, splash: 0 });

        function render3DScene() {
            // Fondo abisal oscuro
            ctx.fillStyle = '#020104';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            let fov = Math.PI / 2.8; 
            let numRays = Math.min(220, Math.floor(canvas.width));
            let rayStep = fov / numRays;
            let zBuffer = new Array(numRays).fill(Infinity);
            let horizonShift = player.z * 0.45;

            // Render del plano del suelo y detalles pseudo-3D
            for (let i = 0; i < numRays; i++) {
                let rayAngle = (player.angle - fov / 2) + i * rayStep;
                let distance = 0; let hit = false; let wallType = 'none';
                let hitX = 0; let hitY = 0; let targetHouse = null;

                while (distance < 200 && !hit) {
                    distance += 1.0;
                    hitX = player.x + Math.cos(rayAngle) * distance;
                    hitY = player.y + Math.sin(rayAngle) * distance;

                    if (hitX <= 10 || hitX >= MAP_SIZE - 10 || hitY <= 10 || hitY >= MAP_SIZE - 10) { hit = true; wallType = 'boundary'; }
                    for (let h of houses) {
                        if (hitX > h.x && hitX < h.x + h.w && hitY > h.y && hitY < h.y + h.h) { hit = true; wallType = 'house'; targetHouse = h; }
                    }
                }

                let correctedDist = distance * Math.cos(rayAngle - player.angle);
                zBuffer[i] = correctedDist;

                let screenX = i * (canvas.width / numRays);
                let rayWidth = Math.ceil(canvas.width / numRays) + 1;
                let wallHeight = Math.min(canvas.height * 2.0, (canvas.height * 2.4) / correctedDist);
                let screenY = (canvas.height / 2) - wallHeight / 2 + horizonShift;

                let fogFloor = Math.max(0, 1 - (correctedDist / 160));

                // Dibujar Piso con Texturizado de banquetas/grietas procedimentales
                let isSidewalk = false;
                if (targetHouse && hitX >= targetHouse.x - 4 && hitX <= targetHouse.x + targetHouse.w + 4 && hitY >= targetHouse.y - 4 && hitY <= targetHouse.y + targetHouse.h + 4) {
                    isSidewalk = true;
                }

                if (isSidewalk) {
                    ctx.fillStyle = `rgb(${Math.floor(28 * fogFloor)},${Math.floor(25 * fogFloor)},${Math.floor(32 * fogFloor)})`;
                } else {
                    // Patrón de cuadrícula áspera (Tierra baldía rota)
                    let floorPattern = (Math.floor(hitX * 0.3) % 2 === 0 ^ Math.floor(hitY * 0.3) % 2 === 0);
                    if (floorPattern) {
                        ctx.fillStyle = `rgb(${Math.floor(14 * fogFloor)},${Math.floor(12 * fogFloor)},${Math.floor(16 * fogFloor)})`;
                    } else {
                        ctx.fillStyle = `rgb(${Math.floor(8 * fogFloor)},${Math.floor(8 * fogFloor)},${Math.floor(10 * fogFloor)})`;
                    }
                }
                ctx.fillRect(screenX, canvas.height / 2 + horizonShift, rayWidth, canvas.height / 2 - horizonShift);

                // Renderizado detallado de Muros
                if (hit) {
                    let fogFactor = Math.max(0, 1 - (correctedDist / 170));
                    let flashlight = Math.max(0, 1 - (correctedDist / 110));
                    let light = Math.min(1, (0.03 * fogFactor) + (flashlight * 0.97));

                    let r = 40, g = 42, b = 50;
                    if (wallType === 'boundary') { r = 70; g = 15; b = 15; } // Muros del fin del mundo
                    
                    r = Math.floor(r * light); g = Math.floor(g * light); b = Math.floor(b * light);
                    ctx.fillStyle = `rgb(${r},${g},${b})`;
                    ctx.fillRect(screenX, screenY, rayWidth, wallHeight);

                    // Detalles de Casas (Ventanas malditas y Puertas desalineadas)
                    if (wallType === 'house' && targetHouse) {
                        let wallTexX = Math.abs(hitY - targetHouse.y) < 1.1 || Math.abs(hitY - (targetHouse.y + targetHouse.h)) < 1.1 ? (hitX - targetHouse.x) / targetHouse.w : (hitY - targetHouse.y) / targetHouse.h;

                        // Columnas estructurales de esquinas
                        if (wallTexX < 0.05 || wallTexX > 0.95) {
                            ctx.fillStyle = `rgb(${Math.floor(20*light)}, ${Math.floor(20*light)}, ${Math.floor(25*light)})`;
                            ctx.fillRect(screenX, screenY, rayWidth, wallHeight);
                        }
                        // Ventanas iluminadas con destellos enfermos
                        else if (wallTexX > 0.18 && wallTexX < 0.35) {
                            let windowPulse = 0.4 + Math.sin(performance.now() * 0.005 + targetHouse.seed * 100) * 0.3;
                            ctx.fillStyle = `rgba(${Math.floor(240 * light)}, ${Math.floor(140 * light)}, 0, ${windowPulse * fogFactor})`;
                            ctx.fillRect(screenX, screenY + (wallHeight * 0.25), rayWidth, wallHeight * 0.22);
                        }
                        // Puertas de madera podrida
                        else if (wallTexX > 0.55 && wallTexX < 0.75) {
                            ctx.fillStyle = `rgb(${Math.floor(18*light)}, ${Math.floor(10*light)}, ${Math.floor(6*light)})`;
                            ctx.fillRect(screenX, screenY + (wallHeight * 0.5), rayWidth, wallHeight * 0.5);
                        }

                        // Techo detallado
                        let roofHeight = wallHeight * 0.32;
                        ctx.fillStyle = `rgb(${Math.floor(45*light)},${Math.floor(15*light)},${Math.floor(15*light)})`;
                        if (targetHouse.roof === 'pyramid') {
                            let distCenter = Math.abs(wallTexX - 0.5) * 2;
                            let currentRoofY = screenY - (roofHeight * (1.0 - distCenter));
                            ctx.fillRect(screenX, currentRoofY, rayWidth, screenY - currentRoofY);
                        } else {
                            ctx.fillRect(screenX, screenY - roofHeight, rayWidth, roofHeight);
                        }
                    }
                }
            }

            // SPRITES DEL MAPA (Decoraciones y consumibles)
            let sprites = [
                ...lampposts.map(l => ({...l, type:'lamp', scale:1.1})),
                ...natureObjects,
                ...ammoBoxes.map(b => ({...b, type:'ammo', scale: 0.9}))
            ];
            sprites.forEach(s => { s.dist = Math.sqrt(Math.pow(s.x - player.x, 2) + Math.pow(s.y - player.y, 2)); });
            sprites.sort((a,b) => b.dist - a.dist);

            sprites.forEach(s => {
                if (s.dist > 180 || s.dist < 6) return;
                let angle = Math.atan2(s.y - player.y, s.x - player.x);
                let diff = player.angle - angle;
                diff = Math.atan2(Math.sin(diff), Math.cos(diff));

                if (Math.abs(diff) < fov / 2) {
                    let cDist = s.dist * Math.cos(diff);
                    let h = (canvas.height * 1.5) / cDist;
                    let rayIdx = Math.floor(((diff + (fov / 2)) / fov) * numRays);
                    rayIdx = numRays - 1 - rayIdx;

                    if (rayIdx >= 0 && rayIdx < numRays && zBuffer[rayIdx] < cDist - 2.0) return;

                    let sx = (canvas.width / 2) - (diff * (canvas.width / fov));
                    let baseY = (canvas.height / 2) + (h * 0.5) + horizonShift;
                    let fog = Math.max(0, 1 - (cDist / 160));
                    let spriteW = h * 0.4 * s.scale;

                    ctx.save();
                    ctx.beginPath(); ctx.rect(sx - spriteW, 0, spriteW * 2, canvas.height); ctx.clip();

                    if (s.type === 'lamp') {
                        let ly = baseY - h * 0.9; let lw = Math.max(1, h * 0.03);
                        ctx.fillStyle = `rgba(20,20,25,${fog})`; ctx.fillRect(sx - lw/2, ly, lw, h * 0.9);
                        // Foco parpadeante
                        let lampFlicker = Math.random() > 0.08 ? 1 : 0.2;
                        ctx.fillStyle = `rgba(255, 235, 150, ${lampFlicker * 0.7 * fog})`;
                        ctx.beginPath(); ctx.arc(sx, ly, h*0.04, 0, Math.PI*2); ctx.fill();
                    } 
                    else if (s.type === 'rubble_pile') {
                        ctx.fillStyle = `rgba(30, 25, 25, ${fog})`;
                        ctx.beginPath(); ctx.moveTo(sx - spriteW*0.4, baseY); ctx.lineTo(sx, baseY - h*0.15); ctx.lineTo(sx + spriteW*0.4, baseY); ctx.closePath(); ctx.fill();
                    } 
                    else if (s.type === 'dead_tree') {
                        let trunkW = Math.max(1, h * 0.025 * s.scale);
                        ctx.fillStyle = `rgba(22, 16, 16, ${fog})`;
                        ctx.fillRect(sx - trunkW/2, baseY - h * 0.6 * s.scale, trunkW, h * 0.6 * s.scale);
                        // Ramas filosas procedimentales fijas
                        ctx.strokeStyle = `rgba(22, 16, 16, ${fog})`; ctx.lineWidth = trunkW*0.6;
                        ctx.beginPath(); ctx.moveTo(sx, baseY - h*0.4); ctx.lineTo(sx - h*0.15, baseY - h*0.55); ctx.moveTo(sx, baseY - h*0.5); ctx.lineTo(sx + h*0.13, baseY - h*0.65); ctx.stroke();
                    }
                    else if (s.type === 'ammo') {
                        let bw = h*0.09;
                        ctx.fillStyle = `rgba(190, 130, 10, ${fog})`; ctx.fillRect(sx - bw/2, baseY - bw * 0.7, bw, bw*0.7);
                        ctx.fillStyle = `#000`; ctx.fillRect(sx - bw*0.2, baseY - bw*0.5, bw*0.4, bw*0.1);
                    }
                    ctx.restore();
                }
            });

            // RENDERIZADO AVANZADO DE LA CRIATURA (Glitches, deformaciones y espasmos)
            if (monster.active && gameRunning) {
                let dx = monster.x - player.x;
                let dy = monster.y - player.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                let angle = Math.atan2(dy, dx);
                let diff = player.angle - angle;
                diff = Math.atan2(Math.sin(diff), Math.cos(diff));

                if (Math.abs(diff) < fov / 2 && dist < 170) {
                    let mDist = dist * Math.cos(diff);
                    let rayIdx = Math.floor(((diff + (fov / 2)) / fov) * numRays);
                    rayIdx = numRays - 1 - rayIdx;

                    if (rayIdx >= 0 && rayIdx < numRays && zBuffer[rayIdx] > mDist) {
                        let mHeight = (canvas.height * 1.55) / mDist;
                        
                        // EFECTO CREEPY: Deformación por asimetría y distorsión de escala corporal
                        let breathScale = 1.0 + Math.sin(performance.now() * 0.015) * 0.06;
                        let monsterJitter = (Math.random() - 0.5) * (mHeight * (monster.state === 2 ? 0.07 : 0.025));
                        
                        let mx = (canvas.width / 2) - (diff * (canvas.width / fov)) - (mHeight / 4) + monsterJitter;
                        let baseY = (canvas.height / 2) + (mHeight * 0.5) + horizonShift;

                        let fog = Math.max(0, 1 - (mDist / 150));
                        let flash = Math.max(0, 1 - (mDist / 100));
                        let light = Math.min(1, (0.03 * fog) + (flash * 0.97));

                        // Paleta de colores orgánicos corruptos
                        let colBody = `rgba(${Math.floor(135 * light)}, ${Math.floor(80 * light)}, ${Math.floor(85 * light)}, ${fog})`;
                        let colTentacle = `rgba(${Math.floor(65 * light)}, ${Math.floor(10 * light)}, ${Math.floor(15 * light)}, ${fog})`;
                        let colGlow = `rgba(255, 255, 255, ${fog})`;

                        if (monster.health <= 2) { // Tonalidad de agonía violenta
                            colBody = `rgba(${Math.floor(55 * light)}, 5, 5, ${fog})`;
                        }

                        // Animación de Extremidades Quebradas / Araña humana
                        let t = performance.now();
                        let spineSway = Math.sin(monster.walkAnim * 1.6) * (mHeight * 0.09);
                        let pelvisY = baseY - (mHeight * 0.42);
                        let chestX = mx + spineSway + (mHeight * 0.1);
                        let chestY = pelvisY - (mHeight * 0.3) * breathScale;
                        let torsoW = mHeight * 0.28;

                        ctx.lineWidth = Math.max(1.5, mHeight * 0.02);
                        ctx.strokeStyle = colTentacle;

                        // Pierna Izquierda Quebrada
                        let legCycleL = Math.sin(monster.walkAnim * 2.2);
                        let kneeLX = mx + (mHeight * 0.04) + legCycleL * 8;
                        let kneeLY = pelvisY + (mHeight * 0.18);
                        ctx.beginPath();
                        ctx.moveTo(mx + mHeight * 0.05, pelvisY);
                        ctx.lineTo(kneeLX, kneeLY);
                        ctx.lineTo(mx - (monster.state === 2 ? 10 : 0) + legCycleL * 15, baseY);
                        ctx.stroke();

                        // Pierna Derecha (Asimétrica y más larga)
                        let legCycleR = Math.cos(monster.walkAnim * 2.2);
                        let kneeRX = mx + torsoW - (mHeight * 0.04) - legCycleR * 6;
                        let kneeRY = pelvisY + (mHeight * 0.22);
                        ctx.beginPath();
                        ctx.moveTo(mx + torsoW - mHeight * 0.05, pelvisY);
                        ctx.lineTo(kneeRX, kneeRY);
                        ctx.lineTo(mx + torsoW + 5 - legCycleR * 12, baseY);
                        ctx.stroke();

                        // Tronco Corpóreo
                        ctx.fillStyle = colBody;
                        ctx.beginPath();
                        ctx.moveTo(mx, pelvisY); ctx.lineTo(mx + torsoW, pelvisY);
                        ctx.lineTo(chestX + torsoW * 0.8, chestY); ctx.lineTo(chestX, chestY);
                        ctx.closePath(); ctx.fill();

                        // Brazos Largos arrastrándose en ángulos creepies
                        let armSway = Math.sin(monster.walkAnim * 1.5);
                        ctx.beginPath();
                        ctx.moveTo(chestX, chestY + 5);
                        ctx.lineTo(chestX - h*0.08, chestY + mHeight * 0.2 + armSway*6);
                        ctx.lineTo(chestX - h*0.12, baseY - 2); // Toca el suelo
                        ctx.stroke();

                        ctx.beginPath();
                        ctx.moveTo(chestX + torsoW * 0.8, chestY + 5);
                        ctx.lineTo(chestX + torsoW + h*0.08, chestY + mHeight * 0.2 - armSway*6);
                        ctx.lineTo(chestX + torsoW + h*0.14, baseY - 5);
                        ctx.stroke();

                        // Cabeza e hiper-extensión de la mandíbula (Efecto Smile.wav)
                        let headX = chestX + (torsoW * 0.45);
                        let headY = chestY - (mHeight * 0.12);
                        let headRad = mHeight * 0.12;

                        ctx.fillStyle = colBody;
                        ctx.beginPath();
                        ctx.arc(headX, headY, headRad, Math.PI, 0);
                        ctx.fill();

                        // Mandíbula descolgada desencadenada por cercanía
                        let jawExt = (monster.state === 2 ? mHeight * 0.18 : mHeight * 0.09) + Math.sin(t*0.03)*3;
                        ctx.fillStyle = '#0a0505';
                        ctx.beginPath();
                        ctx.moveTo(headX - headRad, headY);
                        ctx.lineTo(headX + headRad, headY);
                        ctx.lineTo(headX + headRad * 0.6, headY + jawExt);
                        ctx.lineTo(headX - headRad * 0.6, headY + jawExt);
                        ctx.closePath(); ctx.fill();

                        // Ojos Blancos Brillantes sin pupilas
                        ctx.fillStyle = colGlow;
                        ctx.beginPath();
                        ctx.arc(headX - headRad * 0.35, headY - headRad * 0.15, headRad * 0.2, 0, Math.PI * 2);
                        ctx.arc(headX + headRad * 0.35, headY - headRad * 0.15, headRad * 0.2, 0, Math.PI * 2);
                        ctx.fill();

                        // Sonrisa Demente Estirada con dientes negros expuestos
                        ctx.strokeStyle = '#000'; ctx.lineWidth = Math.max(1, mHeight * 0.015);
                        ctx.beginPath();
                        ctx.arc(headX, headY + jawExt * 0.3, headRad * 0.7, 0.1, Math.PI - 0.1);
                        ctx.stroke();
                    }
                }
            }

            // Balas del jugador
            bullets3D.forEach(b => {
                let size = Math.max(1.5, (canvas.height * 0.04) / b.distance);
                let bx = canvas.width / 2;
                let by = (canvas.height / 1.7) + (horizonShift * 0.5) - (b.distance * 0.18);
                if (by > 0 && b.distance < 180) {
                    ctx.fillStyle = '#ff3300'; ctx.beginPath(); ctx.arc(bx, by, size, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = '#ffcc00'; ctx.beginPath(); ctx.arc(bx, by, size*0.5, 0, Math.PI * 2); ctx.fill();
                }
            });

            drawRain();

            // Flash de impactos o daño
            if (damageFlashActive > 0) {
                ctx.fillStyle = damageFlashActive === 5 ? 'rgba(180,0,0,0.5)' : (damageFlashActive === 2 ? 'rgba(0,255,100,0.2)' : 'rgba(255,255,255,0.12)');
                ctx.fillRect(0,0,canvas.width,canvas.height);
                damageFlashActive = 0;
            }
        }

        function drawRain() {
            ctx.lineWidth = 1;
            for(let r of rain) {
                if(r.splash > 0) {
                    ctx.strokeStyle = `rgba(130,120,150,${r.splash * 0.15})`;
                    ctx.beginPath(); ctx.ellipse(r.x/PIXEL_SCALE, (canvas.height - 8), r.splash * 1.8, r.splash * 0.4, 0, 0, Math.PI*2); ctx.stroke();
                    r.splash -= 0.25;
                    if(r.splash <= 0) { r.y = Math.random() * -80; r.x = Math.random() * window.innerWidth; }
                } else {
                    ctx.strokeStyle = 'rgba(110,105,135,0.18)';
                    let rx = r.x / PIXEL_SCALE; let ry = r.y / PIXEL_SCALE;
                    ctx.beginPath(); ctx.moveTo(rx, ry); ctx.lineTo(rx - 1, ry + 7); ctx.stroke();
                    r.y += r.v;
                    if (r.y > window.innerHeight - 20) { r.splash = 2.5; }
                }
            }
        }

        function drawRadar() {
            rCtx.clearRect(0,0,160,160);
            const scale = 160 / MAP_SIZE;
            
            // Casas en radar
            rCtx.fillStyle = '#251a2e';
            for(let h of houses) rCtx.fillRect(h.x * scale, h.y * scale, h.w * scale, h.h * scale);
            
            // Consumibles
            rCtx.fillStyle = '#ddaa00';
            for(let b of ammoBoxes) rCtx.fillRect(b.x * scale - 1, b.y * scale - 1, 3, 3);
            
            // Alarma de Entidad parpadeante
            if (monster.active && Math.floor(performance.now() / 150) % 2 === 0) {
                rCtx.fillStyle = '#ff0033'; rCtx.beginPath(); rCtx.arc(monster.x * scale, monster.y * scale, 4, 0, Math.PI*2); rCtx.fill();
            }
            
            // Jugador
            rCtx.fillStyle = '#00ff66'; rCtx.save(); rCtx.translate(player.x * scale, player.y * scale); rCtx.rotate(player.angle);
            rCtx.beginPath(); rCtx.moveTo(6, 0); rCtx.lineTo(-4, -3.5); rCtx.lineTo(-4, 3.5); rCtx.closePath(); rCtx.fill(); rCtx.restore();
        }

        window.addEventListener('mousedown', () => {
            if (!gameRunning || player.ammo <= 0 || player.health <= 0) return;
            player.ammo--;
            document.getElementById('ammo').innerText = "CARTUCHOS: " + player.ammo;
            
            playWeaponSound();
            bullets3D.push({ distance: 8.0, life: 200 });

            let hit = false;
            if (monster.active) {
                let angleMonster = Math.atan2(monster.y - player.y, monster.x - player.x);
                let diff = player.angle - angleMonster;
                diff = Math.atan2(Math.sin(diff), Math.cos(diff));
                let dist = Math.sqrt(Math.pow(player.x - monster.x, 2) + Math.pow(player.y - monster.y, 2));

                if (Math.abs(diff) < 0.28 && dist < 160) {
                    hit = true; monster.health--;
                    monster.state = 2; // Obligar a cargar con furia si es golpeado
                    if (monster.health <= 0) {
                        player.score++;
                        document.getElementById('score').innerText = "ANOMALÍAS DEPURADAS: " + player.score + " / 3";
                        monster.active = false; monster.timer = 0;
                        if (player.score >= 3) endGame(true);
                        else ammoBoxes.push({ x: monster.x, y: monster.y, seed: Math.random() });
                    }
                }
            }
            damageFlashActive = hit ? 2 : 1;
        });

        function playWeaponSound() {
            if(!audioCtx) return;
            try {
                let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.17);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.18);
            } catch(e){}
        }

        function releaseTheStorm() {
            if(introMusicInterval) clearInterval(introMusicInterval);
            isIntroActive = false;
            
            document.getElementById('rpg-dialogue-box').style.display = 'none';
            document.getElementById('ui').style.display = 'block';
            document.getElementById('radar-container').style.display = 'block';
            
            // Disparar música gal.wav en bucle infinito de fondo
            sndGal.volume = 0.5;
            sndGal.play().catch(()=>{});

            try { canvas.requestPointerLock(); } catch(e){}
            gameRunning = true;
            lastTime = performance.now();
        }

        function endGame(victory) {
            gameRunning = false;
            sndGal.pause();
            document.exitPointerLock();
            const screen = document.getElementById('end-screen');
            const title = document.getElementById('end-title');
            const desc = document.getElementById('end-desc');
            
            if (victory) {
                screen.style.backgroundColor = "rgba(4, 25, 12, 0.98)";
                title.style.color = "#00ff66"; title.innerText = "TERRENO ASEGURADO";
                desc.innerText = "Arquitecto Burdo: Impresionante. Has disuelto la distorsión biológica. El concreto hidráulico y las varillas ya vienen en camino a Torreon't. La producción se normaliza. Presiona F5 para re-evaluar sectores.";
            } else {
                screen.style.backgroundColor = "rgba(28, 3, 6, 0.99)";
                title.style.color = "#ff1111"; title.innerText = "CONTRATO RESCINDIDO";
                desc.innerText = "Tu estructura colapsó ante las fauces de la entidad. Las casas jamás serán terminadas. Tu liquidación fue procesada en el vacío. Presiona F5 para revocar el despido.";
            }
            screen.style.display = 'flex';
        }

        let lastTime = performance.now();
        function loop() {
            let now = performance.now(); let delta = now - lastTime; lastTime = now;
            if (gameRunning && player.health > 0) {
                movePlayer();
                updateMonsterAI(delta);
            }
            render3DScene();
            if (gameRunning) drawRadar();
            requestAnimationFrame(loop);
        }
        requestAnimationFrame(loop);
    </script>
</body>
