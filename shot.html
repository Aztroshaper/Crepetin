<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Construyendo Sonrisas - Operativo de Contención Urbana</title>
    <style>
        body, html {
            margin: 0; padding: 0; overflow: hidden;
            width: 100%; height: 100%; background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }
        #viewport-container {
            position: relative; width: 100vw; height: 100vh;
        }
        #gameCanvas {
            display: block; width: 100%; height: 100%;
        }
        #crosshair {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 4px; height: 4px; background-color: rgba(0, 255, 255, 0.9);
            border-radius: 50%; z-index: 5; display: none;
            box-shadow: 0 0 6px #00ffff;
        }
        #damage-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(255, 0, 0, 0); pointer-events: none; z-index: 3;
            transition: background-color 0.1s ease-out;
        }
        
        /* Interfaz de Diálogo y Menús */
        #main-menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #08101a 0%, #000000 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; z-index: 30; text-align: center;
        }
        .title { font-size: 42px; font-weight: bold; letter-spacing: 6px; text-shadow: 0 0 20px #00ffff; margin-bottom: 10px; }
        .subtitle { font-size: 14px; color: #00ffaa; margin-bottom: 40px; letter-spacing: 3px; }
        
        .btn {
            background-color: #050b10; color: #fff; border: 1px solid #00ffaa;
            padding: 15px 40px; font-size: 15px; font-family: 'Courier New', monospace; cursor: pointer;
            transition: all 0.2s; margin: 10px; text-transform: uppercase; letter-spacing: 2px;
        }
        .btn:hover { background-color: #003322; box-shadow: 0 0 15px rgba(0,255,170,0.5); }
        .btn-skip { background-color: #111; padding: 10px 20px; font-size: 12px; border-color: #444; color: #aaa; }
        
        #dialogue-box {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 800px; background-color: rgba(2, 6, 10, 0.96);
            border: 2px solid #00ffaa; padding: 25px; z-index: 10; display: none;
            box-shadow: 0 0 30px rgba(0, 255, 170, 0.15);
        }
        #dialogue-speaker { color: #00ffaa; font-weight: bold; font-size: 17px; margin-bottom: 15px; letter-spacing: 3px; border-bottom: 1px dashed #00ffaa; padding-bottom: 5px; }
        #dialogue-text { font-size: 15px; line-height: 1.6; color: #eceff4; min-height: 80px; margin-bottom: 20px; }
        #dialogue-controls { display: flex; justify-content: space-between; align-items: center; }
        
        /* HUD Operativo */
        #hud {
            position: absolute; bottom: 30px; left: 30px; color: #fff; font-size: 16px;
            font-weight: bold; pointer-events: none; z-index: 5; display: none;
            text-shadow: 2px 2px 0px #000; letter-spacing: 2px;
        }
        .stat-row { margin-bottom: 8px; }
        .hud-hint { font-size: 12px; color: #aaaaaa; margin-top: 15px; font-weight: normal; }
        
        #radar-container {
            position: absolute; top: 30px; right: 30px; width: 160px; height: 160px;
            border: 2px solid #00ffaa; background-color: rgba(2, 5, 8, 0.9); z-index: 5;
            box-shadow: 0 0 20px rgba(0,0,0,0.8); display: none;
        }

        #end-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none;
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 20; text-align: center; background-color: rgba(0,0,0,0.95); color: white;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
</head>
<body>

    <div id="viewport-container">
        <div id="damage-overlay"></div>
        <div id="crosshair"></div>
        
        <div id="main-menu">
            <div class="title">CONSTRUYENDO SONRISAS</div>
            <div class="subtitle">[ TERMINAL DE ENLACE NEUROMODULAR ]</div>
            <button class="btn" onclick="startSystem()">Establecer Conexión</button>
        </div>

        <div id="dialogue-box">
            <div id="dialogue-speaker">ARQUITECTO BURDO</div>
            <div id="dialogue-text"></div>
            <div id="dialogue-controls">
                <button class="btn btn-skip" onclick="skipDialogue()">SALTAR TRANSMISIÓN</button>
                <button id="next-btn" class="btn" style="display:none;" onclick="startGame()">DESPLEGAR EN EL PERÍMETRO</button>
            </div>
        </div>

        <div id="end-screen">
            <h1 id="end-title" class="title"></h1>
            <p id="end-desc" style="color: #ccc; font-size: 15px; max-width: 600px; line-height: 1.8; margin-bottom: 30px;"></p>
            <button class="btn" onclick="location.reload()">REINICIAR UNIDAD</button>
        </div>

        <div id="hud">
            <div class="stat-row" id="ui-health" style="color: #ff3333;">ESTADO CORPORAL: [IIIII]</div>
            <div class="stat-row" id="ui-ammo" style="color: #00ffff;">DARDOS SEDANTES: 15</div>
            <div class="stat-row" id="ui-score" style="color: #00ffaa;">SUJETOS NEUTRALIZADOS: 0 / 3</div>
            <div class="hud-hint">[Q] DETONAR DESTELLO CEGADOR</div>
        </div>

        <div id="radar-container">
            <canvas id="radarCanvas" width="160" height="160"></canvas>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        // --- ESTADO GLOBAL DEL ENTORNO ---
        let gameRunning = false;
        let playerStats = { health: 5, ammo: 15, score: 0 };
        const MAP_SIZE = 450; 

        // --- SISTEMA DE AUDIO NATIVO Y SEGURO (Bypass CORS) ---
        let sndGal = new Audio('gal.mp3'); sndGal.loop = true;
        let sndGal2 = new Audio('gal2.wav');
        let sndFoto = new Audio('foto.wav');
        let sndAgua = new Audio('agua.mp3'); sndAgua.loop = true; sndAgua.volume = 0.6;
        
        // Sonido de la criatura (se calculará el volumen manualmente según la distancia)
        let sndSmile = new Audio('smile.wav'); sndSmile.loop = true; sndSmile.volume = 0;

        function startSystem() {
            sndGal.volume = 0.45;
            sndGal.play().catch(()=>{});
            
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('dialogue-box').style.display = 'block';
            typeText();
        }
        
        // --- NARRATIVA ADAPTADA ---
        const dialogues = [
            "Menos mal que logramos enlazar tu frecuencia. Los nuevos bloques de expansión habitacional en Torreón't están completamente paralizados.",
            "Un habitante local se ha infiltrado en el núcleo de las estructuras en desarrollo. Ha desmantelado el cableado maestro y se muestra extremadamente violento.",
            "Nuestras cuadrillas de ingenieros no pueden aproximarse sin ser atacadas. Tu directiva consiste en adentrarte en el perímetro delimitado y frenar su avance.",
            "Llevas un inyector neumático y un emisor de destellos en tu traje. Úsalo para paralizarlo temporalmente si se acerca demasiado.",
            "Su estado de alteración es severo. Dispárale tus dardos sedantes en 3 ocasiones para inmovilizarlo por completo. Escucha su proximidad. Muévete."
        ];
        let dialogueStep = 0; let charIndex = 0; let typingTimeout; let isTyping = false;

        function typeText() {
            if (dialogueStep >= dialogues.length) {
                document.querySelector('.btn-skip').style.display = 'none';
                document.getElementById('next-btn').style.display = 'block';
                return;
            }
            isTyping = true;
            const textElement = document.getElementById('dialogue-text');
            const currentLine = dialogues[dialogueStep];
            
            textElement.innerText = currentLine.substring(0, charIndex);
            charIndex++;

            if (charIndex <= currentLine.length) {
                typingTimeout = setTimeout(typeText, 30);
            } else {
                isTyping = false; dialogueStep++; charIndex = 0;
                setTimeout(typeText, 2800); 
            }
        }

        function skipDialogue() {
            clearTimeout(typingTimeout);
            document.getElementById('dialogue-text').innerText = "Protocolos de contención química validados. Despliegue perimetral autorizado.";
            document.querySelector('.btn-skip').style.display = 'none';
            document.getElementById('next-btn').style.display = 'block';
        }

        function startGame() {
            document.getElementById('dialogue-box').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            document.getElementById('crosshair').style.display = 'block';
            document.getElementById('radar-container').style.display = 'block';
            
            if (sndGal.paused) sndGal.play().catch(()=>{});
            controls.lock(); gameRunning = true;
        }

        // ==========================================
        //       MOTOR RENDERIZADO TRIDIMENSIONAL
        // ==========================================
        const canvas = document.getElementById('gameCanvas');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x010408, 0.016); 

        const camera = new THREE.PerspectiveCamera(72, window.innerWidth / window.innerHeight, 0.1, 750);
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio > 1 ? 1.5 : 1); 
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        const controls = new THREE.PointerLockControls(camera, document.body);
        scene.add(controls.getObject());
        controls.getObject().position.set(225, 6, 225); 

        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false, isRunning = false;
        let isWalkingAudioPlaying = false;
        let velocity = new THREE.Vector3(); let direction = new THREE.Vector3();
        const playerHeight = 6;
        const boundingBoxes = []; 
        const radarObjects = []; 

        const ambientLight = new THREE.AmbientLight(0x0e141f, 0.4);
        scene.add(ambientLight);

        const moonLight = new THREE.DirectionalLight(0x445577, 0.6);
        moonLight.position.set(80, 180, 80);
        moonLight.castShadow = true;
        moonLight.shadow.mapSize.width = 1024; moonLight.shadow.mapSize.height = 1024;
        moonLight.shadow.camera.left = -225; moonLight.shadow.camera.right = 225;
        moonLight.shadow.camera.top = 225; moonLight.shadow.camera.bottom = -225;
        scene.add(moonLight);

        const flashlight = new THREE.SpotLight(0xffffff, 2.5, 95, Math.PI / 5.5, 0.4, 0.8);
        flashlight.castShadow = true;
        flashlight.shadow.mapSize.width = 512; flashlight.shadow.mapSize.height = 512;
        flashlight.shadow.bias = -0.001;
        camera.add(flashlight);
        
        const flashlightTarget = new THREE.Object3D();
        flashlightTarget.position.set(0, 0, -1);
        camera.add(flashlightTarget);
        flashlight.target = flashlightTarget;

        function createNoiseTexture(baseColor, noiseColor) {
            const size = 256; const canvasTex = document.createElement('canvas');
            canvasTex.width = size; canvasTex.height = size; const ctx = canvasTex.getContext('2d');
            ctx.fillStyle = baseColor; ctx.fillRect(0, 0, size, size);
            for(let i=0; i<6000; i++) {
                ctx.fillStyle = Math.random() > 0.5 ? noiseColor : baseColor;
                ctx.fillRect(Math.random()*size, Math.random()*size, 2, 2);
            }
            const texture = new THREE.CanvasTexture(canvasTex);
            texture.wrapS = THREE.RepeatWrapping; texture.wrapT = THREE.RepeatWrapping;
            return texture;
        }

        const texSuelo = createNoiseTexture('#111612', '#162017'); texSuelo.repeat.set(35, 35);
        const texPared = createNoiseTexture('#3c2a25', '#4d3832'); texPared.repeat.set(2, 2);

        const matPiso = new THREE.MeshStandardMaterial({ map: texSuelo, roughness: 0.95 });
        const matPared = new THREE.MeshStandardMaterial({ map: texPared, roughness: 0.85 });
        const matTecho = new THREE.MeshStandardMaterial({ color: 0x0c0c0e, roughness: 0.6 });
        
        const plane = new THREE.Mesh(new THREE.PlaneGeometry(MAP_SIZE, MAP_SIZE), matPiso);
        plane.rotation.x = -Math.PI / 2; plane.position.set(MAP_SIZE/2, 0, MAP_SIZE/2);
        plane.receiveShadow = true; scene.add(plane);

        function buildMapBarriers() {
            const hWall = 26; const tWall = 6;
            const wallN = new THREE.Mesh(new THREE.BoxGeometry(MAP_SIZE, hWall, tWall), matPared);
            wallN.position.set(MAP_SIZE/2, hWall/2, 0); scene.add(wallN);
            boundingBoxes.push(new THREE.Box3().setFromObject(wallN));
            radarObjects.push({ x: 0, z: -tWall, w: MAP_SIZE, d: tWall, isWall: true });

            const wallS = new THREE.Mesh(new THREE.BoxGeometry(MAP_SIZE, hWall, tWall), matPared);
            wallS.position.set(MAP_SIZE/2, hWall/2, MAP_SIZE); scene.add(wallS);
            boundingBoxes.push(new THREE.Box3().setFromObject(wallS));
            radarObjects.push({ x: 0, z: MAP_SIZE, w: MAP_SIZE, d: tWall, isWall: true });

            const wallE = new THREE.Mesh(new THREE.BoxGeometry(tWall, hWall, MAP_SIZE), matPared);
            wallE.position.set(MAP_SIZE, hWall/2, MAP_SIZE/2); scene.add(wallE);
            boundingBoxes.push(new THREE.Box3().setFromObject(wallE));
            radarObjects.push({ x: MAP_SIZE, z: 0, w: tWall, d: MAP_SIZE, isWall: true });

            const wallW = new THREE.Mesh(new THREE.BoxGeometry(tWall, hWall, MAP_SIZE), matPared);
            wallW.position.set(0, hWall/2, MAP_SIZE/2); scene.add(wallW);
            boundingBoxes.push(new THREE.Box3().setFromObject(wallW));
            radarObjects.push({ x: -tWall, z: 0, w: tWall, d: MAP_SIZE, isWall: true });
        }
        buildMapBarriers();

        const ammoBoxes = [];
        function initEnvironment() {
            const spacing = 65;
            for (let x = 45; x < MAP_SIZE - 45; x += spacing) {
                for (let z = 45; z < MAP_SIZE - 45; z += spacing) {
                    if (Math.abs(x - 225) < 50 && Math.abs(z - 225) < 50) continue; 

                    if (Math.random() > 0.35) {
                        let houseW = 24 + Math.random()*14; let houseD = 24 + Math.random()*14; let houseH = 16 + Math.random()*12;
                        const houseMesh = new THREE.Mesh(new THREE.BoxGeometry(houseW, houseH, houseD), matPared);
                        houseMesh.position.set(x, houseH/2, z); houseMesh.castShadow = true; houseMesh.receiveShadow = true;
                        scene.add(houseMesh);

                        const roofMesh = new THREE.Mesh(new THREE.BoxGeometry(houseW * 1.08, 2, houseD * 1.08), matTecho);
                        roofMesh.position.set(x, houseH + 1, z); roofMesh.castShadow = true; scene.add(roofMesh);

                        boundingBoxes.push(new THREE.Box3().setFromObject(houseMesh));
                        radarObjects.push({ x: x - houseW/2, z: z - houseD/2, w: houseW, d: houseD, isWall: false });

                        if (Math.random() > 0.4) {
                            const poste = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 19), matTecho);
                            poste.position.set(x - houseW/2 - 4, 9.5, z - houseD/2 - 4); scene.add(poste);
                            
                            const light = new THREE.PointLight(0xffe6b3, 1.4, 75);
                            light.position.set(x - houseW/2 - 4, 19, z - houseD/2 - 4);
                            scene.add(light);
                            light.userData = { isFlickering: Math.random() > 0.75 };
                        }
                    } else {
                        const tHeight = 14 + Math.random()*8;
                        const tronco = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 1.3, tHeight), matPared);
                        tronco.position.set(x, tHeight/2, z); tronco.castShadow = true; scene.add(tronco);
                        
                        const hojas = new THREE.Mesh(new THREE.DodecahedronGeometry(6 + Math.random()*3, 0), matTecho);
                        hojas.position.set(x, tHeight + 1.5, z); hojas.castShadow = true; scene.add(hojas);
                        boundingBoxes.push(new THREE.Box3().setFromObject(tronco));
                    }
                }
            }
        }
        initEnvironment();

        function spawnAmmo(x, z) {
            const ammoGroup = new THREE.Group();
            const boxMat = new THREE.MeshStandardMaterial({ color: 0x00ffaa, roughness: 0.2, emissive: 0x004433, emissiveIntensity: 0.8 });
            const ammoBox = new THREE.Mesh(new THREE.BoxGeometry(2, 1, 2), boxMat);
            ammoBox.position.y = 0; ammoBox.castShadow = true; 
            ammoGroup.add(ammoBox);
            
            const glowLight = new THREE.PointLight(0x00ffaa, 1.5, 20);
            glowLight.position.y = 1; ammoGroup.add(glowLight);
            ammoGroup.position.set(x, 0, z); scene.add(ammoGroup);
            
            ammoBoxes.push({ mesh: ammoGroup, box: new THREE.Box3(), seed: Math.random() * 100 });
        }
        for(let i=0; i<12; i++) spawnAmmo(Math.random()*(MAP_SIZE-60)+30, Math.random()*(MAP_SIZE-60)+30);

        // --- MODELADO DE LA ENTIDAD (MÁS BAJA Y CON 3 ARTICULACIONES POR EXTREMIDAD) ---
        const monster = new THREE.Group();
        monster.active = false; monster.health = 7; monster.state = 0; monster.timer = 0; monster.speed = 46.0;
        monster.stunTimer = 0;
        monster.circleAngle = 0; // Para el comportamiento de correr en círculos

        // Emisor de ondas de luz masivas (estado 3)
        const monsterWaveLight = new THREE.PointLight(0xffffff, 0, 300);
        monsterWaveLight.position.y = 5;
        monster.add(monsterWaveLight);

        const matMutant = new THREE.MeshStandardMaterial({ color: 0x1f1212, roughness: 0.5, metalness: 0.05 });
        const matSpike = new THREE.MeshStandardMaterial({ color: 0x0a0a0d, roughness: 0.8 });
        const matEyes = new THREE.MeshBasicMaterial({ color: 0xffffff }); 

        // Torso acortado (Chaparro)
        const torso = new THREE.Mesh(new THREE.BoxGeometry(1.2, 8, 1.2), matMutant);
        torso.position.y = 9; torso.castShadow = true; monster.add(torso);

        const head = new THREE.Mesh(new THREE.BoxGeometry(1.4, 2.6, 1.7), matMutant);
        head.position.set(0, 4.8, 0.4); head.castShadow = true; torso.add(head);

        const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.18), matEyes); eyeL.position.set(-0.45, 0.6, 0.85); head.add(eyeL);
        const eyeR = new THREE.Mesh(new THREE.SphereGeometry(0.18), matEyes); eyeR.position.set(0.45, 0.6, 0.85); head.add(eyeR);

        const jaw = new THREE.Mesh(new THREE.BoxGeometry(1.3, 1.6, 1.5), matSpike); jaw.position.set(0, -1.7, 0.15); head.add(jaw);

        for(let i=0; i<3; i++) {
            let pua = new THREE.Mesh(new THREE.ConeGeometry(0.18, 3.2, 4), matSpike);
            pua.position.set(0, 2.5 - i*2.5, -0.65); pua.rotation.x = -Math.PI/2.8; torso.add(pua);
        }

        // Sistema de 3 Segmentos para las Extremidades
        function createTripleArticulatedLimb(x, y, isArm) {
            const pivotBase = new THREE.Group(); pivotBase.position.set(x, y, 0);
            const len1 = isArm ? 4.5 : 5.0; const len2 = isArm ? 4.0 : 4.5; const len3 = isArm ? 3.5 : 4.0;
            const thickness = isArm ? 0.35 : 0.55;

            // Segmento 1
            const segment1 = new THREE.Mesh(new THREE.BoxGeometry(thickness, len1, thickness), matMutant);
            segment1.position.y = -len1 / 2; segment1.castShadow = true; pivotBase.add(segment1);

            // Segmento 2
            const pivotJoint = new THREE.Group(); pivotJoint.position.set(0, -len1, 0);
            const segment2 = new THREE.Mesh(new THREE.BoxGeometry(thickness*0.8, len2, thickness*0.8), matMutant);
            segment2.position.y = -len2 / 2; segment2.castShadow = true; pivotJoint.add(segment2);
            
            // Segmento 3
            const pivotWrist = new THREE.Group(); pivotWrist.position.set(0, -len2, 0);
            const segment3 = new THREE.Mesh(new THREE.BoxGeometry(thickness*0.6, len3, thickness*0.6), matMutant);
            segment3.position.y = -len3 / 2; segment3.castShadow = true; pivotWrist.add(segment3);

            const apex = new THREE.Mesh(new THREE.ConeGeometry(thickness, 2.2, 4), matSpike);
            apex.position.set(0, -len3/2 - 1, 0); apex.rotation.x = Math.PI; segment3.add(apex);

            pivotJoint.add(pivotWrist); pivotBase.add(pivotJoint); torso.add(pivotBase);
            return { base: pivotBase, joint: pivotJoint, wrist: pivotWrist };
        }

        const armL = createTripleArticulatedLimb(-1.1, 3.5, true); const armR = createTripleArticulatedLimb(1.1, 3.5, true);
        const legL = createTripleArticulatedLimb(-0.65, -3.5, false); const legR = createTripleArticulatedLimb(0.65, -3.5, false);

        scene.add(monster);
        const monsterHitbox = new THREE.Box3();

        // --- TRAZADORES QUÍMICOS ---
        const bullets = [];
        const bulletGeo = new THREE.SphereGeometry(0.18, 4, 4);
        const bulletMat = new THREE.MeshBasicMaterial({ color: 0x00ffff }); 
        const overlay = document.getElementById('damage-overlay');

        function updateHUD() {
            let hb = "["; for(let i=0; i<5; i++) hb += (i < playerStats.health) ? "I" : "."; hb += "]";
            document.getElementById('ui-health').innerText = `ESTADO CORPORAL: ${hb}`;
            document.getElementById('ui-ammo').innerText = `DARDOS SEDANTES: ${playerStats.ammo}`;
            document.getElementById('ui-score').innerText = `SUJETOS NEUTRALIZADOS: ${playerStats.score} / 3`;
        }

        function flashScreen(color) {
            overlay.style.transition = 'none'; overlay.style.backgroundColor = color;
            setTimeout(() => { overlay.style.transition = 'background-color 0.2s'; overlay.style.backgroundColor = 'rgba(0,0,0,0)'; }, 50);
        }

        document.addEventListener('mousedown', () => {
            if (!gameRunning || !controls.isLocked || playerStats.ammo <= 0 || playerStats.health <= 0) return;
            
            playerStats.ammo--; updateHUD();
            
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator(); const gain = ctx.createGain();
            osc.type = 'triangle'; osc.frequency.setValueAtTime(240, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(15, ctx.currentTime + 0.12);
            gain.gain.setValueAtTime(0.3, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.12);
            osc.connect(gain); gain.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.12);

            const bullet = new THREE.Mesh(bulletGeo, bulletMat);
            bullet.position.copy(controls.getObject().position);
            bullet.position.y -= 0.6; 
            
            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir);
            bullet.position.addScaledVector(dir, 2.5); 
            bullet.velocity = dir.multiplyScalar(380); 
            scene.add(bullet);
            bullets.push(bullet);
        });

        // --- CAPTURA DE ACCIONES ---
        let canFlash = true;

        const onKeyDown = function (e) {
            switch (e.code) {
                case 'KeyW': moveForward = true; break; case 'KeyA': moveLeft = true; break;
                case 'KeyS': moveBackward = true; break; case 'KeyD': moveRight = true; break;
                case 'Space': if (controls.getObject().position.y <= playerHeight + 0.1) velocity.y = 78; break;
                case 'ShiftLeft': isRunning = true; break;
                case 'KeyQ': 
                    if (canFlash && gameRunning && controls.isLocked) {
                        canFlash = false;
                        sndFoto.currentTime = 0; sndFoto.volume = 0.9;
                        sndFoto.play().catch(()=>{});
                        
                        overlay.style.transition = 'none'; overlay.style.backgroundColor = 'rgba(255, 255, 255, 0.98)';
                        setTimeout(() => { overlay.style.transition = 'background-color 1.5s ease-out'; overlay.style.backgroundColor = 'rgba(0,0,0,0)'; }, 100);
                        setTimeout(() => { canFlash = true; }, 4000);

                        if (monster.active) {
                            const pPos = camera.position.clone();
                            const mPos = monster.position.clone();
                            const dist = pPos.distanceTo(mPos);
                            
                            if (dist < 100) { 
                                const dirToMonster = mPos.sub(pPos).normalize();
                                const camDir = new THREE.Vector3();
                                camera.getWorldDirection(camDir);
                                
                                if (camDir.dot(dirToMonster) > 0.35) { 
                                    monster.stunTimer = 2.0; 
                                }
                            }
                        }
                    }
                    break;
            }
        };
        const onKeyUp = function (e) {
            switch (e.code) {
                case 'KeyW': moveForward = false; break; case 'KeyA': moveLeft = false; break;
                case 'KeyS': moveBackward = false; break; case 'KeyD': moveRight = false; break;
                case 'ShiftLeft': isRunning = false; break;
            }
        };
        document.addEventListener('keydown', onKeyDown); document.addEventListener('keyup', onKeyUp);

        function endGame(victory) {
            gameRunning = false; controls.unlock();
            document.getElementById('hud').style.display = 'none';
            document.getElementById('crosshair').style.display = 'none';
            document.getElementById('radar-container').style.display = 'none';
            
            sndSmile.pause(); sndAgua.pause();

            const screen = document.getElementById('end-screen');
            const title = document.getElementById('end-title');
            const desc = document.getElementById('end-desc');
            
            if (victory) {
                title.style.color = "#00ffaa"; title.innerText = "SITUACIÓN CONTROLADA";
                desc.innerText = "El saboteador fue completamente inmovilizado. Los equipos retoman la expansión.";
            } else {
                title.style.color = "#ff3333"; title.innerText = "PERMANENCIA INTERRUMPIDA";
                desc.innerText = "El sujeto neutralizó tus funciones corporales. Pérdida de activo operativo.";
            }
            screen.style.display = 'flex';
        }

        // --- INTERFAZ DE RADAR TÁCTICO 2D CALIBRADO ---
        const radarCanvas = document.getElementById('radarCanvas');
        const rCtx = radarCanvas.getContext('2d');
        function drawRadar() {
            rCtx.clearRect(0,0,160,160);
            const scale = 160 / MAP_SIZE;
            
            rCtx.fillStyle = '#11221a';
            for(let obj of radarObjects) {
                if(obj.isWall) rCtx.fillStyle = '#ffaa00'; else rCtx.fillStyle = '#1c2d3d';
                rCtx.fillRect(obj.x * scale, obj.z * scale, obj.w * scale, obj.d * scale);
            }
            
            const px = controls.getObject().position.x;
            const pz = controls.getObject().position.z;
            
            if (monster.active && Math.floor(Date.now() / 160) % 2 === 0) {
                rCtx.fillStyle = monster.stunTimer > 0 ? '#00ffff' : '#ff3333';
                rCtx.beginPath(); rCtx.arc(monster.position.x * scale, monster.position.z * scale, 3.5, 0, Math.PI*2); rCtx.fill();
            }
            
            const camDir = new THREE.Vector3();
            camera.getWorldDirection(camDir);
            const yawAngle = Math.atan2(camDir.x, -camDir.z);

            rCtx.fillStyle = '#00ffaa';
            rCtx.save();
            rCtx.translate(px * scale, pz * scale);
            rCtx.rotate(yawAngle);
            rCtx.beginPath(); rCtx.moveTo(0, -6); rCtx.lineTo(3.5, 3.5); rCtx.lineTo(-3.5, 3.5); rCtx.fill();
            rCtx.restore();
        }

        let prevTime = performance.now();
        let frameCount = 0;

        // --- BUCLE PRINCIPAL ---
        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now();
            const delta = Math.min((time - prevTime) / 1000, 0.1); 
            frameCount++;
            
            if (controls.isLocked && gameRunning) {
                
                // AUDIO DE PASOS (Agua.mp3)
                const isMoving = moveForward || moveBackward || moveLeft || moveRight;
                if (isMoving && !isWalkingAudioPlaying) {
                    sndAgua.play().catch(()=>{}); isWalkingAudioPlaying = true;
                } else if (!isMoving && isWalkingAudioPlaying) {
                    sndAgua.pause(); isWalkingAudioPlaying = false;
                }

                // Físicas
                velocity.x -= velocity.x * 10.0 * delta; velocity.z -= velocity.z * 10.0 * delta; velocity.y -= 245.0 * delta; 
                direction.z = Number(moveForward) - Number(moveBackward); direction.x = Number(moveRight) - Number(moveLeft); direction.normalize();

                const speedMul = isRunning ? 340.0 : 195.0;
                if (moveForward || moveBackward) velocity.z -= direction.z * speedMul * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * speedMul * delta;

                controls.moveRight(-velocity.x * delta);
                let pPos = controls.getObject().position;
                let pBox = new THREE.Box3(new THREE.Vector3(pPos.x-1.6, 0, pPos.z-1.6), new THREE.Vector3(pPos.x+1.6, playerHeight, pPos.z+1.6));
                for (let box of boundingBoxes) { if (pBox.intersectsBox(box)) { controls.moveRight(velocity.x * delta); velocity.x = 0; break; } }

                controls.moveForward(-velocity.z * delta);
                pPos = controls.getObject().position;
                pBox.set(new THREE.Vector3(pPos.x-1.6, 0, pPos.z-1.6), new THREE.Vector3(pPos.x+1.6, playerHeight, pPos.z+1.6));
                for (let box of boundingBoxes) { if (pBox.intersectsBox(box)) { controls.moveForward(velocity.z * delta); velocity.z = 0; break; } }

                controls.getObject().position.y += (velocity.y * delta);
                if (controls.getObject().position.y < playerHeight) { velocity.y = 0; controls.getObject().position.y = playerHeight; }

                // Munición flotante
                for(let i = ammoBoxes.length - 1; i >= 0; i--) {
                    let ab = ammoBoxes[i]; 
                    ab.mesh.rotation.y += delta * 1.5; 
                    ab.mesh.position.y = Math.sin(time * 0.003 + ab.seed) * 1.2 + 1.0;
                    ab.box.setFromObject(ab.mesh);
                    if (pBox.intersectsBox(ab.box)) {
                        scene.remove(ab.mesh); ammoBoxes.splice(i, 1);
                        playerStats.ammo += 10; updateHUD();
                    }
                }

                // COMPORTAMIENTO DE LA ENTIDAD (IA, Animaciones, Hitbox y Volumen Dinámico)
                monsterHitbox.setFromObject(monster);
                monsterHitbox.expandByScalar(4.0); // HITBOX MUCHO MÁS GRANDE

                if (!monster.active) {
                    monster.timer += delta;
                    if (monster.timer > 4.5) { 
                        monster.position.set(Math.random()*(MAP_SIZE-80)+40, 0, Math.random()*(MAP_SIZE-80)+40);
                        monster.health = 7; monster.state = 0; monster.active = true; monster.timer = 0; monster.speed = 46.0;
                        monster.stunTimer = 0;
                        monsterWaveLight.intensity = 0;
                        sndSmile.play().catch(()=>{});
                    }
                } else {
                    
                    // Cálculo de Volumen por Distancia Lineal
                    const distToPlayer = camera.position.distanceTo(monster.position);
                    sndSmile.volume = Math.max(0, 1 - (distToPlayer / 180)); // Deja de sonar a 180 unidades

                    if (monster.stunTimer > 0) {
                        monster.stunTimer -= delta;
                        const twitch = time * 0.05;
                        torso.rotation.z = Math.sin(twitch * 2.0) * 0.08;
                        torso.rotation.x = Math.cos(twitch * 1.5) * 0.08;
                        jaw.rotation.x = 1.0; 
                    } else {
                        const wSpeed = monster.state === 2 ? 0.03 : 0.018; const wCyc = time * wSpeed;
                        
                        torso.rotation.z = Math.sin(wCyc * 0.4) * 0.08;
                        torso.rotation.x = Math.sin(wCyc * 1.8) * 0.06; 
                        
                        // Animación de 3 articulaciones
                        armL.base.rotation.x = Math.sin(wCyc) * 1.4; armL.joint.rotation.x = Math.abs(Math.cos(wCyc)) * -1.0; armL.wrist.rotation.x = Math.sin(wCyc) * 0.5;
                        armR.base.rotation.x = Math.sin(wCyc + Math.PI) * 1.4; armR.joint.rotation.x = Math.abs(Math.cos(wCyc + Math.PI)) * -1.0; armR.wrist.rotation.x = Math.sin(wCyc + Math.PI) * 0.5;
                        
                        legL.base.rotation.x = Math.sin(wCyc + Math.PI) * 1.2; legL.joint.rotation.x = Math.abs(Math.sin(wCyc + Math.PI)) * 0.6; legL.wrist.rotation.x = -0.3;
                        legR.base.rotation.x = Math.sin(wCyc) * 1.2; legR.joint.rotation.x = Math.abs(Math.sin(wCyc)) * 0.6; legR.wrist.rotation.x = -0.3;
                        
                        jaw.rotation.x = monster.state === 2 ? Math.abs(Math.sin(time*0.06)) * 1.1 : 0.4;
                        head.lookAt(controls.getObject().position);

                        const mPos = monster.position; const cPos = controls.getObject().position;
                        const dx = cPos.x - mPos.x; const dz = cPos.z - mPos.z; const dist = Math.sqrt(dx*dx + dz*dz);

                        // MÁQUINA DE ESTADOS (Nuevos Comportamientos)
                        // Aleatoriedad para comportamientos especiales
                        if (Math.random() < 0.005 && dist > 30 && monster.state === 0) {
                            monster.state = 1; // Correr en círculos
                            monster.circleAngle = Math.atan2(mPos.z - cPos.z, mPos.x - cPos.x);
                        } else if (Math.random() < 0.002 && monster.state === 0) {
                            monster.state = 3; // Emitir onda de luz
                        }

                        if (dist < 45 && monster.state !== 3) monster.state = 2; // Furia inminente
                        if (dist > 80 && monster.state === 1) monster.state = 0; // Perdió interés en circular

                        if (dist > 6) {
                            let cSpeed = monster.state === 2 ? monster.speed * 1.9 : monster.speed;
                            let nx, nz;

                            if (monster.state === 1) {
                                // Mover en círculos
                                monster.circleAngle += (cSpeed * 0.02 * delta);
                                const radius = 40;
                                nx = cPos.x + Math.cos(monster.circleAngle) * radius;
                                nz = cPos.z + Math.sin(monster.circleAngle) * radius;
                                monster.lookAt(new THREE.Vector3(nx, mPos.y, nz));
                            } else if (monster.state === 3) {
                                // Emitir onda luminosa masiva
                                monsterWaveLight.intensity += 1500 * delta;
                                nx = mPos.x; nz = mPos.z; // Se queda quieto
                                if (monsterWaveLight.intensity > 1500) {
                                    monsterWaveLight.intensity = 0;
                                    monster.state = 2; // Despues del destello, ataca
                                }
                            } else {
                                // Persecución normal
                                monster.lookAt(new THREE.Vector3(cPos.x, mPos.y, cPos.z));
                                nx = mPos.x + (dx/dist) * cSpeed * delta; 
                                nz = mPos.z + (dz/dist) * cSpeed * delta;
                            }
                            
                            let collision = false;
                            for(let box of boundingBoxes) { if(box.containsPoint(new THREE.Vector3(nx, 5, nz))) collision = true; }
                            
                            if(!collision) {
                                monster.position.x = nx; monster.position.z = nz;
                            } else if (monster.state !== 1) { // Si no está en modo círculo, esquivar
                                monster.position.x += Math.sin(time*0.004) * 45 * delta;
                                monster.position.z += Math.cos(time*0.004) * 45 * delta;
                            }
                        }

                        if (dist < 9.5) {
                            playerStats.health--; updateHUD(); flashScreen('rgba(255, 0, 0, 0.8)');
                            monster.active = false; monster.timer = 0; monster.position.y = -250;
                            monsterWaveLight.intensity = 0; sndSmile.volume = 0;
                            if(playerStats.health <= 0) endGame(false);
                        }
                    }
                }

                for(let i = bullets.length - 1; i >= 0; i--) {
                    let b = bullets[i]; b.position.addScaledVector(b.velocity, delta);
                    
                    if(monster.active && monsterHitbox.containsPoint(b.position)) {
                        monster.health--; monster.state = 2; monster.stunTimer = 0;
                        monsterWaveLight.intensity = 0;
                        sndGal2.currentTime = 0; sndGal2.volume = 0.85; sndGal2.play().catch(()=>{});
                        flashScreen('rgba(0, 255, 255, 0.35)');
                        
                        if(monster.health <= 0) {
                            playerStats.score++; updateHUD();
                            monster.active = false; monster.position.y = -250;
                            sndSmile.volume = 0;
                            spawnAmmo(monster.position.x, monster.position.z);
                            if (playerStats.score >= 3) endGame(true);
                        }
                        scene.remove(b); bullets.splice(i, 1); continue;
                    }
                    
                    if(b.position.distanceTo(controls.getObject().position) > 280) {
                        scene.remove(b); bullets.splice(i, 1);
                    }
                }

                if(frameCount % 3 === 0) drawRadar();
            }

            if(frameCount % 5 === 0) {
                scene.children.forEach(child => {
                    if(child.isPointLight && child.userData.isFlickering) {
                        child.intensity = Math.random() > 0.16 ? 1.4 : 0.0;
                    }
                });
            }

            renderer.render(scene, camera);
            prevTime = time;
        }

        updateHUD();
        requestAnimationFrame(animate);
    </script>
</body>
</html>
