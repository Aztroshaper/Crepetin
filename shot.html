<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Construyendo Sonrisas</title>
    <style>
        body, html {
            margin: 0; padding: 0; overflow: hidden;
            width: 100%; height: 100%; background-color: #030205;
            font-family: 'Courier New', monospace; user-select: none;
        }
        #viewport-container {
            position: relative; width: 100vw; height: 100vh;
            filter: contrast(1.2) brightness(0.9) saturate(1.1);
        }
        #gameCanvas {
            display: block; width: 100%; height: 100%;
            /* Forzar el renderizado pixelado para mantener la estética PS1 */
            image-rendering: pixelated; 
        }
        #vignette {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.95) 100%);
            pointer-events: none; z-index: 2;
        }
        #damage-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(255, 0, 0, 0); pointer-events: none; z-index: 3;
            transition: background-color 0.1s ease-out;
        }
        #audio-unlocker {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #050408;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: #ff3333; z-index: 30; text-align: center; cursor: pointer;
        }
        #rpg-dialogue-box {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 800px; background-color: rgba(5, 4, 8, 0.95);
            border: 3px solid #ff1111; padding: 25px; z-index: 10;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.2); box-sizing: border-box;
        }
        #rpg-speaker {
            color: #ffaa00; font-weight: bold; font-size: 20px; margin-bottom: 12px;
            text-transform: uppercase; letter-spacing: 3px; border-bottom: 1px dashed #ff1111; padding-bottom: 5px;
        }
        #rpg-text { color: #ddd; font-size: 16px; line-height: 1.6; min-height: 80px; }
        #start-btn {
            display: none; margin: 20px auto 0 auto; background-color: #880000; color: #fff;
            border: 2px solid #ff3333; padding: 12px 30px; font-family: 'Courier New', monospace;
            font-size: 15px; font-weight: bold; letter-spacing: 3px; cursor: pointer;
            box-shadow: 0 0 15px rgba(255,0,0,0.4); animation: pulse 1.5s infinite;
        }
        #start-btn:hover { background-color: #ff1111; }
        @keyframes pulse { 0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; } }
        #ui {
            position: absolute; top: 30px; left: 30px; color: #fff; font-size: 18px;
            pointer-events: none; z-index: 5; text-shadow: 2px 2px #000; letter-spacing: 2px; display: none;
        }
        #radar-container {
            position: absolute; top: 30px; right: 30px; width: 160px; height: 160px;
            border: 2px solid #ff1111; background-color: rgba(3,2,6,0.9); z-index: 5;
            box-shadow: 0 0 20px rgba(0,0,0,0.8); display: none;
        }
        /* Crosshair */
        #crosshair {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 4px; height: 4px; background-color: rgba(255, 255, 255, 0.5);
            border-radius: 50%; z-index: 5; display: none;
        }
        #end-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none;
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 20; text-align: center; font-family: 'Courier New', monospace;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
</head>
<body>

    <div id="viewport-container">
        <div id="vignette"></div>
        <div id="damage-overlay"></div>
        <div id="crosshair"></div>
        
        <div id="audio-unlocker" onclick="unlockAudioAndStartIntro()">
            <h1 style="letter-spacing: 8px; text-shadow: 0 0 20px #ff0000; font-size: 36px;">CONSTRUYENDO SONRISAS 3D</h1>
            <h2 style="color: #ffaa00; letter-spacing: 4px; font-size: 14px; margin-top: 25px; animation: pulse 2s infinite;">[ CLICK PARA ENLAZAR TRANSMISIÓN SENSORIAL ]</h2>
        </div>

        <div id="rpg-dialogue-box" style="display: none;">
            <div id="rpg-speaker">Arquitecto Burdo</div>
            <div id="rpg-text"></div>
            <button id="start-btn" onclick="releaseTheStorm()">INICIAR OPERATIVO URBANO</button>
        </div>

        <div id="end-screen">
            <h1 id="end-title" style="font-size: 55px; letter-spacing: 8px; text-shadow: 0 0 20px rgba(0,0,0,0.8);"></h1>
            <p id="end-desc" style="color: #fff; font-size: 16px; max-width: 600px; line-height: 1.8; padding: 20px;"></p>
        </div>

        <div id="ui">
            <div id="hearts" style="color: #ff3333;">ESTADO CORPORAL: [IIIII]</div>
            <div id="ammo" style="color: #ffaa00; margin-top: 8px;">CARTUCHOS: 10</div>
            <div id="score" style="color: #00ff66; margin-top: 8px;">ANOMALÍAS DEPURADAS: 0 / 3</div>
        </div>

        <div id="radar-container">
            <canvas id="radarCanvas" width="160" height="160"></canvas>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        // --- VARIABLES DE JUEGO Y ESTADO ---
        let gameRunning = false;
        let isIntroActive = false;
        let playerStats = { health: 5, ammo: 10, score: 0 };
        const MAP_SIZE = 400; 
        
        // --- UI Y LORE ---
        let dialogueStep = 0;
        const dialogues = [
            "Menos mal que logramos interceptar tu señal en 3D... La edificación en Torreon't se ha salido por completo de los márgenes geométricos.",
            "Hay una entidad rondando. Renderizada en 3 dimensiones, es aún peor. No tiene registros biológicos y su hostilidad es matemáticamente perfecta.",
            "Nuestras cuadrillas son desmanteladas en segundos. Tu única directiva es limpiar el perímetro. Extírpalo de la realidad para que podamos continuar la obra.",
            "Si logras disolver su presencia 3 veces, el terreno quedará asegurado. Muévete, ya olió tu frecuencia..."
        ];
        let textElement = document.getElementById('rpg-text');
        let charIndex = 0;
        let introMusicInterval = null;

    
        let audioCtx = null;
        let sndSmile, sndGal, sndGal2;
        let distortionNode, delayNode, feedbackNode;

        function initAudioPipeline() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            sndSmile = new Audio('smile.wav');
            sndGal = new Audio('gal.mp3'); sndGal.loop = true;
            sndGal2 = new Audio('gal2.wav');

            distortionNode = audioCtx.createWaveShaper();
            distortionNode.curve = makeDistortionCurve(120);
            distortionNode.oversample = '4x';
            delayNode = audioCtx.createDelay(); delayNode.delayTime.value = 0.35;
            feedbackNode = audioCtx.createGain(); feedbackNode.gain.value = 0.45;
            delayNode.connect(feedbackNode); feedbackNode.connect(delayNode);

            try {
                let sourceSmile = audioCtx.createMediaElementSource(sndSmile);
                sourceSmile.connect(distortionNode); distortionNode.connect(delayNode);
                distortionNode.connect(audioCtx.destination); delayNode.connect(audioCtx.destination);
            } catch(e) { console.log("Audio Routing local bloqueado por CORS. Usando fallback nativo."); }
        }

        function makeDistortionCurve(amount) {
            let k = amount, n_samples = 44100, curve = new Float32Array(n_samples), deg = Math.PI / 180, i = 0, x;
            for ( ; i < n_samples; ++i ) {
                x = ( i * 2 ) / n_samples - 1;
                curve[i] = ( ( 3 + k ) * x * 20 * deg ) / ( Math.PI + k * Math.abs(x) );
            }
            return curve;
        }

        function playDistortedSmile() {
            if (!audioCtx) return;
            sndSmile.currentTime = 0; sndSmile.volume = 0.9; sndSmile.play().catch(()=>{});
            setTimeout(() => {
                if (monster.active) { sndGal2.currentTime = 0; sndGal2.volume = 0.85; sndGal2.play().catch(()=>{}); }
            }, 300 + Math.random() * 400);
        }

        function playWeaponSound() {
            if(!audioCtx) return;
            try {
                let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
                osc.type = 'square'; osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.17);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.18);
            } catch(e){}
        }

        function playTypeClick() { /* ... (Omitido por espacio, similar al anterior) ... */ }

        // --- MÁQUINA DE ESCRIBIR ---
        function typeDialogue() {
            if (dialogueStep < dialogues.length) {
                if (charIndex < dialogues[dialogueStep].length) {
                    textElement.innerText += dialogues[dialogueStep].charAt(charIndex);
                    charIndex++; setTimeout(typeDialogue, 25);
                } else {
                    dialogueStep++; charIndex = 0;
                    if (dialogueStep < dialogues.length) setTimeout(() => { textElement.innerText = ""; typeDialogue(); }, 3000);
                    else document.getElementById('start-btn').style.display = "block";
                }
            }
        }

        function unlockAudioAndStartIntro() {
            initAudioPipeline();
            document.getElementById('audio-unlocker').style.display = 'none';
            document.getElementById('rpg-dialogue-box').style.display = 'block';
            isIntroActive = true; typeDialogue();
        }

        // ==========================================
        //         MOTOR 3D (THREE.JS)
        // ==========================================
        
        const canvas = document.getElementById('gameCanvas');
        const scene = new THREE.Scene();
        // Niebla súper densa para tapar el final del mapa y dar miedo
        scene.fog = new THREE.FogExp2(0x020104, 0.018); 

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 500);
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        // Bajar la resolución de renderizado intencionalmente para estética PS1
        renderer.setPixelRatio(window.devicePixelRatio * 0.4); 

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Controles de Primera Persona
        const controls = new THREE.PointerLockControls(camera, document.body);
        scene.add(controls.getObject());
        // Posición inicial del jugador
        controls.getObject().position.set(50, 5, 50);

        // Variables de movimiento físicas
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false, canJump = false;
        let velocity = new THREE.Vector3();
        let direction = new THREE.Vector3();
        const playerHeight = 5;

        // Entorno
        const boundingBoxes = []; // Cajas de colisión de las casas
        const radarHouses = []; // Para el mapa 2D
        let ammoBoxes3D = [];

        // Luces
        const ambientLight = new THREE.AmbientLight(0x222233, 0.6); // Luz base muy oscura
        scene.add(ambientLight);

        // Materiales
        const materialPiso = new THREE.MeshBasicMaterial({ color: 0x111114 });
        const materialPared = new THREE.MeshBasicMaterial({ color: 0x2a2a35 });
        const materialTecho = new THREE.MeshBasicMaterial({ color: 0x3d1b1b });
        const materialPoste = new THREE.MeshBasicMaterial({ color: 0x151515 });

        // Crear Suelo
        const planeGeo = new THREE.PlaneGeometry(MAP_SIZE, MAP_SIZE);
        const plane = new THREE.Mesh(planeGeo, materialPiso);
        plane.rotation.x = -Math.PI / 2;
        plane.position.set(MAP_SIZE/2, 0, MAP_SIZE/2);
        scene.add(plane);

        // Generar Ciudad Procedimental
        function initCity3D() {
            const spacing = 60;
            for (let x = 40; x < MAP_SIZE - 40; x += spacing) {
                for (let z = 40; z < MAP_SIZE - 40; z += spacing) {
                    if (Math.abs(x - 50) < 50 && Math.abs(z - 50) < 50) continue; // Zona de inicio limpia

                    let houseW = 25 + Math.random()*10;
                    let houseD = 25 + Math.random()*10;
                    let houseH = 20 + Math.random()*15;

                    // Base de la casa
                    const houseGeo = new THREE.BoxGeometry(houseW, houseH, houseD);
                    const houseMesh = new THREE.Mesh(houseGeo, materialPared);
                    houseMesh.position.set(x, houseH/2, z);
                    scene.add(houseMesh);

                    // Colisión
                    const box = new THREE.Box3().setFromObject(houseMesh);
                    // Expandir la caja ligeramente para evitar clipping de la cámara
                    box.expandByScalar(2); 
                    boundingBoxes.push(box);
                    radarHouses.push({x: x - houseW/2, y: z - houseD/2, w: houseW, h: houseD});

                    // Techo
                    const isPyramid = Math.random() > 0.5;
                    const roofGeo = isPyramid ? new THREE.ConeGeometry(houseW*0.8, 10, 4) : new THREE.BoxGeometry(houseW*1.1, 4, houseD*1.1);
                    const roofMesh = new THREE.Mesh(roofGeo, materialTecho);
                    if (isPyramid) {
                        roofMesh.position.set(x, houseH + 5, z);
                        roofMesh.rotation.y = Math.PI / 4;
                    } else {
                        roofMesh.position.set(x, houseH + 2, z);
                    }
                    scene.add(roofMesh);

                    // Farola
                    const posteGeo = new THREE.CylinderGeometry(0.5, 0.5, 15);
                    const poste = new THREE.Mesh(posteGeo, materialPoste);
                    poste.position.set(x - houseW/2 - 5, 7.5, z - houseD/2 - 5);
                    scene.add(poste);

                    // Luz de farola parpadeante
                    const luzFarola = new THREE.PointLight(0xffdd88, 1, 40);
                    luzFarola.position.set(x - houseW/2 - 5, 14, z - houseD/2 - 5);
                    scene.add(luzFarola);
                    // Guardar para animar parpadeo
                    luzFarola.userData = { flickerSeed: Math.random() };
                }
            }
        }
        initCity3D();

        // Lluvia (Sistema de partículas 3D)
        const rainCount = 1500;
        const rainGeo = new THREE.BufferGeometry();
        const rainPositions = new Float32Array(rainCount * 3);
        for(let i=0;i<rainCount;i++) {
            rainPositions[i*3] = Math.random() * MAP_SIZE;
            rainPositions[i*3+1] = Math.random() * 100;
            rainPositions[i*3+2] = Math.random() * MAP_SIZE;
        }
        rainGeo.setAttribute('position', new THREE.BufferAttribute(rainPositions, 3));
        const rainMat = new THREE.PointsMaterial({ color: 0xaaaaaa, size: 0.5, transparent: true, opacity: 0.6 });
        const rainSystem = new THREE.Points(rainGeo, rainMat);
        scene.add(rainSystem);

        // --- SISTEMA DEL MONSTRUO 3D (Animación Jerárquica) ---
        const monster = new THREE.Group();
        monster.active = false;
        monster.health = 4;
        monster.state = 0;
        monster.timer = 0;
        monster.speed = 40.0;
        
        const matMutant = new THREE.MeshBasicMaterial({ color: 0x882222 });
        const matDark = new THREE.MeshBasicMaterial({ color: 0x111111 });
        const matEyes = new THREE.MeshBasicMaterial({ color: 0xffffff });

        // Torso
        const torso = new THREE.Mesh(new THREE.BoxGeometry(3, 8, 3), matMutant);
        torso.position.y = 8;
        monster.add(torso);

        // Cabeza
        const head = new THREE.Mesh(new THREE.SphereGeometry(2, 8, 8), matMutant);
        head.position.y = 5;
        torso.add(head);

        // Ojos
        const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.4), matEyes);
        eyeL.position.set(-0.8, 0.5, 1.8); head.add(eyeL);
        const eyeR = new THREE.Mesh(new THREE.SphereGeometry(0.4), matEyes);
        eyeR.position.set(0.8, 0.5, 1.8); head.add(eyeR);

        // Mandíbula gigante (Se abre y cierra)
        const jaw = new THREE.Mesh(new THREE.BoxGeometry(3.5, 2, 3), matDark);
        jaw.position.set(0, -1.5, 1);
        head.add(jaw);

        // Extremidades (Pivotadas para rotar correctamente)
        function createLimb(xOffset, yOffset, length) {
            const pivot = new THREE.Group();
            pivot.position.set(xOffset, yOffset, 0);
            const limb = new THREE.Mesh(new THREE.BoxGeometry(1, length, 1), matMutant);
            limb.position.y = -length / 2; // Desplazar malla hacia abajo desde el pivote
            pivot.add(limb);
            torso.add(pivot);
            return pivot;
        }

        const armL = createLimb(-2, 3, 9);  // Brazos muy largos
        const armR = createLimb(2, 3, 9);
        const legL = createLimb(-1.5, -4, 8);
        const legR = createLimb(1.5, -4, 8);

        scene.add(monster);
        
        // Caja de colisión y hitbox de disparo del monstruo
        const monsterHitbox = new THREE.Box3();

        // --- SISTEMA DE ARMAS ---
        const raycaster = new THREE.Raycaster();
        const centerScreen = new THREE.Vector2(0, 0); // Centro exacto para el raycaster
        const flashOverlay = document.getElementById('damage-overlay');

        function flashScreen(color) {
            flashOverlay.style.transition = 'none';
            flashOverlay.style.backgroundColor = color;
            setTimeout(() => {
                flashOverlay.style.transition = 'background-color 0.2s ease-out';
                flashOverlay.style.backgroundColor = 'rgba(0,0,0,0)';
            }, 50);
        }

        document.addEventListener('mousedown', () => {
            if (!gameRunning || !controls.isLocked || playerStats.ammo <= 0 || playerStats.health <= 0) return;
            
            playerStats.ammo--;
            document.getElementById('ammo').innerText = "CARTUCHOS: " + playerStats.ammo;
            playWeaponSound();

            // Lógica de Hitscan 3D
            raycaster.setFromCamera(centerScreen, camera);
            // Comprobar intersección con el grupo del monstruo
            const intersects = raycaster.intersectObject(monster, true);

            if (intersects.length > 0 && monster.active) {
                // Distancia
                if(intersects[0].distance < 120) {
                    monster.health--;
                    monster.state = 2; // Furia
                    flashScreen('rgba(255, 255, 255, 0.4)'); // Flash blanco de impacto
                    
                    if (monster.health <= 0) {
                        playerStats.score++;
                        document.getElementById('score').innerText = "ANOMALÍAS DEPURADAS: " + playerStats.score + " / 3";
                        monster.active = false;
                        monster.position.y = -100; // Esconder
                        
                        // Spawn de munición donde murió
                        spawnAmmo(monster.position.x, monster.position.z);

                        if (playerStats.score >= 3) endGame(true);
                    }
                }
            }
        });

        function spawnAmmo(x, z) {
            const boxGeo = new THREE.BoxGeometry(2, 2, 2);
            const boxMat = new THREE.MeshBasicMaterial({ color: 0xffaa00 });
            const ammo = new THREE.Mesh(boxGeo, boxMat);
            ammo.position.set(x, 2, z);
            scene.add(ammo);
            ammoBoxes3D.push({ mesh: ammo, box: new THREE.Box3() });
        }
        
        // Spawnear algunas cajas iniciales
        for(let i=0; i<5; i++) spawnAmmo(Math.random()*300+50, Math.random()*300+50);

        // --- CONTROLES Y EVENTOS DE TECLADO ---
        const onKeyDown = function (event) {
            switch (event.code) {
                case 'ArrowUp': case 'KeyW': moveForward = true; break;
                case 'ArrowLeft': case 'KeyA': moveLeft = true; break;
                case 'ArrowDown': case 'KeyS': moveBackward = true; break;
                case 'ArrowRight': case 'KeyD': moveRight = true; break;
                case 'Space': if (canJump === true) velocity.y += 60; canJump = false; break;
                case 'ShiftLeft': velocity.x *= 1.5; velocity.z *= 1.5; break; // Correr
            }
        };
        const onKeyUp = function (event) {
            switch (event.code) {
                case 'ArrowUp': case 'KeyW': moveForward = false; break;
                case 'ArrowLeft': case 'KeyA': moveLeft = false; break;
                case 'ArrowDown': case 'KeyS': moveBackward = false; break;
                case 'ArrowRight': case 'KeyD': moveRight = false; break;
            }
        };
        document.addEventListener('keydown', onKeyDown);
        document.addEventListener('keyup', onKeyUp);

        // --- LÓGICA DE INICIO Y FIN ---
        function releaseTheStorm() {
            if(introMusicInterval) clearInterval(introMusicInterval);
            isIntroActive = false;
            
            document.getElementById('rpg-dialogue-box').style.display = 'none';
            document.getElementById('ui').style.display = 'block';
            document.getElementById('radar-container').style.display = 'block';
            document.getElementById('crosshair').style.display = 'block';
            
            sndGal.volume = 0.5; sndGal.play().catch(()=>{});

            controls.lock();
            gameRunning = true;
        }

        controls.addEventListener('lock', () => { if(isIntroActive) releaseTheStorm(); });
        controls.addEventListener('unlock', () => { /* Pausa lógica si se desea */ });

        function endGame(victory) {
            gameRunning = false;
            controls.unlock();
            document.getElementById('crosshair').style.display = 'none';
            const screen = document.getElementById('end-screen');
            const title = document.getElementById('end-title');
            const desc = document.getElementById('end-desc');
            
            if (victory) {
                screen.style.backgroundColor = "rgba(4, 25, 12, 0.98)";
                title.style.color = "#00ff66"; title.innerText = "TERRENO ASEGURADO 3D";
                desc.innerText = "El hardware ha renderizado su destrucción. La producción se normaliza. Presiona F5.";
            } else {
                screen.style.backgroundColor = "rgba(40, 3, 6, 0.99)";
                title.style.color = "#ff1111"; title.innerText = "CRASH DEL SISTEMA";
                desc.innerText = "Tus polígonos fueron destrozados por la entidad. Presiona F5 para re-renderizar tu contrato.";
            }
            screen.style.display = 'flex';
        }

        // Función para dibujar el minimapa 2D clásico
        const radarCanvas = document.getElementById('radarCanvas');
        const rCtx = radarCanvas.getContext('2d');
        function drawRadar() {
            rCtx.clearRect(0,0,160,160);
            const scale = 160 / MAP_SIZE;
            
            // Casas
            rCtx.fillStyle = '#251a2e';
            for(let h of radarHouses) rCtx.fillRect(h.x * scale, h.y * scale, h.w * scale, h.h * scale);
            
            // Jugador
            const px = controls.getObject().position.x;
            const pz = controls.getObject().position.z;
            
            // Entidad
            if (monster.active && Math.floor(Date.now() / 200) % 2 === 0) {
                rCtx.fillStyle = '#ff0033';
                rCtx.beginPath(); rCtx.arc(monster.position.x * scale, monster.position.z * scale, 4, 0, Math.PI*2); rCtx.fill();
            }
            
            rCtx.fillStyle = '#00ff66';
            rCtx.save();
            rCtx.translate(px * scale, pz * scale);
            // Para la rotación en el radar, la cámara gira en el eje Y en 3D. 
            // Invertimos la rotación para mapear al 2D superior.
            rCtx.rotate(-controls.getObject().rotation.y);
            rCtx.beginPath(); rCtx.moveTo(0, -6); rCtx.lineTo(4, 4); rCtx.lineTo(-4, 4); rCtx.fill();
            rCtx.restore();
        }

        // --- BUCLE PRINCIPAL (UPDATE & RENDER) ---
        let prevTime = performance.now();

        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now();
            const delta = (time - prevTime) / 1000;
            
            if (controls.isLocked && gameRunning) {
                
                // --- FÍSICAS DEL JUGADOR ---
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;
                velocity.y -= 150.0 * delta; // Gravedad

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                if (moveForward || moveBackward) velocity.z -= direction.z * 200.0 * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * 200.0 * delta;

                // Intentar mover en X
                controls.moveRight(-velocity.x * delta);
                // Checar colisión X
                let pPos = controls.getObject().position;
                let playerBox = new THREE.Box3(
                    new THREE.Vector3(pPos.x - 2, 0, pPos.z - 2),
                    new THREE.Vector3(pPos.x + 2, playerHeight, pPos.z + 2)
                );
                for (let box of boundingBoxes) {
                    if (playerBox.intersectsBox(box)) {
                        controls.moveRight(velocity.x * delta); // Deshacer
                        velocity.x = 0; break;
                    }
                }

                // Intentar mover en Z
                controls.moveForward(-velocity.z * delta);
                // Checar colisión Z
                pPos = controls.getObject().position;
                playerBox.set(
                    new THREE.Vector3(pPos.x - 2, 0, pPos.z - 2),
                    new THREE.Vector3(pPos.x + 2, playerHeight, pPos.z + 2)
                );
                // Restringir al mapa
                if(pPos.x < 5 || pPos.x > MAP_SIZE-5 || pPos.z < 5 || pPos.z > MAP_SIZE-5) {
                     controls.moveForward(velocity.z * delta);
                     velocity.z = 0;
                } else {
                    for (let box of boundingBoxes) {
                        if (playerBox.intersectsBox(box)) {
                            controls.moveForward(velocity.z * delta); // Deshacer
                            velocity.z = 0; break;
                        }
                    }
                }

                // Aplicar Y (Salto)
                controls.getObject().position.y += (velocity.y * delta);
                if (controls.getObject().position.y < playerHeight) {
                    velocity.y = 0;
                    controls.getObject().position.y = playerHeight;
                    canJump = true;
                }

                // Recolección de munición
                for(let i = ammoBoxes3D.length - 1; i >= 0; i--) {
                    let ab = ammoBoxes3D[i];
                    ab.mesh.rotation.y += delta;
                    ab.box.setFromObject(ab.mesh);
                    if (playerBox.intersectsBox(ab.box)) {
                        scene.remove(ab.mesh);
                        ammoBoxes3D.splice(i, 1);
                        playerStats.ammo += 5;
                        document.getElementById('ammo').innerText = "CARTUCHOS: " + playerStats.ammo;
                    }
                }

                // --- INTELIGENCIA ARTIFICIAL DEL MONSTRUO ---
                if (!monster.active) {
                    monster.timer += delta;
                    if (monster.timer > 3.0) { // Respawn
                        monster.position.set(Math.random()*MAP_SIZE, 0, Math.random()*MAP_SIZE);
                        monster.health = 4;
                        monster.state = 0;
                        monster.active = true;
                        monster.timer = 0;
                        monster.speed = 25.0;
                        playDistortedSmile();
                    }
                } else {
                    // Animación del monstruo (Moviendo extremidades con Math.sin)
                    const walkCycle = time * 0.005;
                    armL.rotation.x = Math.sin(walkCycle) * 1.5;
                    armR.rotation.x = Math.sin(walkCycle + Math.PI) * 1.5;
                    legL.rotation.x = Math.sin(walkCycle + Math.PI) * 1.2;
                    legR.rotation.x = Math.sin(walkCycle) * 1.2;
                    torso.rotation.z = Math.sin(walkCycle * 0.5) * 0.2; // Tambaleo
                    
                    // Mandíbula loca si está en furia
                    jaw.rotation.x = monster.state === 2 ? Math.abs(Math.sin(time*0.02)) * 0.5 : 0;
                    head.lookAt(controls.getObject().position); // La cabeza siempre te mira

                    // Movimiento hacia el jugador
                    const mPos = monster.position;
                    const cPos = controls.getObject().position;
                    const dx = cPos.x - mPos.x;
                    const dz = cPos.z - mPos.z;
                    const dist = Math.sqrt(dx*dx + dz*dz);

                    if (dist < 40) monster.state = 2; // Furia por proximidad

                    if (dist > 3) {
                        monster.lookAt(new THREE.Vector3(cPos.x, mPos.y, cPos.z)); // Rotar cuerpo hacia jugador
                        let currentSpeed = monster.state === 2 ? monster.speed * 1.6 : monster.speed;
                        
                        let nextX = mPos.x + (dx/dist) * currentSpeed * delta;
                        let nextZ = mPos.z + (dz/dist) * currentSpeed * delta;
                        
                        // Colisión simple del monstruo
                        monsterHitbox.setFromObject(torso);
                        let collision = false;
                        for(let box of boundingBoxes) {
                            if(box.containsPoint(new THREE.Vector3(nextX, 5, nextZ))) collision = true;
                        }
                        
                        if(!collision) {
                            monster.position.x = nextX;
                            monster.position.z = nextZ;
                        } else {
                            // Si choca, deslizarse de lado asquerosamente
                            monster.position.x += Math.sin(time*0.002) * 50 * delta;
                            monster.position.z += Math.cos(time*0.002) * 50 * delta;
                        }
                    }

                    // Daño al jugador
                    if (dist < 8) {
                        playerStats.health--;
                        flashScreen('rgba(255, 0, 0, 0.7)');
                        let hb = "["; for(let h=0; h<5; h++) hb += (h < playerStats.health) ? "I" : "."; hb += "]";
                        document.getElementById('hearts').innerText = "ESTADO CORPORAL: " + hb;
                        monster.active = false;
                        monster.timer = 0;
                        monster.position.y = -100;
                        if(playerStats.health <= 0) endGame(false);
                    }
                }

                // Animar Lluvia
                const positions = rainSystem.geometry.attributes.position.array;
                for(let i=0; i<rainCount; i++) {
                    positions[i*3+1] -= 50 * delta; // Caída
                    if(positions[i*3+1] < 0) {
                        positions[i*3+1] = 100; // Resetear arriba
                    }
                }
                rainSystem.geometry.attributes.position.needsUpdate = true;

                drawRadar();
            }

            
            scene.children.forEach(child => {
                if(child.isPointLight && child.userData.flickerSeed) {
                    if(Math.random() < 0.05) child.intensity = Math.random() > 0.5 ? 1 : 0.2;
                }
            });

            renderer.render(scene, camera);
            prevTime = time;
        }

        requestAnimationFrame(animate);
    </script>
</body>
</html>
