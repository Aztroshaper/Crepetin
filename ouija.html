<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ouija</title>
<style>
/* FUENTE Y BASE LIMINAL VHS */
body{
  margin:0;
  background:#020202;
  color:#a3a89e;
  font-family:'Courier New', monospace;
  overflow:hidden;
  position:relative;
  text-shadow: 0 0 2px rgba(0,255,100,0.1);
  height: 100vh;
}

/* FILTRO CRT / ENTRALAZADO ANALÓGICO OPTIMIZADO PARA LEGIBILIDAD */
body:before {
  content:"";
  position:fixed;
  inset:0;
  background: repeating-linear-gradient(0deg, rgba(0,0,0,0.35), rgba(0,0,0,0.35) 2px, transparent 3px, transparent 6px);
  pointer-events:none; /* Evita bloquear interacciones */
  z-index:99;
}
body:after {
  content:"";
  position:fixed;
  inset:0;
  background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.85) 100%), rgba(18,16,16,0.15);
  opacity:1;
  pointer-events:none; /* Evita bloquear clics en el input */
  animation: vhs-flicker 0.2s infinite;
  z-index:98;
}

@keyframes vhs-flicker {
  0% { opacity: 0.12; } 30% { opacity: 0.18; } 70% { opacity: 0.10; } 100% { opacity: 0.15; }
}

/* ANIMACIÓN DE IMPACTO CRT FÓSFORO EXTREMO */
@keyframes popEffect {
  0% { 
    transform: scale(1) translateZ(0px); 
    box-shadow: 0 8px 0 #050604, 0 15px 25px rgba(0,0,0,0.9);
  }
  30% { 
    transform: scale(0.90) translateZ(-20px); 
    background:#1f3d29; 
    border-color:#5effad; 
    box-shadow: 0 2px 0 #050604, 0 0 40px rgba(94, 255, 173, 0.8);
  }
  100% { 
    transform: scale(1.02) translateZ(10px);
    background:#182b1f; 
    border-color:#3dfca2; 
    box-shadow: 0 8px 0 #090e0b, 0 0 25px rgba(61, 252, 162, 0.5);
  }
}

/* BRILLO CONSTANTE QUE SUBE Y BAJA EN LAS LETRAS */
@keyframes pulseGlow {
  0% {
    color: #9cb08d;
    text-shadow: 0 0 4px rgba(156, 176, 141, 0.4);
  }
  100% {
    color: #ffffff;
    text-shadow: 0 0 16px rgba(166, 255, 210, 0.9);
  }
}

.wrap {
  display:flex;
  height:100vh;
  padding:30px;
  gap:30px;
  box-sizing:border-box;
  perspective: 1600px;
}

/* PANEL LATERAL DE TEXTO */
.panel {
  width:300px;
  padding:25px;
  overflow:auto;
  border:2px solid #20241c;
  background: linear-gradient(180deg, #050605 0%, #0a0c09 100%);
  box-shadow: inset 0 0 30px rgba(0,0,0,1), 0 15px 35px rgba(0,0,0,0.9);
  border-radius: 8px;
  display: flex;
  flex-direction: column;
}

/* DIÁLOGO ESTILO RPG EN LA PARTE CENTRAL SUPERIOR */
.rpg-dialog {
  position: fixed;
  top: 30px;
  left: 50%;
  transform: translateX(-50%) translateZ(50px);
  width: 550px;
  background: #080a07;
  border: 3px double #3e4736;
  border-radius: 4px;
  padding: 15px 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.95), inset 0 0 15px rgba(0,0,0,0.8);
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s ease, transform 0.4s ease;
  font-family: 'Courier New', monospace;
}
.rpg-dialog.show {
  opacity: 1;
  pointer-events: auto;
  transform: translateX(-50%) translateZ(100px);
}
.rpg-title {
  color: #3dfca2;
  font-weight: bold;
  font-size: 14px;
  margin-bottom: 6px;
  letter-spacing: 2px;
}
.rpg-text {
  color: #ffffff;
  font-size: 16px;
  line-height: 1.4;
}

/* VELAS ANIMADAS A LOS COSTADOS */
.candle-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  width: 60px;
  height: 100%;
  padding-bottom: 40px;
  box-sizing: border-box;
}
.candle {
  width: 24px;
  height: 140px;
  background: linear-gradient(90deg, #161c13 0%, #252f20 50%, #0b0e09 100%);
  border: 2px solid #323a2b;
  border-radius: 4px 4px 0 0;
  position: relative;
  box-shadow: 0 10px 20px rgba(0,0,0,0.6);
}
.candle-wick {
  width: 2px;
  height: 12px;
  background: #111;
  position: absolute;
  top: -12px;
  left: 50%;
  transform: translateX(-50%);
}
.candle-flame {
  width: 16px;
  height: 35px;
  background: radial-gradient(ellipse at bottom, #ffffff 0%, #5effad 30%, rgba(33,70,44,0.8) 70%, transparent 100%);
  border-radius: 50% 50% 20% 20% / 60% 60% 40% 40%;
  position: absolute;
  top: -45px;
  left: 50%;
  transform: translateX(-50%);
  filter: blur(1px);
  animation: flame-burn 0.15s infinite alternate;
  box-shadow: 0 0 20px rgba(94, 255, 173, 0.6);
}
@keyframes flame-burn {
  0% { transform: translateX(-50%) scaleX(0.9) rotate(-1deg); }
  100% { transform: translateX(-50%) scaleX(1.1) rotate(1deg) brightness(1.2); }
}

/* TABLERO OUIJA HIPER-3D PROFUNDO */
.board {
  flex:1;
  padding:20px 40px;
  position:relative;
  transform-style: preserve-3d;
  transform: rotateX(15deg) rotateY(-4deg) translateZ(0px);
  background: radial-gradient(circle at center, #151a12 0%, #050605 100%);
  border: 4px double #373e31;
  border-radius: 16px;
  box-sizing: border-box;
  box-shadow: 
    -20px 25px 50px rgba(0,0,0,0.95),
    inset 0 0 60px rgba(0,0,0,0.95),
    -10px 24px 0px #090b08;
  transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}
.board:hover {
  transform: rotateX(12deg) rotateY(-2deg) translateZ(10px);
}

#close {
  position:fixed;
  right:20px;
  top:20px;
  width:42px;
  height:42px;
  background:#2b0808;
  color:#b83232;
  border:2px solid #6e2020;
  cursor:pointer;
  z-index:100;
  font-weight:bold;
  font-family: monospace;
  text-shadow:0 0 8px red;
  box-shadow: 0 6px 12px rgba(0,0,0,0.8);
  transition: 0.2s;
  border-radius: 6px;
}
#close:hover { background:#5c0f0f; color:#ff6666; box-shadow: 0 0 20px #ff0000; transform: scale(1.05); }

/* FILA CELESTIAL SUPERIOR */
.top-board-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 5px;
  transform-style: preserve-3d;
  transform: translateZ(10px);
}
.top-meta-btn {
  font-size: 22px;
  font-weight: 900;
  background: #040504;
  border: 2px solid #3d4736;
  padding: 10px 24px;
  border-radius: 6px;
  box-shadow: 0 6px 0 #020302;
  animation: pulseGlow 2.5s infinite alternate ease-in-out;
  letter-spacing: 2px;
}
.celestial-svg {
  width: 55px;
  height: 55px;
  fill: none;
  stroke: #9cb394;
  stroke-width: 1.5;
  filter: drop-shadow(0 0 4px rgba(156,179,148,0.4));
}

/* GRID BRUTALISTA CON PERSPECTIVA */
.grid {
  display:grid;
  grid-template-columns: repeat(9, 1fr);
  gap: 12px;
  margin-top: 10px;
  perspective: 1200px;
  transform-style: preserve-3d;
}

/* CELDAS MECÁNICAS DE ALTA LEGIBILIDAD */
.cell {
  text-align:center;
  padding: 18px 5px;
  background: #040504;
  border: 2px solid #3d4736;
  border-radius: 8px;
  position: relative;
  transform-style: preserve-3d;
  box-shadow: 
    0 6px 0 #020302, 
    0 10px 15px rgba(0,0,0,0.9);
  transition: transform 0.15s, background 0.3s;
  user-select: none;
  animation: pulseGlow 2s infinite alternate ease-in-out;
  font-weight: 900;
  font-size: 26px;
}

/* ACTIVACIÓN DE FÓSFORO Y BRILLO */
.cell.active, .top-meta-btn.active, #cESTRELLA.active {
  color: #a6ffd2 !important;
  animation: popEffect 0.4s ease-out forwards !important;
  text-shadow: 0 0 15px #3dfca2, 0 0 30px #00ff73 !important;
  z-index: 10;
}
.top-meta-btn.active .celestial-svg, #cESTRELLA.active .celestial-svg {
  stroke: #a6ffd2 !important;
  filter: drop-shadow(0 0 15px #3dfca2);
}

/* EFECTO PILAR DE LUZ VOLUMÉTRICO */
.cell::after, .top-meta-btn::after, .bottom-board-row::after {
  content: "";
  position: absolute;
  bottom: 50%;
  left: 50%;
  width: 80%;
  height: 0px;
  transform: translateX(-50%) rotateX(-90deg);
  transform-origin: bottom center;
  background: linear-gradient(to top, rgba(61, 252, 162, 0.7) 0%, rgba(0, 255, 100, 0.12) 40%, transparent 100%);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s ease;
  border-radius: 50%;
}
.cell.active::after, .top-meta-btn.active::after, .bottom-board-row.active-pilar::after {
  opacity: 1;
  height: 480px;
  animation: pilar-flicker 0.4s infinite alternate;
}

@keyframes pilar-flicker {
  0% { filter: blur(4px) brightness(0.9); opacity: 0.6; }
  100% { filter: blur(6px) brightness(1.3); opacity: 0.85; }
}

/* FILA INFERIOR */
.bottom-board-row {
  display: flex;
  justify-content: center;
  margin-top: 10px;
  position: relative;
  transform-style: preserve-3d;
  transform: translateZ(10px);
}
#cESTRELLA {
  cursor: pointer;
  padding: 5px;
  border-radius: 50%;
  transition: 0.3s;
}

/* PLANCHETA GHOST CURSOR */
.planchette {
  position:absolute;
  width: 85px;
  height: 100px;
  border-radius: 50% 50% 20% 20% / 60% 60% 40% 40%;
  background: linear-gradient(135deg, rgba(28, 36, 25, 0.8) 0%, rgba(12, 15, 11, 0.9) 100%);
  border: 2px solid #9bb088;
  pointer-events:none;
  z-index: 90;
  box-shadow: 0 35px 45px rgba(0,0,0,0.9), inset 0 0 20px rgba(255,255,255,0.08);
  transform: translate(-50%, -50%) translateZ(25px);
  transition: left .55s cubic-bezier(0.19, 1, 0.22, 1), top .55s cubic-bezier(0.19, 1, 0.22, 1);
  filter: drop-shadow(0 0 10px rgba(0,0,0,0.7));
}
.planchette:after {
  content:"";
  position:absolute;
  width: 26px;
  height: 26px;
  background: rgba(0, 255, 120, 0.05);
  border: 2px dashed rgba(94, 255, 173, 0.6);
  border-radius: 50%;
  left: 50%;
  top: 35%;
  transform: translate(-50%, -50%);
  box-shadow: 0 0 15px rgba(0,255,100,0.4), inset 0 0 8px rgba(0,0,0,0.9);
}

/* ACCIONES DE INTERFAZ - CAPA CORREGIDA AL FRENTE */
.row {
  display:flex;
  gap:15px;
  margin-top: 15px;
  position: relative;
  z-index: 150; /* Forzar al frente para que siempre reciba clics */
  transform: translateZ(40px); /* Separar del fondo tridimensional */
}
input, button {
  background: #0b0d09;
  color: #9cb394;
  border: 2px solid #323a2b;
  padding: 14px;
  font-family: 'Courier New', monospace;
  outline: none;
  font-size: 16px;
  border-radius: 6px;
}
input { 
  flex: 1; 
  box-shadow: inset 0 4px 10px rgba(0,0,0,0.95);
  pointer-events: auto !important; /* Garantiza foco */
}
input:focus { border-color: #55634a; color: #e3ebd9; }
button { cursor: pointer; background: #20261b; font-weight: bold; box-shadow: 0 5px 0 #0d120a; }
button:hover { background: #2d3626; color:#fff; }
button:active { transform: translateY(5px); box-shadow: none; }

/* OPTIMIZACIÓN EXTREMA DEL TEXTO INFERIOR PARA QUE NO SE CORTE */
#response {
  white-space: pre-wrap;
  word-break: break-word;
  line-height: 1.4;
  margin-top: 15px;
  font-size: 22px;
  letter-spacing: 3px;
  color: #e3ebd9;
  text-align: center;
  min-height: 50px;
  max-height: 90px;
  overflow-y: auto;
  font-weight: bold;
}

/* PANTALLA ESTÁTICA SIN SEÑAL */
.static {
  display:none;
  position:fixed;
  inset:0;
  background:#050505;
  color:#444;
  font-size:60px;
  justify-content:center;
  align-items:center;
  z-index:1000;
  animation: noise-anim 0.15s infinite;
}
@keyframes noise-anim {
  0% { background-color: #060606; color: #222; }
  50% { background-color: #0a0a0a; color: #111; }
  100% { background-color: #030303; color: #333; }
}

h3, h2 { margin-top:0; letter-spacing:8px; color: #626e58; }
h2 { border-bottom: 1px dashed #2d3327; padding-bottom: 5px; font-size: 26px; }
hr { border:0; border-top: 1px solid #2d3327; margin: 15px 0; }
</style>
</head>
<body>

<button id="close">X</button>

<!-- CUADRO DE DIÁLOGO RPG RETRO -->
<div class="rpg-dialog" id="rpgBox">
  <div class="rpg-title">SIXTO REY</div>
  <div class="rpg-text" id="rpgText">...</div>
</div>

<div class="wrap">
  <!-- VELA IZQUIERDA -->
  <div class="candle-container">
    <div class="candle">
      <div class="candle-wick"></div>
      <div class="candle-flame"></div>
    </div>
  </div>

  <div class="panel">
    <h3>REGISTRO</h3>
    <div id="intro"></div>
    <hr>
    <p style="font-size: 13px; color: #535c4b;">La estática del ambiente resuena en sincronía con los impulsos de la terminal.</p>
  </div>
  
  <div class="board" id="board">
    <div>
      <div class="top-board-row">
        <!-- SOL VECTORIAL ARTESANAL -->
        <svg class="celestial-svg" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
        
        <div class="top-meta-btn" id="cHOLA">HOLA</div>
        <div class="top-meta-btn" id="cADIOS">ADIÓS</div>
        
        <!-- LUNA VECTORIAL ARTESANAL -->
        <svg class="celestial-svg" viewBox="0 0 24 24">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </div>

      <h2 style="text-align:center; margin: 5px 0;">O U I J A</h2>
      
      <div class="grid" id="grid"></div>
      
      <div class="bottom-board-row" id="pilarEstrellaContainer">
        <!-- ESTRELLA VECTORIAL ARTESANAL -->
        <div id="cESTRELLA">
          <svg class="celestial-svg" viewBox="0 0 24 24" style="width:50px; height:50px;">
            <polygon points="12,2 15,9 22,9 17,14 19,21 12,17 5,21 7,14 2,9 9,9"/>
          </svg>
        </div>
      </div>
    </div>
    
    <div class="planchette" id="p"></div>
    
    <div>
      <div class="row">
        <input id="q" placeholder="Haz una pregunta al espíritu..." autocomplete="off">
        <button onclick="ask()">INOCULAR</button>
      </div>
      
      <div id="response"></div>
    </div>
  </div>

  <!-- VELA DERECHA -->
  <div class="candle-container">
    <div class="candle">
      <div class="candle-wick"></div>
      <div class="candle-flame"></div>
    </div>
  </div>
</div>

<div class="static" id="static">NO SIGNAL</div>

<script>
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function initAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
}

function playSpookyClick() {
  initAudio();
  if (!audioCtx) return;
  let osc = audioCtx.createOscillator();
  let gain = audioCtx.createGain();
  let filter = audioCtx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.setValueAtTime(110, audioCtx.currentTime);
  filter.Q.setValueAtTime(4, audioCtx.currentTime);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(90, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.12);
  gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.14);
  osc.connect(filter);
  filter.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.15);
}

function playLocalClick() {
  const audio = new Audio('click.mp3');
  audio.volume = 0.8;
  audio.play().catch(err => {});
}

// TEXTO INTRODUCTORIO
const introTxt = `Conexión establecida con el plano sutil.\n\nFiltros de ruido ajustados.\n\nSixto Rey está en sintonía...`;
let ii = 0; const intro = document.getElementById("intro");
(function type(){ if(ii < introTxt.length){ intro.textContent += introTxt[ii++]; setTimeout(type, 25); } })();

// GENERACIÓN DE LETRAS ORGANIZADAS
const letters = "ABCDEFGHIJKLMNÑOPQRSTUVWXYZ".split("");
const grid = document.getElementById("grid");
const pos = {};

letters.forEach(l => {
  let d = document.createElement("div");
  d.className = "cell";
  d.id = "c" + l;
  d.textContent = l;
  grid.appendChild(d);
});

function mapPos() {
  const b = document.getElementById("board").getBoundingClientRect();
  letters.forEach(l => {
    const r = document.getElementById("c" + l).getBoundingClientRect();
    pos[l] = { x: r.left - b.left + r.width / 2, y: r.top - b.top + r.height * 0.35 };
  });
  ["HOLA", "ADIOS", "ESTRELLA"].forEach(id => {
    const el = document.getElementById("c" + id);
    if(el) {
      const r = el.getBoundingClientRect();
      pos[id] = { x: r.left - b.left + r.width / 2, y: r.top - b.top + r.height * 0.5 };
    }
  });
}
setTimeout(mapPos, 600);
window.onresize = mapPos;

// DIÁLOGOS GENERALES DE SIXTO REY (SISTEMA RPG)
const sixtoComments = [
  "Algo me dice que miente.",
  "Es extraño. Siempre evita ciertos recuerdos.",
  "No sé por qué, pero esa respuesta me preocupa.",
  "Siento un cambio drástico de temperatura en la habitación...",
  "No me gusta como habla de esa forma.",
  "Tal vez recuerda más de lo que admite."
];

let activeDialogTimeout = null;
function showRpgDialog(text) {
  const box = document.getElementById("rpgBox");
  const textBox = document.getElementById("rpgText");
  
  clearTimeout(activeDialogTimeout);
  textBox.textContent = text;
  box.classList.add("show");
  
  activeDialogTimeout = setTimeout(() => {
    box.classList.remove("show");
  }, 6000);
}

function chooseResponse(q){
  q = q.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");

  // CASO: HOLA
  if(q === "hola" || q.includes("buenos dias") || q.includes("saludos")) {
    showRpgDialog("Sixto: ¡Vaya!.");
    return "HOLA";
  }
  
  // CASO: ADIOS
  if(q === "adios" || q.includes("chau") || q.includes("terminar")) {
    showRpgDialog("Sixto suspira con un alivio evidente: Bien... corta la sesión de inmediato antes de que decida quedarse.");
    return "ADIOS";
  }

  // ESTADOS DE ÁNIMO Y CONDICIÓN (EL HOMBRE)
  if(q.includes("estas bien") || q.includes("como te sientes") || q.includes("como estas") || q.includes("sientes")) {
    showRpgDialog("Sixto: Su energía se siente pesada... cargada de aislamiento y encierro.");
    return rand([
      "ME SIENTO MUY SOLO", 
      "ESTOY ATRAPADO AQUI", 
      "SIENTO UN REMORDIMIENTO QUE NO SE QUITA"
    ]);
  }

  if(q.includes("enojado") || q.includes("molesto") || q.includes("furia")) {
    showRpgDialog("Sixto: No parece ira lo que emana de la tabla, es algo mucho más triste.");
    return "NO ESTOY ENOJADO ESTOY ARREPENTIDO";
  }

  if(q.includes("feliz") || q.includes("alegre") || q.includes("contento")) {
    showRpgDialog("Sixto: Es imposible que haya felicidad en un plano tan liminal como este.");
    return "LA FELICIDAD SE QUEDO EN EL PASADO AQUI SOLO HAY SOLEDAD";
  }

  // RELACIÓN CON EL USUARIO (SABER QUIÉN ES)
  if(q.includes("me conoces") || q.includes("sabes quien soy") || q.includes("quien soy yo")) {
    showRpgDialog("Sixto se estremece: Espera... ¿te conoce? ¿De dónde?");
    return "YO SE PERFECTAMENTE QUIEN ERES TU";
  }

  if(q.includes("te conozco") || q.includes("quien eres tu para mi")) {
    showRpgDialog("Sixto: Es un juego mental peligroso. Aunque él te conozca, tú no tienes idea de su identidad.");
    return "TU NO SABES QUIEN SOY YO";
  }

  // --- BASE DE DATOS DE PERSONAJES ---
  if (q.includes("edison")) {
    showRpgDialog("Sixto: Edison... he oído hablar de sus encuadres.");
    return "FOTOGRAFO EL ESTA BUSCANDO A ALGUIEN";
  }
  if (q.includes("iris")) {
    showRpgDialog("Sixto: Espera... ¿la que vemos a diario no es ella?");
    return "LA REAL TRABAJA EN EL CAN ALGUIEN ATRAPO UNA COPIA DE ELLA";
  }
  if (q.includes("susana")) {
    showRpgDialog("Sixto: Eso lo cambia todo. ¿Quién está al mando entonces?");
    return "FOTOGRAFA Y DIRIGE LA QUE ESTA ENCERRADA AQUI NO ES LA REAL";
  }
  if (q.includes("goio")) {
    showRpgDialog("Sixto: La aguja vibró con fuerza. Hay mucha tensión en ese nombre.");
    return "NO QUIERO HABLAR DE EL";
  }
  if (q.includes("vanessa") || q.includes("vanesa")) {
    showRpgDialog("Sixto: El collage... cortar trozos de realidades.");
    return "ARTISTA LE GUSTA EL COLLAGE";
  }
  if (q.includes("adrian")) {
    showRpgDialog("Sixto: Sus trazos están conectados a alguien más.");
    return "PINTA MEJOR AMIGO DE CRISTOPHER";
  }
  if (q.includes("cristopher")) {
    showRpgDialog("Sixto: Un lazo afectivo reflejado en el lienzo.");
    return "PINTA NOVIO DE CRISTINA";
  }
  if (q.includes("cristina")) {
    showRpgDialog("Sixto: Tejer... entrelazar hilos como almas.");
    return "ARTISTA LE GUSTA TEJER";
  }
  if (q.includes("brenda")) {
    showRpgDialog("Sixto: Puedo sentir su miedo desde aquí.");
    return "ARTISTA CREO QUE LE DA MIEDO EL ESPIRITU";
  }
  if (q.includes("alfredo esparza") || q.includes("alfredo")) {
    showRpgDialog("Sixto: ¿Periodista? Las historias impresas no coinciden con los registros.");
    return "DICEN QUE ES FOTOGRAFO PERO LA VERSION ATRAPADA AQUI ES PERIODISTA";
  }
  if (q.includes("isaac")) {
    showRpgDialog("Sixto: Qué trágico... un alma noble sin tiempo.");
    return "FOTOGRAFO GRAN CORAZON POCO TIEMPO";
  }
  if (q.includes("perlinka")) {
    showRpgDialog("Sixto: Una energía inusualmente cálida cruzó el ambiente.");
    return "ANIMADORA LA REPRESENTACION DE LA GENTILEZA";
  }
  if (q.includes("andrea")) {
    showRpgDialog("Sixto: Una mente creativa atrapada en formas tridimensionales.");
    return "NO LE GUSTAN LOS FURROS ESO LO SE ";
  }
  if (q.includes("chacho")) {
    showRpgDialog("Sixto: Tinta, papel y fanzines.");
    return "GRAN FANZINERO";
  }
  if (q.includes("mario")) {
    showRpgDialog("Sixto: Un nombre respetable en el entorno.");
    return "GRAN ARTISTA";
  }
  if (q.includes("mariana zertuche") || q.includes("mariana")) {
    showRpgDialog("Sixto: Capturando momentos congelados.");
    return "GRAN FOTOGRAFA";
  }
  if (q.includes("cucho")) {
    showRpgDialog("Sixto: Otro creador.");
    return "HACE ARTE";
  }
  if (q.includes("paty")) {
    showRpgDialog("Sixto: El metal y la madera grabados a fuego.");
    return "HACE GRABADO";
  }
  if (q.includes("marcela")) {
    showRpgDialog("Sixto: Sus obras ocupaban paredes enteras.");
    return "HACE MURALISMO";
  }
  if (q.includes("jimenez") || q.includes("jose")) {
    showRpgDialog("Sixto palidece: Si la entidad le teme... nosotros deberíamos estar temblando.");
    return "EL ME DA MIEDO ES ARTISTA CONCEPTUAL";
  }

  // FILTRO DE DESCONOCIDOS (Si pregunta por alguien más)
  const nombresConocidos = ["edison", "iris", "susana", "goio", "vanessa", "vanesa", "adrian", "cristopher", "cristina", "brenda", "alfredo", "isaac", "perlinka", "andrea", "chacho", "mario", "mariana", "cucho", "paty", "marcela", "jimenez", "jose"];
  if (q.includes("quien es") || q.includes("conoces a") || q.includes("sabes algo de")) {
    let preguntaPorNombre = false;
    nombresConocidos.forEach(n => { if(q.includes(n)) preguntaPorNombre = true; });
    if (!preguntaPorNombre) {
      showRpgDialog("Sixto: No parece registrar a esa persona en su memoria sutil.");
      return "NO LO CONOZCO";
    }
  }

  // NUEVAS VARIANTES: NOS VES / TE VEMOS
  if(q.includes("nos ves") || q.includes("me ves") || q.includes("te vemos")) {
    showRpgDialog("Sixto: Escuché un crujido justo detrás de nosotros.");
    return rand([
      "LOS VEO DESDE EL AQUÍ", 
      "SIEMPRE LOS MIRO DESDE LA OSCURIDAD", 
      "ESTOY DETRAS DE TI"
    ]);
  }

  // NUEVAS VARIANTES: MANIFIESTATE / TE PUEDES MANIFESTAR
  if(q.includes("manifiestate") || q.includes("manifestar") || q.includes("puedes manifestar")) {
    showRpgDialog("Sixto: ¡No! No le des permiso para alterar el entorno físico...");
    return rand([
      "MIRA DEBAJO DE LA MESA", 
      "MIRA LAS VENTANA", 
      "YA LO ESTOY HACIENDO"
    ]);
  }

  // NUEVAS VARIANTES: EDAD
  if(q.includes("edad") || q.includes("cuantos anos") || q.includes("que edad")) {
    showRpgDialog("Sixto: El tiempo del otro lado no se mide en años corporales, quizás es confuso para él.");
    return rand([
      "EL TIEMPO SE DETUVO A LOS TREINTA Y DOS", 
      "TENGO LOS MISMOS DE ESTA ESCUELA", 
      "YA NO CUENTO MI EDAD"
    ]);
  }

  // NUEVAS VARIANTES: PREDICCIONES / FUTURO / QUE VA A PASAR
  if(q.includes("prediccion") || q.includes("futuro") || q.includes("va a pasar")) {
    showRpgDialog("Sixto: No deberías indagar en lo que aún no ha ocurrido....");
    return rand([
      "LA ESTRELLA SE APAGARA PRONTO", 
      "HOY HARAS ALGO HORRIBLE ", 
      "EL FOTOGRAFO GANARA UN PREMIO",
      "HOY MORIRA EL DE A LADO"
    ]);
  }

  // PREGUNTAS SOBRE SU IDENTIDAD / HISTORIA LORE (FOTÓGRAFO, SALÓN, EDIFICIO)
  if(q.includes("quien eras") || q.includes("quien eres") || q.includes("que hacias") || q.includes("arte") || q.includes("alumno") || q.includes("fotografo") || q.includes("salon") || q.includes("oficina") || q.includes("edificio")) {
    showRpgDialog("Sixto: Buena pregunta.");
    return rand([
      "SE QUE ME GUSTABA PINTAR Y HACER FOTO", 
      "ESO NO TE IMPORTA", 
      "EN EL CAN VES QUIEN SOY", 
      "MIRA MI CUERPO AHI VES",
      "NO QUIERES SABER"
    ]);
  }

  if(q.includes("de donde eres") || q.includes("donde estas")) {
    showRpgDialog("Sixto: Está hablando de algun lugar de aquí cerca.");
    return rand(["EN EL EDIFICIO ABANDONADO DE A LADO", "EN UN SALON PERDIDO SIN LUZ", "EN LA OFICINA DE REVELADO"]);
  }

  if(q.includes("hay alguien") || q.includes("con nosotros")) {
    showRpgDialog("Sixto susurra: Sí... definitivamente hay algo respondiendo.");
    return "SI AUN SIGO AQUI";
  }

  // Comentario RPG aleatorio general si no entra en ninguna categoría específica
  if(Math.random() < 0.60){
    setTimeout(() => { showRpgDialog("Sixto: " + rand(sixtoComments)); }, 1500);
  }

  return rand([
    "LO SIENTO TANTO NO SE QUE DECIR", "NUNCA ME FUI PERO AUN NO ENTIENDO", "PREGUNTALE A LA ESTRELLA", "ME CUESTA RESPONDER ESO", "NO QUIERO RECORDARLO"
  ]);
}

function rand(a){ return a[Math.floor(Math.random()*a.length)]; }

async function spell(text){
  initAudio(); 
  const p = document.getElementById("p");
  const out = document.getElementById("response");
  out.textContent = "";

  let tokens = [];
  if (text === "HOLA" || text === "ADIOS" || text === "ESTRELLA") {
    tokens.push(text);
  } else {
    tokens = text.toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").split("");
  }

  for(const token of tokens){
    if(pos[token]){
      const targetCell = document.getElementById("c"+token);
      const pilarContainer = document.getElementById("pilarEstrellaContainer");
      
      document.querySelectorAll(".active, .active-pilar").forEach(x => x.classList.remove("active", "active-pilar"));
      
      p.style.left = pos[token].x + "px";
      p.style.top = pos[token].y + "px";

      await new Promise(r => setTimeout(r, 450));
      
      playLocalClick();
      playSpookyClick();
      
      if(targetCell) targetCell.classList.add("active");
      if(token === "ESTRELLA" && pilarContainer) pilarContainer.classList.add("active-pilar");

      await new Promise(r => setTimeout(r, 550));
    } else {
      await new Promise(r => setTimeout(r, 250));
    }
    out.textContent += token;
  }

  setTimeout(() => {
    document.querySelectorAll(".active, .active-pilar").forEach(x => x.classList.remove("active", "active-pilar"));
  }, 1200);
}

function ask(){
  const q = document.getElementById("q").value.trim();
  if(!q) return;
  document.getElementById("q").value = "";
  
  playLocalClick();
  spell(chooseResponse(q));
}

document.getElementById("q").addEventListener("keydown", e => {
  if(e.key === "Enter") ask();
});

document.getElementById("close").onclick = () => {
  document.querySelector(".wrap").style.display = "none";
  document.getElementById("static").style.display = "flex";
  setTimeout(() => { window.close(); }, 500);
};
</script>
