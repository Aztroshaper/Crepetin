<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Jardín</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB; /* Azul cielo */
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            display: block;
        }
        #instructions {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #333;
            text-align: center;
            background: rgba(255, 255, 255, 0.8);
            padding: 30px;
            border: 2px solid #aaa;
            border-radius: 10px;
            pointer-events: none;
            z-index: 10;
        }
        #end-screen {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #fff;
            color: #2b8a3e; /* Verde bosque */
            justify-content: center;
            align-items: center;
            font-size: 4rem;
            z-index: 100;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-align: center;
            font-weight: bold;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>
</head>
<body>
    <div id="instructions">
        <h2>HAZ CLIC PARA ENTRAR AL JARDÍN</h2>
        <p>Usa W, A, S, D para caminar por las flores.</p>
        <p>Usa el ratón para mirar a tu alrededor.</p>
    </div>

    <div id="end-screen">
        TE ESTABA ESPERANDO
    </div>

    <script type="module">
        import * as THREE from 'three';

        // 1. Escena, Niebla e Iluminación (Jardín brillante)
        const scene = new THREE.Scene();
        const fogColor = new THREE.Color(0xdcf0e5); // Niebla clara/luminosa
        scene.background = fogColor;
        scene.fog = new THREE.Fog(fogColor, 5, 50);

        // Luces vibrantes para el jardín
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xfffae6, 1);
        dirLight.position.set(20, 40, 20);
        scene.add(dirLight);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. Camino de piedra y Suelo de pasto
        const pathGeo = new THREE.PlaneGeometry(6, 200);
        const pathMat = new THREE.MeshStandardMaterial({ 
            color: 0xcccccc, // Gris claro tipo piedra
            roughness: 0.9 
        });
        const path = new THREE.Mesh(pathGeo, pathMat);
        path.rotation.x = -Math.PI / 2;
        path.position.z = -90;
        scene.add(path);

        const groundGeo = new THREE.PlaneGeometry(200, 200);
        const groundMat = new THREE.MeshStandardMaterial({ 
            color: 0x4d9933, // Verde pasto vibrante
            roughness: 1.0 
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.05;
        ground.position.z = -90;
        scene.add(ground);

        // 3. Crear Flores
        function createFlower(x, z) {
            const flowerGroup = new THREE.Group();

            // Tallo
            const stemGeo = new THREE.CylinderGeometry(0.05, 0.05, 1);
            const stemMat = new THREE.MeshStandardMaterial({ color: 0x228b22 }); // Verde oscuro
            const stem = new THREE.Mesh(stemGeo, stemMat);
            stem.position.y = 0.5;
            flowerGroup.add(stem);

            // Pétalos (Dodecaedro para dar forma abstracta bonita)
            const petalColors = [0xff69b4, 0xffd700, 0x8a2be2, 0xff4500, 0x00ced1];
            const randomColor = petalColors[Math.floor(Math.random() * petalColors.length)];
            const petalGeo = new THREE.DodecahedronGeometry(0.3);
            const petalMat = new THREE.MeshStandardMaterial({ color: randomColor, roughness: 0.4 });
            const petals = new THREE.Mesh(petalGeo, petalMat);
            petals.position.y = 1.1;
            flowerGroup.add(petals);

            // Variar el tamaño y rotación ligeramente
            flowerGroup.scale.setScalar(Math.random() * 0.5 + 0.8);
            flowerGroup.rotation.y = Math.random() * Math.PI;
            flowerGroup.position.set(x, 0, z);

            scene.add(flowerGroup);
        }

        // Generar un campo de flores (evitando el camino central)
        for(let i = 0; i < 300; i++) {
            let x = (Math.random() - 0.5) * 100;
            let z = -(Math.random() * 180);
            // Si está muy cerca del centro (camino), lo movemos a un lado
            if (x > -4 && x < 4) {
                x = x > 0 ? x + 4 : x - 4;
            }
            createFlower(x, z);
        }

        // 4. Esferas Flotantes (con datos para animación)
        const floatingSpheres = [];
        const sphereGeo = new THREE.SphereGeometry(0.4, 16, 16);
        
        for(let i = 0; i < 60; i++) {
            const sphereMat = new THREE.MeshStandardMaterial({
                color: Math.random() * 0xffffff,
                emissive: Math.random() * 0x333333,
                transparent: true,
                opacity: 0.8,
                roughness: 0.1,
                metalness: 0.5
            });
            const sphere = new THREE.Mesh(sphereGeo, sphereMat);
            
            // Posición inicial aleatoria
            sphere.position.set(
                (Math.random() - 0.5) * 60,
                Math.random() * 4 + 1, // Altura base entre 1 y 5
                -(Math.random() * 150)
            );
            
            // Guardar datos para la animación en userData
            sphere.userData = {
                baseY: sphere.position.y,
                speed: Math.random() * 2 + 1,    // Velocidad de oscilación
                offset: Math.random() * Math.PI * 2 // Desfase para que no se muevan igual
            };

            floatingSpheres.push(sphere);
            scene.add(sphere);
        }

        // 5. Puerta Mágica al final
        const doorGroup = new THREE.Group();
        const doorGeo = new THREE.BoxGeometry(4, 7, 0.5);
        const doorMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffee, emissiveIntensity: 0.5 });
        const door = new THREE.Mesh(doorGeo, doorMat);
        door.position.y = 3.5;
        doorGroup.add(door);

        const doorLight = new THREE.PointLight(0xffffff, 4, 30);
        doorLight.position.set(0, 3.5, 2);
        doorGroup.add(doorLight);

        doorGroup.position.set(0, 0, -100);
        scene.add(doorGroup);

        // 6. Controles First Person
        let isLocked = false;
        const instructions = document.getElementById('instructions');

        document.body.addEventListener('click', () => {
            if (!isLocked) document.body.requestPointerLock();
        });

        document.addEventListener('pointerlockchange', () => {
            isLocked = document.pointerLockElement === document.body;
            instructions.style.display = isLocked ? 'none' : 'block';
        });

        let pitch = 0, yaw = 0;
        document.addEventListener('mousemove', (e) => {
            if (isLocked) {
                yaw -= e.movementX * 0.002;
                pitch -= e.movementY * 0.002;
                pitch = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, pitch));
                camera.rotation.set(pitch, yaw, 0, 'YXZ');
            }
        });

        const keys = { w: false, a: false, s: false, d: false };
        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (keys.hasOwnProperty(key)) keys[key] = true;
        });
        document.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (keys.hasOwnProperty(key)) keys[key] = false;
        });

        // 7. Evento de cierre a los 60 segundos
        setTimeout(() => {
            const endScreen = document.getElementById('end-screen');
            endScreen.style.display = 'flex';
            document.exitPointerLock();
            
            setTimeout(() => {
                window.close();
                document.body.innerHTML = '<div style="background:white;height:100vh;width:100vw;color:#2b8a3e;display:flex;justify-content:center;align-items:center;font-size:4rem;font-family:monospace;text-align:center;font-weight:bold;text-transform:uppercase;">TE ESTABA ESPERANDO</div>';
            }, 2000);
        }, 60000);

        // 8. Bucle de Renderizado y Animación
        const speed = 0.12;
        const direction = new THREE.Vector3();
        const right = new THREE.Vector3();

        function animate() {
            requestAnimationFrame(animate);

            // Animación de las esferas flotantes
            const time = performance.now() * 0.001; // Tiempo en segundos
            floatingSpheres.forEach(sphere => {
                // Función seno para que suban y bajen suavemente
                sphere.position.y = sphere.userData.baseY + Math.sin(time * sphere.userData.speed + sphere.userData.offset) * 1.5;
            });

            // Movimiento de la cámara
            if (isLocked) {
                camera.getWorldDirection(direction);
                direction.y = 0; 
                direction.normalize();
                right.crossVectors(camera.up, direction).normalize();

                if (keys.w) camera.position.addScaledVector(direction, speed);
                if (keys.s) camera.position.addScaledVector(direction, -speed);
                if (keys.a) camera.position.addScaledVector(right, speed);
                if (keys.d) camera.position.addScaledVector(right, -speed);
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
