<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Intro</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Courier New", monospace;
}

body{
background:
linear-gradient(rgba(0,0,0,.84), rgba(0,0,0,.9)),
url("fondo.jpg");

background-size:cover;
background-position:center;

overflow:hidden;
height:100vh;
color:#ddd;
}

/* VHS EFFECT */

body::before{
content:"";
position:fixed;
inset:0;

background:
repeating-linear-gradient(
to bottom,
rgba(255,255,255,.04) 0px,
rgba(255,255,255,.04) 1px,
transparent 2px,
transparent 4px
);

opacity:.2;
pointer-events:none;
animation:scan .12s linear infinite;
z-index:9999;
}

@keyframes scan{
from{transform:translateY(0px);}
to{transform:translateY(4px);}
}

/* PANTALLA DE INICIO LIMINAL */
.startOverlay {
position: fixed;
inset: 0;
background: #050505;
z-index: 10000;
display: flex;
justify-content: center;
align-items: center;
transition: opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1);
}

.clickContainer {
position: relative;
width: 320px;
height: 320px;
display: flex;
justify-content: center;
align-items: center;
}

.rotatingText {
position: absolute;
width: 100%;
height: 100%;
animation: spinText 15s linear infinite;
pointer-events: none;
text-shadow: 0 0 8px rgba(255, 255, 255, 0.2);
}

@keyframes spinText {
100% { transform: rotate(360deg); }
}

.cameraStartBtn {
width: 150px;
height: 150px;
border-radius: 50%;
border: 2px dashed rgba(255,255,255,0.3);
background: rgba(15,15,15,0.9);
color: #fff;
font-weight: bold;
letter-spacing: 2px;
font-size: 12px;
cursor: pointer;
transition: all 0.4s ease;
box-shadow: 0 0 20px rgba(0,0,0,0.8);
z-index: 10;
display: flex;
justify-content: center;
align-items: center;
margin: 0;
}

.cameraStartBtn:hover {
background: #ffffff;
color: #000000;
border-style: solid;
box-shadow: 0 0 30px rgba(255,255,255,0.4);
transform: scale(1.05);
}

.section{
position:absolute;
inset:0;
display:none;
justify-content:center;
align-items:center;
}

.section.active{
display:flex;
}

/* ========================= */
/* CAMERA */
/* ========================= */

.cameraWrapper{
display:flex;
flex-direction:column;
align-items:center;
gap:25px;
}

.cameraBox{
width:420px;
height:420px;
overflow:hidden;
position:relative;
border:2px solid rgba(255,255,255,.15);
transition:all .5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
background:black;
box-shadow: 0 0 30px rgba(0,0,0,0.9);
}

/* Animación Glitch para cambio de formas */
@keyframes shapeGlitch {
0% { transform: scale(1) skewX(0deg); filter: brightness(1) hue-rotate(0deg); }
25% { transform: scale(1.08) skewX(6deg); filter: brightness(1.8) hue-rotate(90deg); }
50% { transform: scale(0.95) skewX(-6deg); filter: brightness(0.6) hue-rotate(180deg); }
75% { transform: scale(1.03) skewX(2deg); filter: brightness(1.4) hue-rotate(270deg); }
100% { transform: scale(1) skewX(0deg); filter: brightness(1) hue-rotate(360deg); }
}

.shape-change-anim {
animation: shapeGlitch 0.45s ease-in-out;
}

.cameraBox.square{
border-radius:0%;
}

.cameraBox.circle{
border-radius:50%;
}

.cameraBox.heart{
clip-path:path("M213 384C213 384 26 258 26 125C26 52 84 0 145 0C187 0 213 32 213 32C213 32 239 0 281 0C342 0 400 52 400 125C400 258 213 384 213 384Z");
}

.cameraBox.star{
clip-path:polygon(
50% 0%,
61% 35%,
98% 35%,
68% 57%,
79% 91%,
50% 70%,
21% 91%,
32% 57%,
2% 35%,
39% 35%
);
}

#video,
#canvas{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:cover;
}

#video{
opacity:0;
}

.messageBox {
width: 520px;
padding: 25px;
background: rgba(5, 5, 5, 0.85);
border: 1px solid rgba(255, 255, 255, 0.4);
text-align: center;
line-height: 1.7;
letter-spacing: 2px;
box-shadow: 0 0 15px rgba(255, 255, 255, 0.1), inset 0 0 20px rgba(255, 255, 255, 0.05), 0 0 20px rgba(0, 0, 0, 0.8);
backdrop-filter: blur(8px);
position: relative;
/* Quitamos overflow: hidden; para que no tape nada externo */
}

#mainMessage {
transition: color 0.3s ease;
font-weight: bold;
}

.status{
opacity:.7;
color: #aaa;
margin-top: 5px;
}

/* ========================= */
/* INTRO */
/* ========================= */

.scene{
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

.centerGif{
width:520px;
filter:contrast(120%) brightness(75%) saturate(70%);
}

.dialogueBox {
position: absolute;
bottom: 40px;
width: 85%;
padding: 30px;
background: rgba(8, 8, 8, 0.90);
border: 1px solid rgba(255, 255, 255, 0.6);
box-shadow: 0 0 20px rgba(255, 255, 255, 0.15), inset 0 0 30px rgba(255, 255, 255, 0.05), 0 0 25px rgba(0, 0, 0, 0.8);
transition: all 0.3s ease;
position: relative;
/* Quitamos overflow: hidden; para salvar los botones de velocidad */
}

.dialogueText{
min-height:100px;
line-height:1.8;
text-shadow: 0 0 2px rgba(255,255,255,0.2);
}

.dialogueText::after {
content: "█";
animation: blinkCursor 0.8s step-start infinite;
margin-left: 5px;
color: #ddd;
}

@keyframes blinkCursor {
50% { opacity: 0; }
}

/* Controles de velocidad y salto */
.dialogueControls {
display: none;
position: absolute;
top: -45px;
right: 0;
gap: 10px;
z-index: 10;
}

.ctrlBtn {
margin: 0;
padding: 8px 16px;
width: auto;
font-size: 11px;
background: rgba(10,10,10,0.9);
border: 1px solid rgba(255,255,255,0.3);
display: inline-block;
color: #aaa;
transition: all 0.2s ease;
}

.ctrlBtn:hover {
background: #fff;
color: #000;
border-color: #fff;
transform: translateY(-2px);
}

.choiceContainer{
display:none;
gap:15px;
margin-top:20px;
}

button,
a{
border:1px solid rgba(255,255,255,.12);
padding:15px 24px;
background:#101010;
color:#ddd;
cursor:pointer;
letter-spacing:2px;
width:100%;
margin-top:15px;
display:block;
text-decoration:none;
text-align:center;
transition: all 0.3s ease;
}

button:hover,
a:hover{
transform:scale(1.02);
background: #fff;
color: #000;
border-color: #fff;
}

/* ========================= */
/* EFECTOS VISUALES CRT/VHS  */
/* ========================= */

.messageBox::before, .dialogueBox::before {
content: "";
position: absolute;
inset: 0;
background: repeating-linear-gradient(
  to bottom,
  rgba(255, 255, 255, 0.02) 0px,
  rgba(255, 255, 255, 0.02) 2px,
  rgba(0, 0, 0, 0.5) 3px,
  rgba(0, 0, 0, 0.5) 4px
);
background-size: 100% 4px;
pointer-events: none;
z-index: 1;
animation: vhsLinesMove 0.25s linear infinite;
}

@keyframes vhsLinesMove {
0% { background-position: 0 0; }
100% { background-position: 0 4px; }
}

.messageBox > *, .dialogueBox > * {
position: relative;
z-index: 2;
}

#mainMessage, .dialogueText, #nameInput {
color: #fff;
text-shadow: 
  1px 0px 1px rgba(255,0,0,0.8), 
  -1px 0px 1px rgba(0,255,255,0.8);
animation: vhsTextGlitch 4s infinite;
}

@keyframes vhsTextGlitch {
0%, 100% {
  text-shadow: 1px 0px 1px rgba(255,0,0,0.8), -1px 0px 1px rgba(0,255,255,0.8);
}
10% {
  text-shadow: -2px 0px 1px rgba(255,0,0,0.8), 2px 0px 1px rgba(0,255,255,0.8);
}
20% {
  text-shadow: 1px 0px 1px rgba(255,0,0,0.8), -1px 0px 1px rgba(0,255,255,0.8);
}
25% {
  text-shadow: 0px 0px 0px rgba(255,0,0,0), 0px 0px 0px rgba(0,255,255,0);
  transform: skewX(0deg);
}
26% {
  text-shadow: 3px 0px 1px rgba(255,0,0,0.9), -3px 0px 1px rgba(0,255,255,0.9);
  transform: skewX(-5deg);
}
27% {
  text-shadow: 0px 0px 0px rgba(255,0,0,0), 0px 0px 0px rgba(0,255,255,0);
  transform: skewX(0deg);
}
60% {
  text-shadow: 1px 0px 1px rgba(255,0,0,0.8), -1px 0px 1px rgba(0,255,255,0.8);
}
}

</style>
</head>

<body>

<div class="startOverlay" id="startOverlay">
<div class="clickContainer">
<svg viewBox="0 0 200 200" class="rotatingText">
<path id="textPath" d="M 100, 100 m -70, 0 a 70,70 0 1,1 140,0 a 70,70 0 1,1 -140,0" fill="transparent" />
<text fill="#ffffff" font-size="10.5" letter-spacing="4.5" font-family="monospace">
<textPath href="#textPath">DALE CLICK • DALE CLICK • DALE CLICK • </textPath>
</text>
</svg>
<button class="cameraStartBtn" id="cameraStartBtn">ABRIR CÁMARA</button>
</div>
</div>

<section class="section active" id="cameraSection">

<div class="cameraWrapper">

<div class="messageBox" id="messageBox">

<div id="mainMessage">
ESPERANDO CONECTAR CÁMARA...
</div>

<div class="status" id="subMessage">
Victor está observando.
</div>

</div>

<div class="cameraBox square" id="cameraBox">

<video id="video" autoplay muted playsinline></video>

<canvas id="canvas"></canvas>

</div>

</div>

</section>

<section class="section" id="introSection">

<div class="scene">

<img class="centerGif" src="ave3.gif">

<div class="dialogueBox" id="dialogueBox">

<div class="dialogueControls" id="dialogueControls">
<button class="ctrlBtn" id="speedBtn">VELOCIDAD x2</button>
<button class="ctrlBtn" id="skipBtn">SALTAR DIÁLOGOS</button>
</div>

<div class="dialogueText" id="dialogueText"></div>

<div id="nameInputContainer"
style="display:none;margin-top:20px;">

<input
id="nameInput"
placeholder="ESCRIBE TU NOMBRE"

style="
width:100%;
padding:14px;
background:black;
color:white;
border:2px solid white;
">

<br><br>

<button id="submitName">
ENVIAR
</button>

</div>

<div class="choiceContainer" id="choiceContainer">

<a href="overlap.html">
AYUDAR A VICTOR
</a>

<a href="alt.html">
NO AYUDAR A VICTOR
</a>

</div>

</div>

</div>

</section>

<audio id="cameraMusic" loop autoplay>
<source src="camara.mp3" type="audio/mpeg">
</audio>

<audio id="introMusic" loop>
<source src="vicintro.wav" type="audio/mpeg">
</audio>

<script>

/* ========================= */
/* CAMERA */
/* ========================= */

const cameraSection =
document.getElementById("cameraSection");

const introSection =
document.getElementById("introSection");

const video =
document.getElementById("video");

const canvas =
document.getElementById("canvas");

const ctx =
canvas.getContext("2d");

const cameraBox =
document.getElementById("cameraBox");

const mainMessage =
document.getElementById("mainMessage");

const subMessage =
document.getElementById("subMessage");

const cameraMusic =
document.getElementById("cameraMusic");

const introMusic =
document.getElementById("introMusic");

let stream;
let running = false;
let cameraTimeout; // Guardará el temporizador de 10 segundos
let fallbackActive = false; // Evita ejecuciones dobles si falla rápido

const phases = [

{
shape:"square",
text:"PON UNA CARA FELIZ"
},

{
shape:"circle",
text:"PON UNA CARA TRISTE"
},

{
shape:"heart",
text:"PON UNA CARA DE ENOJO"
},

{
shape:"star",
text:"PON UNA CARA COMO SI ESTUVIERAS MUERTO"
}

];

// Evento de click inicial
document.getElementById("cameraStartBtn").onclick = () => {
const overlay = document.getElementById("startOverlay");
overlay.style.opacity = "0";
setTimeout(() => {
overlay.style.display = "none";
startCamera();
}, 600);
};

// Función centralizada para manejar el rechazo, bloqueo o lentitud de la cámara
function handleCameraFallback() {
if (fallbackActive) return;
fallbackActive = true;
clearTimeout(cameraTimeout);

if(stream) {
stream.getTracks().forEach(t => t.stop());
}
running = false;

mainMessage.innerText = "SISTEMA SIN ACCESO ÓPTICO";
subMessage.innerText = "BUSCANDO ALTERNATIVAS...";

setTimeout(() => {
typeCustomTarget(mainMessage, "Oh, estamos tristes de que no nos dejes ver tu rostro, pero tenemos otros metodos para saber como eres, tu tranqui@", 35, () => {
setTimeout(() => {
finishRecognition();
}, 3000);
});
}, 1500);
}

async function startCamera(){

// Inicia cuenta regresiva: si en 10 segundos running sigue siendo false, pasa al diálogo de contingencia
cameraTimeout = setTimeout(() => {
if (!running) {
handleCameraFallback();
}
}, 10000);

try{

await cameraMusic.play().catch(()=>{});

// Despliega la solicitud nativa del navegador
const localStream = await navigator.mediaDevices.getUserMedia({
video:true
});

// Si el temporizador de 10s ya venció mientras el usuario decidía, apagamos este stream colgado
if(fallbackActive) {
localStream.getTracks().forEach(t => t.stop());
return;
}

// Si llegó aquí antes de los 10 segundos, cancelamos el problema técnico
clearTimeout(cameraTimeout);
stream = localStream;
video.srcObject = stream;

canvas.width = 420;
canvas.height = 420;

running = true;

render();

subMessage.innerText =
"CÁMARA CONECTADA";

setTimeout(()=>{
runPhase(0);
},1500);

}catch(e){
// Entra aquí si el usuario rechaza explícitamente al instante
handleCameraFallback();
}
}

function render(){

if(!running) return;

ctx.clearRect(0,0,420,420);

ctx.drawImage(video,0,0,420,420);

/* deformación */

ctx.drawImage(
video,
80,
30,
260,
260,
40,
0,
340,
320
);

for(let i=0;i<12;i++){

let y = Math.random()*420;
let h = Math.random()*14;

ctx.drawImage(
canvas,
0,
y,
420,
h,
(Math.random()-.5)*70,
y,
420,
h
);
}

ctx.fillStyle =
"rgba(0,30,0,.15)";

ctx.fillRect(0,0,420,420);

requestAnimationFrame(render);
}

function runPhase(index){

if(index >= phases.length){

finishRecognition();

return;
}

const phase = phases[index];

// Aplicar animación estética al cambiar forma
cameraBox.classList.add("shape-change-anim");
setTimeout(() => {
cameraBox.className = "cameraBox " + phase.shape;
}, 200);

setTimeout(() => {
cameraBox.classList.remove("shape-change-anim");
}, 450);

mainMessage.innerText = phase.text;

// Sistema de escaneo dinámico por porcentaje
let currentPct = 0;
subMessage.innerText = "ANALIZANDO... 0%";

const pctInterval = setInterval(() => {
currentPct += Math.floor(Math.random() * 5) + 3;
if(currentPct >= 100) {
currentPct = 100;
clearInterval(pctInterval);
subMessage.innerText = "BIEN HECHO [OK]";
setTimeout(()=>{
runPhase(index + 1);
},1200);
} else {
subMessage.innerText = `ANALIZANDO... ${currentPct}%`;
}
}, 65);
}

function finishRecognition(){

mainMessage.innerText = "RECONOCIMIENTO TERMINADO";
subMessage.innerText = "INICIANDO PERFIL HUMANO...";

setTimeout(()=>{

if(stream){

stream.getTracks().forEach(
t => t.stop()
);
}

cameraMusic.pause();
cameraMusic.currentTime = 0;

introMusic.pause();
introMusic.currentTime = 0;

cameraSection.classList.remove("active");

introSection.classList.add("active");

startIntro();

},2500);
}

// Función helper para la máquina de escribir de contingencia
function typeCustomTarget(element, text, speed, callback) {
element.innerHTML = "";
let i = 0;
const interval = setInterval(() => {
element.innerHTML += text[i];
i++;
if(i >= text.length) {
clearInterval(interval);
if(callback) callback();
}
}, speed);
}


const introSequence = [

"ANALIZANDO DATOS DE ROSTRO...",

"ROSTRO HUMANO RECONOCIDO...",

"Ingrese su nombre y apellido."

];

const dialogues = [
"Tras varios filtros, seleccionamos únicamente perfiles con alta tolerancia a lo liminal, lo defectuoso y lo digitalmente humano.",

"El arte unconventional no sobrevivirá a lo que viene después de esto..",

"Ahora, comenzaremos con el registro de los datos que acaba de proporcionar.",

"ANALIZANDO DATOS DE NOMBRE...",

"NOMBRE REGISTRADO.",

"",

"ERROR DE COINCIDENCIA.",

"",

"GENERANDO NUEVA IDENTIDAD DIGITAL...",

"...",

"NUEVO NOMBRE ASIGNADO: Victor Mestresé.",

"Hola Victor Mestresé, Conoce a tu nuevo compañero de prueba digital.",

"Él es tu otro Victor y es una copia digital de ti, una IA.",

"...",

"Pero él no lo sabe.",

"Debido a leyes digitales actualizadas en 2026, tuvimos que darle una historia diferente a la tuya para evitar intentos de suplantación de identidad.",

"Él piensa que es un hombre torreonense de 40 años, un viejo rabo verde con miles de aspiraciones por los suelos, una esposa resentida, salario mínimo y una gran variedad de trabajo artístico pretencioso que es más material de la basura.",

"Quizás Avelina Lesper le dedicaría uno que otro video para criticarle si no fuera porque no lo reconoce ni su hijo.",

"Aún así Victor quiere ser un gran artista...",

"No es su culpa valer madres y que lo hayan programado así.",

"Pero antes de ser un artista, tiene que ser un humano primero...",

"Para eso Victor tiene que lograr su primer Crepetín.",

"El Crepetín es el momento exacto en el que una risa pasa de ser fingida a ser verdadera.",

"¿Qué es más humano que una risa genuina?",

"Una IA que se vuelve humano, vaya concepto, ¿no?",

"Entonces, ¿ayudamos a Victor a ser un humano?"

];

const dialogueText =
document.getElementById("dialogueText");

const nameInputContainer =
document.getElementById("nameInputContainer");

const choiceContainer =
document.getElementById("choiceContainer");

let userName = "";
let currentDialogue = 0;
let typing = false;

// Variables dinámicas para aceleración y saltos
let textVelocity = 28;
let phrasePause = 2000;
let hasSkippedAll = false;
let currentDialogueTimeout = null;

function typeText(text, callback){

typing = true;

dialogueText.innerHTML = "";

let i = 0;

const interval = setInterval(()=>{

if(hasSkippedAll) {
clearInterval(interval);
typing = false;
return;
}

dialogueText.innerHTML += text[i];

i++;

if(i >= text.length){

clearInterval(interval);

typing = false;

if(callback) callback();
}

}, textVelocity);
}

function startIntro(){

typeText(introSequence[0], ()=>{

setTimeout(()=>{

typeText(introSequence[1], ()=>{

setTimeout(()=>{

typeText(introSequence[2], ()=>{

nameInputContainer.style.display =
"block";

});

},1000);

});

},1000);

});
}

function playAutomaticDialogues(){

if(hasSkippedAll || currentDialogue >= dialogues.length){
document.getElementById("dialogueControls").style.display = "none";
choiceContainer.style.display = "flex";
return;
}

typeText(dialogues[currentDialogue], ()=>{

currentDialogueTimeout = setTimeout(()=>{

if(!hasSkippedAll) {
currentDialogue++;
playAutomaticDialogues();
}

}, phrasePause);

});
}

document.getElementById("submitName")
.onclick = ()=>{

userName =
document.getElementById("nameInput").value;

if(!userName.trim()) return;

/* ========================= */
/* MUSIC STARTS HERE */
/* ========================= */

introMusic.play().catch(()=>{});

nameInputContainer.style.display =
"none";

document.getElementById("dialogueControls").style.display = "flex";

typeText(`Bienvenido ${userName}.`, ()=>{

setTimeout(()=>{

currentDialogue = 0;

playAutomaticDialogues();

},2000);

});
};

// Botones de velocidad y saltar
document.getElementById("speedBtn").onclick = (e) => {
e.stopPropagation();
textVelocity = 6;
phrasePause = 450;
document.getElementById("speedBtn").innerText = "MODO RÁPIDO [ON]";
document.getElementById("speedBtn").style.borderColor = "#00ff00";
document.getElementById("speedBtn").style.color = "#00ff00";
};

document.getElementById("skipBtn").onclick = (e) => {
e.stopPropagation();
hasSkippedAll = true;
clearTimeout(currentDialogueTimeout);
document.getElementById("dialogueControls").style.display = "none";
dialogueText.innerHTML = dialogues[dialogues.length - 1];
choiceContainer.style.display = "flex";
};

document.getElementById("dialogueBox")
.addEventListener("click", (e)=>{

if(
e.target.tagName === "BUTTON" ||
e.target.tagName === "INPUT" ||
e.target.tagName === "A"
) return;

if(typing || !userName) return;

});

</script>

</body>
</html>
