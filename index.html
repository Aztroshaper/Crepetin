<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CREPETÍN.ORG</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100vw;
    height:100vh;
    overflow:hidden;
    background:black;
    font-family:"Courier New", monospace;
    cursor:pointer;
}

/* GIF FONDO */

.bg{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-1;
}

/* TEXTO */

.start{
    position:absolute;
    bottom:70px;
    left:50%;
    transform:translateX(-50%);
    
    color:white;
    text-decoration:none;
    
    font-size:1rem;
    letter-spacing:4px;
    
    opacity:0;

    transition:0.2s;

    animation:flicker 2s infinite;

    pointer-events:none;
}

/* APARECE DESPUÉS */

.start.show{
    opacity:0.75;
    pointer-events:auto;
}

.start.show:hover{
    opacity:1;
    transform:translateX(-50%) scale(1.03);
}

@keyframes flicker{

    0%{
        opacity:0.3;
    }

    50%{
        opacity:1;
    }

    100%{
        opacity:0.3;
    }

}

</style>
</head>

<body>

<!-- TU GIF -->
<img src="inf.gif" class="bg">

<a class="start" id="start">
    DA CLICK O ENTER PARA INICIAR
</a>

<script>

const start =
document.getElementById("start");



setTimeout(() => {

    start.classList.add("show");

}, 6000);

function iniciar(){

    if(start.classList.contains("show")){

        window.location.href = "stare.html";
    }
}



start.addEventListener("click", iniciar);



document.addEventListener("keydown", function(e){

    if(e.key === "Enter"){

        iniciar();
    }
});

</script>

</body>
</html>
