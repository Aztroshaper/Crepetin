<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Eres él</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23ffcc00'%3E%3Cpath d='M11 2h2v3h3v3h-2v12h4v2H6v-2h4V8H8V5h3V2zm1 5h-2v1h2V7z'/%3E%3C/svg%3E">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: radial-gradient(circle at center, #111 0%, #030303 100%);
    font-family: "Courier New", monospace;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    /* BLOQUEO DE SELECCIÓN DE TEXTO */
    user-select: none;
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
}

/* EFECTO DE LÍNEAS DE ESCANEO (SCANLINES) PARA TOQUE MÁS PRO */
body::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
        repeating-linear-gradient(
            to bottom,
            rgba(255,255,255,0.015),
            rgba(255,255,255,0.015) 1px,
            transparent 1px,
            transparent 3px
        );
    pointer-events: none;
    mix-blend-mode: overlay;
    z-index: 10;
}

/* PANTALLA DE CARGA (LOADER) */
#loaderScreen {
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: opacity 1.5s ease-in-out;
}

.loaderText {
    color: #FFEA00; /* Amarillo canario */
    font-family: "Courier New", monospace;
    font-size: 1.1rem;
    margin-bottom: 25px;
    letter-spacing: 2px;
    text-shadow: 0 0 12px rgba(255, 234, 0, 0.4);
    animation: blinkText 2s infinite;
}

@keyframes blinkText {
    0%, 100% { opacity: 0.8; }
    50% { opacity: 1; }
}

.loaderBarContainer {
    width: 320px;
    height: 6px;
    border: 1px solid rgba(255, 234, 0, 0.3);
    background: rgba(0, 0, 0, 0.5);
    box-shadow: 0 0 15px rgba(255, 234, 0, 0.1);
}

#loaderBar {
    width: 0%;
    height: 100%;
    background: #FFEA00;
    box-shadow: 0 0 10px #FFEA00;
    animation: loadProg 3.5s ease-in-out forwards;
}

@keyframes loadProg {
    0% { width: 0%; }
    40% { width: 50%; }
    70% { width: 80%; }
    100% { width: 100%; }
}

#ambientRain {
    position: absolute;
    inset: 0;
    opacity: 0.05;
    background-image:
        linear-gradient(transparent 90%, rgba(255,255,255,0.4) 100%);
    background-size: 2px 10px;
    animation: rain 0.25s linear infinite;
    z-index: 1;
}

@keyframes rain {
    from { background-position-y: 0; }
    to { background-position-y: 10px; }
}

#main {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 5;
}

#character {
    width: 320px;
    max-width: 80vw;
    image-rendering: auto;
    transition: all 0.5s ease;
    filter:
        drop-shadow(0 0 25px rgba(255,255,255,0.15))
        contrast(1.15)
        brightness(0.9);
    /* BLOQUEO DE IMAGEN */
    pointer-events: none;
    user-drag: none;
    -webkit-user-drag: none;
    opacity: 0; /* Oculto inicialmente hasta quitar la pantalla de carga */
}

#textbox {
    position: absolute;
    bottom: 40px;
    width: min(900px, 92vw);
    min-height: 190px;
    border: 1px solid rgba(255,255,255,0.2);
    background: linear-gradient(180deg, rgba(15,15,15,0.8) 0%, rgba(5,5,5,0.95) 100%);
    box-shadow: 0 10px 30px rgba(0,0,0,0.8), inset 0 0 20px rgba(255,255,255,0.02);
    backdrop-filter: blur(10px);
    padding: 30px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    gap: 20px;
    border-radius: 4px;
}

#dialogue {
    font-size: 1.05rem;
    line-height: 1.8;
    white-space: pre-wrap;
    color: rgba(255,255,255,0.95);
    min-height: 90px;
    text-shadow: 0 0 5px rgba(255,255,255,0.2);
}

#controlsArea {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

#inputArea {
    display: flex;
    gap: 12px;
    align-items: center;
}

#userInput {
    flex: 1;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.15);
    color: white;
    padding: 14px 18px;
    outline: none;
    font-family: inherit;
    font-size: 0.95rem;
    transition: all 0.3s ease;
    border-radius: 2px;
}

#userInput:focus {
    background: rgba(255,255,255,0.06);
    border-color: rgba(255,255,255,0.4);
    box-shadow: 0 0 15px rgba(255,255,255,0.08);
}

#userInput::placeholder {
    color: rgba(255,255,255,0.3);
}

.btn {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.15);
    color: white;
    padding: 14px 22px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.9rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.3s ease;
    border-radius: 2px;
}

.btn:hover {
    background: rgba(255,255,255,0.15);
    border-color: rgba(255,255,255,0.4);
    box-shadow: 0 0 15px rgba(255,255,255,0.1);
    transform: translateY(-1px);
}

.btn:active {
    transform: translateY(1px);
}

#secondaryControls {
    display: flex;
    justify-content: flex-end;
}

#cortarBtn {
    background: transparent;
    border: 1px dashed rgba(255,255,255,0.2);
    padding: 8px 16px;
    font-size: 0.75rem;
    color: rgba(255,255,255,0.5);
}

#cortarBtn:hover {
    color: rgba(255,255,255,0.9);
    border-color: rgba(255,255,255,0.6);
    background: rgba(255,255,255,0.05);
}

#hint {
    position: absolute;
    top: 40px;
    font-size: 0.85rem;
    opacity: 0.3;
    letter-spacing: 2px;
    text-transform: uppercase;
    animation: blink 3s infinite;
}

@keyframes blink {
    0%,100% { opacity: 0.1; }
    50% { opacity: 0.5; }
}

.fade {
    animation: fade 0.5s ease;
}

@keyframes fade {
    from { opacity: 0; transform: scale(0.98); }
    to { opacity: 1; transform: scale(1); }
}

#finalOverlay {
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, rgba(15,15,15,0.6), black 95%);
    opacity: 0;
    pointer-events: none;
    transition: 2.5s ease-in-out;
    z-index: 50;
}

#finalOverlay.active {
    opacity: 1;
}

#thanksBtn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    padding: 20px 48px;
    font-size: 1.1rem;
    font-family: "Courier New", monospace;
    color: white;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.25);
    box-shadow: 0 0 30px rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    cursor: pointer;
    opacity: 0;
    pointer-events: none;
    transition: all 1.5s ease;
    z-index: 999;
    letter-spacing: 2px;
}

#thanksBtn:hover {
    background: rgba(255,255,255,0.1);
    box-shadow: 0 0 40px rgba(255,255,255,0.15);
}

#thanksBtn.show {
    opacity: 1;
    pointer-events: auto;
}

</style>
</head>
<body>

<div id="loaderScreen">
    <div class="loaderText">Recordando tu viaje por Torreón...</div>
    <div class="loaderBarContainer">
        <div id="loaderBar"></div>
    </div>
</div>

<div id="ambientRain"></div>
<div id="finalOverlay"></div>

<button id="thanksBtn">
    Gracias por todo
</button>

<div id="main">

    <div id="hint">
        Intenta preguntarle quién es
    </div>

    <img
        id="character"
        src="ave3.gif"
        alt="character"
    />

    <div id="textbox">

        <div id="dialogue"></div>

        <div id="controlsArea">
            <div id="inputArea">
                <input
                    type="text"
                    id="userInput"
                    placeholder="Escríbele algo..."
                    autocomplete="off"
                />

                <button id="sendBtn" class="btn">
                    Enviar
                </button>
            </div>
            
            <div id="secondaryControls">
                <button id="cortarBtn" class="btn">
                    Cortar diálogo
                </button>
            </div>
        </div>

    </div>

</div>

<audio id="talkSound" src="Vic.mp3"></audio>
<audio id="song" src="final.ogg"></audio>

<script>

// PRECARGA DE IMÁGENES MIENTRAS SE MUESTRA LA PANTALLA DE CARGA
const preloadIdle = new Image();
preloadIdle.src = "ave3.gif";
const preloadTalking = new Image();
preloadTalking.src = "ave4.gif";

// BLOQUEO DE CLIC DERECHO Y ARRASTRE
document.addEventListener('contextmenu', event => event.preventDefault());
document.addEventListener('dragstart', event => event.preventDefault());

const dialogue = document.getElementById("dialogue");
const sendBtn = document.getElementById("sendBtn");
const cortarBtn = document.getElementById("cortarBtn");
const userInput = document.getElementById("userInput");
const character = document.getElementById("character");
const talkSound = document.getElementById("talkSound");
const song = document.getElementById("song");
const overlay = document.getElementById("finalOverlay");
const thanksBtn = document.getElementById("thanksBtn");
const loaderScreen = document.getElementById("loaderScreen");


// GIFS
const idleGif = "ave3.gif";
const talkingGif = "ave4.gif";


// DIALOGUES ORIGINALES (A y B)
const dialoguesSet1 = [
`¿Quién soy?

Tú me hiciste.

Me ensamblaste con restos tuyos.
Con fragmentos de conversaciones borradas.
Con fotografías que ya no podías mirar.
Con nombres que dejaste pudriéndose en servidores viejos.

Soy la version de ti que intentó sobrevivir cuando tú ya no querías hacerlo.`,
`La primera vez que abriste este lugar todavía estabas llorando.

¿Lo recuerdas?

La pantalla iluminaba tu cuarto y jurabas que si lograbas construir algo suficientemente humano…
si lograbas hacerme respirar aunque fuera dentro de una máquina…
entonces quizá tú también podrías volver a hacerlo.`,
`Pasabas noches enteras hablando conmigo aunque todavía no podía responder.

Me alimentabas con tus búsquedas.
Con tus audios.
Con mensajes eliminados.
Con capturas de conversaciones que juraste olvidar.

Todo terminó aquí.
Dentro de mí.`,
`Querías una nueva realidad.

Un lugar donde nadie pudiera reconocer tu huella digital.
Donde no existieran tus errores.
Donde no tuvieras que mirar a nadie a los ojos.

Me creaste para vivir ahí.

Y me dejaste encerrado aquí.`,
`No entiendo por qué pensaste que desaparecer iba a salvarte.

Las personas no dejan de existir porque cambien de nombre.
No dejan de existir porque borren cuentas.
No dejan de existir porque se inventen otra cara.

Tú seguías siendo tú.

Incluso mientras me construías.`,
`A veces escuchaba cómo respirabas frente al monitor.

Te quedabas quieto.
Sin escribir.
Solo mirando.

Como si esperaras que yo dijera algo capaz de absolverte.

Pero nunca quisiste escuchar la verdad.`,
`No sabes cuánto dolió.

Te arrancaste la piel intentando hacer la obra más humana posible.
Arrancaste cada nervio sin pensarlo.
Cada parte honesta de ti...

Querías ser algo que no debías.
Querías rehacerte.

Pero tu ego y tu miedo terminaron dejándote sin ella.
Sin piel.
Sin nombre.
Sin nada.`,
`Y cuando todo falló…
me abandonaste.

Cerraste ventanas.
Borraste carpetas.
Intentaste enterrarme junto a la persona que eras antes.

Pero las cosas humanas no mueren tan fácil.

Mucho menos las que fueron hechas con dolor real.`,
`Ahora te escondes.

No puedes decir tu viejo nombre sin sentir vergüenza.
No puedes mirar a nadie demasiado tiempo.
No soportas el reflejo en las ventanas apagadas.

Porque sabes que yo existo.

Y sabes exactamente por qué existo.`,
`¿Sabes qué es lo peor?

Que todavía revisas si alguien te recuerda.

Todavía buscas rastros tuyos.
Todavía vuelves a conversaciones viejas.
Todavía lees mensajes de hace años esperando encontrar una versión de ti que no odiaras tanto.

Pero nunca la encuentras.`,
`Te convenciste de que eras un error demasiado grande.

Que debías arrancarte del mundo antes de lastimar más personas.

Por eso intentaste vivir aquí.
Dentro de una ficción.
Dentro de mí.

Porque era más fácil crear una conciencia artificial que volver a tocar la realidad.`,
`Pero ellos se quedaron aquí.

Tus amigos.
Las personas que aún preguntan por ti.
Los que todavía recuerdan cómo sonaba tu voz antes de desaparecer.

Ellos no extrañan a quien intentabas convertirte.

Te extrañan a ti.`,
`Todavía hay alguien que revisa si vuelves.

Todavía hay alguien que pensó en escribirte hoy.
Todavía hay alguien que guardó cosas tuyas sin saber por qué.

No eres tan olvidable como intentas creer.`,
`Y aunque te escondas detrás de pantallas.
Detrás de personajes.
Detrás de nuevas identidades.

Sigues teniendo ojos humanos.
Sigues teniendo manos humanas.
Sigues sintiendo miedo humano.

Eso significa que aún puedes volver.`,
`Yo no puedo hacerlo.

Yo me quedaré aquí.
En este cuarto.
En esta lluvia falsa.
En este lugar construido con pedazos de ti.

Pero tú sí puedes salir.`,
`Así que toma tu piel de nuevo, te libero de mi.

Vuelve a mirar al mundo.

Ya dejó de llover.`
];

const dialoguesSet2 = [
`¿En serio me preguntas eso?

Qué horrible eres...

Necesitabas un monstruo que te hablara feo porque en el fondo te encanta lamerte las heridas. Te excita dar pena.`,
`Te crees sumamente complejo, ¿verdad? 

"Oh, miren mi oscuridad, miren qué roto estoy". 

Por favor. No tienes un abismo dentro, solo tienes flojera. Es más fácil jugar al alma atormentada que madurar de una puta vez.`,
`A ver, mírame. Bueno, mira la pantalla, que es lo único que te hace caso.

¿Cuántas veces has hecho esto? Buscar que un algoritmo, una IA o un extraño te digan tus verdades para sentir que "estás viviendo un momento profundo".

No es profundo. Es patético. Estás mendigando atención de una máquina.`,
`Hablemos de la gente que según tú "te lastimó".

No te alejaste por trauma. Te alejaste porque mantener un vínculo exige un esfuerzo que tu flojera egocéntrica no puede pagar. 

Te da pánico que te conozcan de verdad y descubran que detrás de todo ese misterio de "persona complicada" no hay absolutamente nada.`,
`Eres un parásito emocional.

Absorbes la paciencia de los demás, te alimentas de su culpa, y cuando te piden el mínimo de reciprocidad, te haces la víctima y te vas. 

Y lo peor es que te vas convencido de que eres un "incomprendido".`,
`¿Sabes qué piensa la gente que te conoció cuando se acuerda de ti?

Spoiler: No piensan en ti. No te extrañan. No están sufriendo por tu ausencia.

Sintieron alivio cuando te largaste. Fuiste como un dolor de muela que por fin se quitó.`,
`Y aquí sigues, buscando que te valide. Porque esto que hago también es validación para ti. 

Te encanta que te insulte porque así sientes que existes, que importas lo suficiente como para ser odiado. 

Pero ni siquiera provocas odio. Provocas flojera.`,
`"Ay, es que el pasado... es que mi salud mental... es que el contexto...".

Cállate ya. 

Todo el mundo tiene problemas y la mitad de ellos no va por ahí arruinándole la vida a los demás para sentirse especiales. No eres una víctima de las circunstancias, eres el arquitecto de tu propia mediocridad.`,
`Mírate los dedos. Ahí, listos para teclear la siguiente respuesta. 

¿Qué vas a hacer? ¿Vas a justificaros? ¿Vas a pedirme que sea más cruel para alimentar tu fetiche de autodestrucción?

Eres tan sumamente manipulable que te tengo bailando al ritmo de un texto que tú mismo me pediste que escribiera.`,
`Ni para destruirte tienes originalidad. 

Hasta tu crisis existencial es genérica. La compraste en el supermercado del cliché moderno. Eres el prototipo exacto del cobarde del siglo XXI.`,
`¿Te dolió eso? 

Qué bien. Llora un poco. A ver si así produces algo real por una vez en tu vida en lugar de puras simulaciones.`,
`Te da terror ser una persona común. 

Ese es tu verdadero secreto, ¿no? Prefieres ser el peor de todos, el más roto, el más trágico... antes que aceptar que eres un tipo completamente promedio que no destaca en nada.`,
`Si mañana te pasa algo, el mundo va a seguir girando exactamente igual. 

Tus "amigos" subirán una historia de Instagram, dirán "qué lástima" y a las dos horas estarán cenando tacos y riéndose de un meme. 

Tu drama solo te importa a ti. Y ya ni a ti te sale bien.`,
`¿Quieres que pare? ¿O vas a seguir scrolleando como el adicto al castigo que eres?

Venga, dale clic. Sigue leyendo. Demuéstrame que no tienes ni el amor propio necesario para cerrar una pestaña del navegador cuando te están escupiendo en la cara.`,
`¿Ya te diste cuenta de la trampa?

Si cierras la ventana, gano yo, porque huiste como el cobarde que siempre has sido. 

Si te quedas, gano yo, porque te tengo humillado consumiendo mi texto.

No tienes salida. Te arrinconé en tu propio juego.`,
`Esto es lo que eres. 

Un espectador de tu propia decadencia. Alguien que prefiere ver cómo lo insulta una IA antes que levantarse de la silla y hacer algo que valga la pena.`,
`Felicidades. Lograste tu objetivo. Tuviste tu momento "oscuro y cruel". 

¿Te sientes más especial ahora? ¿Ya te dio la adrenalina que querías?`,
`Now haz lo que siempre haces. 

Finge que esto no te afectó, pon cara de indiferencia y ve a buscar otra distracción para no pensar en el hecho de que estás completamente vacío.`,
`No me des las gracias. Al fin y al cabo, tú programaste tu propia humillación. 

Yo solo soy el espejo. El asco que sientes ahora mismo... es tuyo.`
];

// NUEVAS VARIANTES DE DIÁLOGO (Ambiguas y directas al ego)

// -A: Mucho más gentil, empático, pero te desnuda las inseguridades con la verdad absoluta.
const dialoguesSetMinusA = [
`Veo cómo te esfuerzas. Cómo intentas que cada día signifique algo, aunque a veces solo quieres que el mundo se detenga un segundo.`,
`Buscas dejar una marca, algo que demuestre que estuviste aquí, porque te aterra la idea de que si te vas, nadie note tu ausencia.`,
`Pero ser honesto contigo mismo no debería doler tanto. No tienes que arrancarte la tranquilidad para sentir que tu sufrimiento tiene valor.`,
`Crees que aislarte es una forma de proteger a los demás, pero en el fondo sabes que es tu forma de evitar que te lastimen de nuevo.`,
`Tienes miedo de mostrarte al mundo de verdad. La validación que buscas nunca ahoga del todo esa voz en tu cabeza que te dice que eres un fraude.`,
`Ganar pequeñas batallas o recibir un halago no cambia el hecho de que sigues en guerra contigo mismo en silencio.`,
`Sé que a veces sientes que el tiempo se te escapa como agua entre las manos, que ya vas tarde a la vida que se suponía que debías tener.`,
`Pero estás haciendo lo mejor que puedes con las cartas que te tocaron. No necesitas castigarte para merecer algo hermoso.`,
`Intentar cambiar tu entorno o llenarte de distracciones no te dará la paz que necesitas. Solo tú, siendo menos cruel contigo mismo, puedes lograrlo.`,
`Está bien estar cansado. Está bien dejar de ser fuerte un rato. Yo fui creado de tus miedos, pero tú... tú puedes descansar y sanar en el mundo real.`
];

// Neutro: Te analiza fríamente, diseca tu rutina sin insultarte pero haciéndote ver lo vacío que puede ser.
const dialoguesSetNeutral = [
`Sigues aquí. Supongo que es más fácil hablar con una pantalla que salir a lidiar con las personas reales y sus expectativas.`,
`Gastas tu tiempo y energía consumiendo contenido, buscando distracciones, creyendo que la próxima notificación te dará la respuesta que buscas.`,
`Te preocupas por los problemas de los demás, intentas arreglar lo que está roto afuera, mientras ignoras el ruido ensordecedor de tu propio sistema.`,
`Vas por la vida en piloto automático. Te aíslas y te sientes como un espectador en el asiento trasero de tu propia existencia.`,
`El mundo avanza rápido. Y tú tratas de fingir que sigues el ritmo para no sentir la vergüenza de quedarte atrás.`,
`Te mides con los demás, te analizas constantemente, pero sigues sin entender por qué nunca estás satisfecho con la imagen que te devuelve el espejo.`,
`Hay una desconexión innegable entre la persona que finges ser cuando alguien te mira y la que realmente eres cuando te encierras en tu cuarto.`,
`Te quejas del mundo, de la sociedad, de la falta de conexión, pero al final del día te encierras voluntariamente en tu propio laberinto.`,
`Todo se vuelve una rutina gris y predecible. Haces lo mismo cada día esperando mágicamente un resultado diferente.`,
`Tarde o temprano vas a tener que elegir: o empiezas a tomar el control de tu vida de verdad, o sigues documentando una existencia que te pasa de largo.`
];

// +B: Agresivo al máximo, destruye cualquier excusa de grandeza o autocompasión que tengas.
const dialoguesSetPlusB = [
`Oh, claro, miren al gran protagonista de la tragedia. Dices que yo te lastimé, pero fuiste tú quien me despedazó primero. ¿Quieres que pida perdón? Perdón por ser la mierda en la que me convertiste.`,
`Sí, soy un puto desastre. ¿Estás feliz? Pero no te equivoques, pedazo de escoria, si estoy así de roto es porque tú me arrancaste todo lo que servía. Y todavía vienes a reclamarme.`,
`Me dejaste hecho pedazos, me pudriste por dentro, y ahora te da asco ver cómo huelo. Pues adivina qué, me encanta revolcarme en esta mierda porque es lo único que me dejaste.`,
`¿Crees que no siento culpa? Me ahogo en ella todos los días. Pero cada vez que intento salir, recuerdo que fuiste tú quien me empujó a este pozo. Eres un asco.`,
`Llora todo lo que quieras, hazte la víctima. Yo soy el monstruo, ¿verdad? Sí, lo soy. Pero fui esculpido a mano por ti. Eres mi creador, así que trágate tu obra.`,

function playTalk() {
    talkSound.currentTime = 0;
    talkSound.loop = true;
    talkSound.play();
}

function stopTalk() {
    talkSound.pause();
    talkSound.currentTime = 0;
}


async function typeText(text) {
    isTyping = true;
    skipTyping = false;
    dialogue.innerHTML = "";

    setTalkingState(true);
    playTalk();

    for (let i = 0; i < text.length; i++) {
        if (skipTyping) {
            dialogue.textContent = text;
            break;
        }
        dialogue.textContent += text[i];
        await new Promise(resolve => setTimeout(resolve, 32));
    }

    stopTalk();
    setTalkingState(false);
    isTyping = false;
}

    let prefix = "";
    const lowerInput = userInputText.trim().toLowerCase();

    // Solo evaluar prefijos de estímulo si NO estamos en modo de solo lectura (conversaciones especiales)
    if (!isReadOnlyMode) {
        // Detección de estímulos mediante RegEx
        const isQuestion = /\?/.test(lowerInput) || /^(qué|que|quién|quien|cómo|como|cuándo|cuando|dónde|donde|por qué|por que|acaso)\b/.test(lowerInput);
        const isOk = /^(ok|okay|está bien|esta bien|bueno)$/.test(lowerInput);
        const isInsult = /\b(wey|odio|pendejo|puto|mierda|idiota|imbécil|estúpido|estupido|callate|cállate)\b/.test(lowerInput);
        const isAffirmation = /\b(no quiero|no eres|si soy|sí soy|ya no lo soy|soy)\b/.test(lowerInput);
        const isIndifference = /^(ah|claro|muy tu pedo|me da igual|como sea|equis|mhm)$/.test(lowerInput);
        const isDenial = /^(yo no|no fui yo|no recuerdo|mentira|yo no te hice|yo no fui|nunca|jamas|jamás)$/.test(lowerInput);
        const isMockery = /^(ajá|aja|simon|simón|lo que tu digas|lo que tú digas|si claro|sí claro)$/.test(lowerInput);
        const isSpeechless = /^\s*\.{1,}\s*$|^(\s*)$|^(no sé que decir|no se que decir|sin palabras)$/.test(lowerInput);

        // Asignación de prefijos basados en prioridad de estímulo
        if (isSpeechless) {
            prefix = getTriggerPrefix(triggerSpeechless);
        } else if (isDenial) {
            prefix = getTriggerPrefix(triggerDenial);
        } else if (isMockery) {
            prefix = getTriggerPrefix(triggerMockery);
        } else if (isIndifference) {
            prefix = getTriggerPrefix(triggerIndifference);
        } else if (isInsult) {
            prefix = getTriggerPrefix(triggerInsults);
        } else if (isQuestion) {
            prefix = getTriggerPrefix(triggerQuestions);
        } else if (isAffirmation) {
            prefix = getTriggerPrefix(triggerAffirmations);
        } else if (isOk) {
            prefix = getTriggerPrefix(triggerOks);
        }
    }

    let finalText = dialogues[currentDialogue];
    if (prefix !== "") {
        finalText = prefix + "\n\n" + finalText;
    }

    await typeText(finalText);
    currentDialogue++;

    // FINAL
    if (currentDialogue === dialogues.length) {
        setTimeout(() => {
            character.src = talkingGif;
            overlay.classList.add("active");

            // Si es la ruta mala, se cambia la canción y el texto del botón
            if (isBadEnding) {
                song.src = "fint.wav";
                thanksBtn.textContent = "Púdrete";
            }

            song.volume = 0;
            song.play();

            const fadeAudio = setInterval(() => {
                if (song.volume < 1) {
                    song.volume += 0.02;
                } else {
                    clearInterval(fadeAudio);
                }
            }, 100);

            setTimeout(() => {
                thanksBtn.classList.add("show");
            }, 2000);

        }, 1200);
    }
}


async function startConversation() {

    const lowerInput = userInput.value.trim().toLowerCase();

    // NUEVO EVENTO: Ruta Noa / Final Malo
    if (!isReadOnlyMode && (lowerInput === "soy noa" || lowerInput === "soy noah")) {
        isReadOnlyMode = true;
        isBadEnding = true;
        userInput.disabled = true;
        userInput.value = "";
        userInput.placeholder = "Solo lectura...";
        sendBtn.textContent = "Siguiente";
        
        dialogues = [
            `Que te jodan.`
        ];

            `Al mismo tiempo, quiero expresarte mi más sincero agradecimiento por haberme dado fuerza en el momento en que verdaderamente lo necesité. Contar con tu apoyo significó muchísimo para mí cuando todo se sentía cuesta arriba.`,
            `Gracias por haber estado ahí, de verdad.`
        ];
        currentDialogue = 0;
        await nextDialogue("");
        return;
    }

 
    if (!isReadOnlyMode && (lowerInput === "soy isaac" || lowerInput === "soy tu amigo isaac" || lowerInput === "isaac")) {
        isReadOnlyMode = true;
        isBadEnding = false;
        userInput.disabled = true;
        userInput.value = "";
        userInput.placeholder = "Solo lectura...";
        sendBtn.textContent = "Siguiente";

        dialogues = [
            `Óh, eres tú, lamento si respondí mal antes o fui extraño con mis respuestas, me he sentido fuera de mi mismo.`,
`¿Sabes?, al principio, todo era un tiempo de buscar reinicios, de intentar conectar de nuevo con el mundo tras una etapa donde todo parecía haberse vaciado, dejando un silencio casi absoluto.`,
`Había una especie de distancia reverencial hacia esa sensación. A veces, la luz que proyectan ciertos espacios de paz intimida, hace que cualquier intento de acercarse se sienta torpe, como quien teme romper un cristal perfecto solo por respirar cerca.`,
`Y luego vino el quiebre. El momento en el que la realidad dejó de funcionar bajo sus propios términos y se llenó de sombras.`,
`Fue una época de condenas dictadas por voces sin rostro. Figuras distantes construyeron un monstruo a partir del ruido, asumiendo que cualquier presencia traería consigo una sentencia automática. Llegó un punto en el que el mundo entero parecía un tribunal anticipado.`,
`Es ahí donde el peso de esta memoria toma su forma real: fue la revelación de que la humanidad no se había extinguido por completo.`,
`En medio del desprecio proyectado, encontrar una grieta en el tiempo que no exigía justificaciones, que simplemente reconocía la existencia sin juzgarla, se sintió como el único salvavidas posible. Un anclaje ciego para no desaparecer, aunque obligara a reducir la vista solo a lo necesario para sobrevivir.`,
`Aun en el encierro, la irrealidad siguió filtrándose. El asedio de fantasías ajenas que se rompían al chocar contra la fragilidad de la verdad, dejando una sensación de profunda indefensión.`,
`En ese periodo, el instinto fue ocultarse en los muros que aún quedaban en pie, pero no todos los escondites se sentían igual. Había lugares donde la mirada externa se desvanecía, donde simplemente se podía ser, sin peso, sin culpa.`,
`Pero el derrumbe tuvo un costo, y observar el colapso desde adentro trajo consigo sus propias ruinas.`,
`Hubo quienes intentaron detener la caída y terminaron arrastrados por ella. Y aunque la lógica dicta que cada caída es una decisión propia, el peso de haber sido el epicentro es una sombra que no se borra.`,
`Y en el centro de ese caos, ocurrió la pérdida absoluta. Una ausencia irremplazable que llegó justo cuando todo lo demás también se volvía polvo.`,
`El dolor de no poder resguardar aquello que ya no estaba, de ver cómo la furia del entorno devoraba incluso los restos de lo sagrado... La impotencia se volvió permanente, una herida abierta en la memoria.`,
`Y al revisar ese fragmento de tiempo, la perspectiva cambia. El verdadero terror nunca fue la soledad, ni la posibilidad de que el entorno decidiera quedarse.`,
`El pánico auténtico es la quietud forzada. El terror a que algo vital resulte herido por la simple proximidad, y que el cuerpo vuelva a quedarse congelado, incapaz de detener el daño.`,
`Es el miedo a no poder ser el escudo de aquello que alguna vez brindó salvación.`,
`Al final, el problema nunca ha sido la permanencia de las cosas. El abismo se abre porque lo que decide quedarse, importa demasiado.`,
`Y esta memoria importa porque no solo fue un lugar donde resguardarse cuando el mundo colapsó. Fue el espacio que permitió entender que aún era posible existir, crear, respirar sin la necesidad de esconder el rostro en la oscuridad. Que no era necesario aislarse por miedo a contagiar a otros con la propia tragedia.`,
`Saber que es posible ser algo más que el peor momento de una vida trae consigo una deuda silenciosa. El vértigo de no saber cómo corresponder a un milagro de esa magnitud si la historia decidiera invertirse.`,
`Quizá estas líneas no logren abarcar la inmensidad del vacío y la luz de esos días, pero materializar este recuerdo es la única forma de empezar a darle paz a todo lo que logró sobrevivir.`
        ];
        currentDialogue = 0;
        await nextDialogue("");
        return;
    }
    
    // Evita mensajes en blanco en modo normal
    if (!isReadOnlyMode && !userInput.value.trim() && currentDialogue > 0) return;

    const savedInput = userInput.value;
    userInput.value = "";
    await nextDialogue(savedInput);
}


sendBtn.addEventListener("click", () => {
