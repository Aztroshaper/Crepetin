<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CEL</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    width: 100%;
    height: 100vh;
    overflow: hidden;
    font-family: Arial, Helvetica, sans-serif;
    background: url("fon.gif");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    position: relative;
    background-color: #050505; /* Fondo de respaldo */
}

/* CAPA OSCURA */
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(3px);
    z-index: 1;
}

/* BOTON SALIR */
#volver {
    position: fixed;
    top: 20px;
    left: 20px;
    width: 50px;
    height: 50px;
    border: 3px solid white;
    border-radius: 50%;
    background: rgba(0,0,0,0.7);
    color: white;
    font-size: 28px;
    font-weight: bold;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 99999;
    transition: 0.2s;
    cursor: pointer;
}

#volver:hover {
    transform: scale(1.1) rotate(90deg);
    background: white;
    color: black;
}

/* BOTÓN RULETA / CASINO */
#btnRuleta {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    padding: 15px 40px;
    border: 2px solid #fce043;
    border-radius: 30px;
    background: rgba(0, 0, 0, 0.8);
    color: #fce043;
    font-size: 20px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 2px;
    cursor: pointer;
    z-index: 99999;
    transition: all 0.3s ease;
    box-shadow: 0 0 15px rgba(252, 224, 67, 0.4);
}

#btnRuleta:hover {
    background: #fce043;
    color: black;
    box-shadow: 0 0 30px rgba(252, 224, 67, 0.8);
    transform: translateX(-50%) scale(1.05);
}

#btnRuleta:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    pointer-events: none;
}

/* ÁREA 3D */
.orbitArea {
    position: absolute;
    inset: 0;
    perspective: 1000px; /* Profundidad 3D */
    z-index: 5;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* PLANETA AMARILLO */
.planet {
    position: absolute;
    width: 180px;
    height: 180px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #fffbd5, #fce043, #d4af37);
    box-shadow: 0 0 60px #fce043, inset -20px -20px 40px rgba(0,0,0,0.5);
    z-index: 10;
    animation: planetPulse 4s infinite alternate;
}

@keyframes planetPulse {
    0% { box-shadow: 0 0 50px rgba(252, 224, 67, 0.6), inset -20px -20px 40px rgba(0,0,0,0.5); }
    100% { box-shadow: 0 0 90px rgba(252, 224, 67, 1), inset -20px -20px 40px rgba(0,0,0,0.5); }
}

/* MINIATURAS */
.mediaCard {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 200px;
    height: 115px;
    border: 2px solid white;
    background: black;
    box-shadow: 0 0 20px rgba(0,0,0,0.8);
    transition: filter 0.3s, opacity 0.5s;
    cursor: pointer;
    overflow: hidden;
    /* El transform se inyecta por JS */
}

.mediaCard:hover {
    filter: brightness(1.3);
}

/* ESTADO PRO AL SELECCIONAR */
.mediaCard.pro-selected {
    border-color: #fce043;
    box-shadow: 0 0 50px #fce043;
    z-index: 1000;
}

.mediaCard img,
.mediaCard video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    pointer-events: none; /* Para que el click lo registre el div */
}

.mediaLabel {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    padding: 6px;
    background: rgba(0,0,0,0.7);
    color: white;
    font-size: 13px;
    letter-spacing: 1px;
    pointer-events: none;
}

/* MODAL / VISOR */
#viewer {
    pointer-events: none;
    cursor: pointer;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 999999;
    opacity: 0;
    transition: opacity 0.4s ease;
}

.viewerContent {
    cursor: default;
    position: relative;
    width: 90%;
    max-width: 1100px;
    display: flex;
    justify-content: center;
    align-items: center;
}

#mainVideo,
#mainImage {
    width: 100%;
    max-height: 88vh;
    border: 3px solid #fce043;
    box-shadow: 0 0 40px rgba(252, 224, 67, 0.3);
    background: black;
    object-fit: contain;
}

#mainImage {
    display: none;
}

.closeViewer {
    position: absolute;
    top: -60px;
    right: 0;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    border: 3px solid white;
    background: black;
    color: white;
    font-size: 28px;
    font-weight: bold;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: 0.2s;
    cursor: pointer;
}

.closeViewer:hover {
    transform: rotate(90deg) scale(1.1);
    background: white;
    color: black;
}

@media(max-width: 700px) {
    .mediaCard { width: 140px; height: 80px; }
    .planet { width: 120px; height: 120px; }
    #btnRuleta { font-size: 16px; padding: 12px 30px; }
}
</style>
</head>
<body>

<div class="overlay"></div>

<button id="volver" onclick="cerrarPagina()">✕</button>

<div class="orbitArea" id="orbitContainer">
    <div class="planet"></div>
</div>

<button id="btnRuleta" onclick="iniciarRuleta()">Orbitar 🎲</button>

<div id="viewer">
    <div class="viewerContent">
        <button class="closeViewer" onclick="closeViewer()">✕</button>
        <video id="mainVideo" controls></video>
        <img id="mainImage">
    </div>
</div>

<script>
/* DATOS MULTIMEDIA ORIGINALES */
const mediaItems = [
    { type: 'video', src: 'found.mp4', label: 'Encuentro' },
    { type: 'video', src: 'ayuda.mp4', label: 'Vista' },
    { type: 'video', src: 'eci.mp4', label: 'Éxilio' },
    { type: 'video', src: 'star.mp4', label: 'star.mp4' },
    { type: 'video', src: 'quiero.mp4', label: 'Noche 1' },
    { type: 'image', src: 'hallazgo.jpg', label: 'Centro' },
    { type: 'image', src: 'hombre.jpg', label: 'Escondite' },
    { type: 'image', src: 'foto3.jpg', label: 'foto3.jpg' }
];

/* ESTADO DEL SISTEMA */
let indicesDisponibles = mediaItems.map((_, i) => i); // [0,1,2...]
let anguloGlobal = 0;
const velocidadNormal = 0.2;
let velocidadActual = velocidadNormal;
let radioOrbita = window.innerWidth < 700 ? 200 : 380; 

let estado = 'normal'; // normal, acelerando, frenando, presentacion
let indiceObjetivo = -1;
let anguloObjetivo = 0;
const elementosDOM = [];

const orbitContainer = document.getElementById('orbitContainer');
const btnRuleta = document.getElementById('btnRuleta');

/* GENERAR ELEMENTOS EN EL DOM */
mediaItems.forEach((item, i) => {
    let card = document.createElement('div');
    card.className = 'mediaCard';
    
    // Ángulo base inicial (distribución equitativa en 360 grados)
    let anguloBase = i * (360 / mediaItems.length);
    
    if(item.type === 'video') {
        card.innerHTML = `
            <video muted playsinline autoplay loop preload="metadata">
                <source src="${item.src}" type="video/mp4">
            </video>
            <div class="mediaLabel">${item.label}</div>`;
    } else {
        card.innerHTML = `
            <img src="${item.src}">
            <div class="mediaLabel">${item.label}</div>`;
    }
    
    // Abrir manualmente si estamos en estado normal
    card.onclick = () => {
        if(estado === 'normal') openViewer(item);
    };
    
    orbitContainer.appendChild(card);
    elementosDOM.push({ el: card, anguloBase: anguloBase, data: item });
});

/* BUCLE DE ANIMACIÓN 3D PRO */
function renderLoop() {
    // 1. Lógica de estados y velocidades
    if (estado === 'normal') {
        anguloGlobal += velocidadActual;
    } 
    else if (estado === 'acelerando') {
        velocidadActual = Math.min(velocidadActual + 0.4, 30); // Acelera hasta 30 grados/frame (fuerte)
        anguloGlobal += velocidadActual;
    } 
    else if (estado === 'frenando') {
        // Interpolación (Lerp) hacia el ángulo de destino para un frenado suave
        let diferencia = anguloObjetivo - anguloGlobal;
        anguloGlobal += diferencia * 0.04; 
        
        // Si ya casi llegamos, detener y activar presentación
        if (Math.abs(diferencia) < 0.5) {
            anguloGlobal = anguloObjetivo;
            estado = 'presentacion';
            activarAnimacionPro();
        }
    }

    // 2. Aplicar matemáticas a cada tarjeta (Translación radial con compensación 3D)
    elementosDOM.forEach((obj, i) => {
        let anguloActual = obj.anguloBase + anguloGlobal;
        
        let scale = 1;
        let opacity = 1;
        let zOffset = 0; // Efecto de acercamiento a la cámara

        if (estado === 'presentacion') {
            if (i === indiceObjetivo) {
                scale = 1.8; // Escala gigante para el ganador
                zOffset = 100;
            } else {
                scale = 0.5;
                opacity = 0.2; // Ocultar los perdedores
            }
        }

        // Magia 3D: Rotamos, empujamos hacia afuera, y rotamos al revés para que SIEMPRE miren al usuario
        obj.el.style.transform = `
            translate(-50%, -50%) 
            rotateY(${anguloActual}deg) 
            translateZ(${radioOrbita}px) 
            rotateY(${-anguloActual}deg) 
            scale(${scale}) 
            translateZ(${zOffset}px)
        `;
        obj.el.style.opacity = opacity;
    });

    requestAnimationFrame(renderLoop);
}

// Iniciar el render
requestAnimationFrame(renderLoop);

/* LÓGICA DE LA MÁQUINA DE CASINO (RULETA) */
function iniciarRuleta() {
    if (estado !== 'normal') return;

    // Reiniciar lista si ya mostramos todos
    if (indicesDisponibles.length === 0) {
        indicesDisponibles = mediaItems.map((_, i) => i);
    }

    btnRuleta.disabled = true;
    btnRuleta.innerText = "Calculando...";

    // Seleccionar uno aleatorio de los disponibles
    let randomSlot = Math.floor(Math.random() * indicesDisponibles.length);
    indiceObjetivo = indicesDisponibles[randomSlot];
    
    // Removerlo de los disponibles para no repetirlo hasta el reinicio
    indicesDisponibles.splice(randomSlot, 1);

    estado = 'acelerando';

    // Dejar girar rapido 2.5 segundos, luego calcular donde frenar
    setTimeout(() => {
        let baseDelElegido = elementosDOM[indiceObjetivo].anguloBase;
        
        // Queremos que anguloBase + anguloGlobal = múltiplo de 360 (para que quede frente a la cámara)
        // Agregamos rotaciones extra para que frene progresivamente
        let rotacionesExtra = Math.ceil(anguloGlobal / 360) + 2; 
        anguloObjetivo = (rotacionesExtra * 360) - baseDelElegido;
        
        estado = 'frenando';
    }, 2500);
}

function activarAnimacionPro() {
    btnRuleta.innerText = "¡Encontrado!";
    
    let elementoElegido = elementosDOM[indiceObjetivo].el;
    elementoElegido.classList.add('pro-selected'); // Añade glow amarillo brillante

    // Darle 1.5 segundos al usuario para asimilarlo antes de abrir la pantalla completa
    setTimeout(() => {
        openViewer(elementosDOM[indiceObjetivo].data);
    }, 1500);
}

/* SISTEMA DEL VISOR MODAL */
const viewer = document.getElementById('viewer');
const mainVideo = document.getElementById('mainVideo');
const mainImage = document.getElementById('mainImage');

function openViewer(item) {
    viewer.style.display = 'flex';
    viewer.style.pointerEvents = 'all';
    
    // Pequeño timeout para la transición de opacidad de CSS
    setTimeout(() => { viewer.style.opacity = '1'; }, 10);

    if (item.type === 'video') {
        mainImage.style.display = 'none';
        mainVideo.style.display = 'block';
        mainVideo.pause();
        mainVideo.src = item.src;
        mainVideo.load();
        setTimeout(() => { mainVideo.play().catch(()=>{}); }, 100);
    } else {
        mainVideo.pause();
        mainVideo.removeAttribute('src');
        mainVideo.style.display = 'none';
        
        mainImage.style.display = 'block';
        mainImage.src = item.src;
    }
}

function closeViewer() {
    viewer.style.opacity = '0';
    viewer.style.pointerEvents = 'none';
    
    // Pausar media
    mainVideo.pause();
    mainVideo.currentTime = 0;

    // Restaurar órbita
    setTimeout(() => {
        viewer.style.display = 'none';
        if(indiceObjetivo !== -1 && elementosDOM[indiceObjetivo]) {
            elementosDOM[indiceObjetivo].el.classList.remove('pro-selected');
        }
        
        estado = 'normal';
        velocidadActual = velocidadNormal;
        
        btnRuleta.disabled = false;
        btnRuleta.innerText = "Orbitar 🎲";
    }, 400); // 400ms hace match con la transición CSS
}

/* MANTENER TAMAÑO RESPONSIVO AL CAMBIAR VENTANA */
window.addEventListener('resize', () => {
    radioOrbita = window.innerWidth < 700 ? 200 : 380;
});

/* BOTON SALIR GENERAL */
function cerrarPagina() {
    window.close();
    setTimeout(() => { history.back(); }, 200);
}

/* ATAJOS TECLADO Y CLICK FUERA */
window.addEventListener('keydown', (e) => {
    if(e.key === 'Escape' && viewer.style.display === 'flex') {
        closeViewer();
    }
});

viewer.addEventListener('click', (e) => {
    if(e.target === viewer) closeViewer();
});
</script>
</body>
</html>
