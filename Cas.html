<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CASSANDRA COSMOS</title>

<style>

@keyframes vignetteFlicker{
0%{opacity:.88;}
50%{opacity:.95;}
100%{opacity:.9;}
}

@keyframes noiseMove{
0%{transform:translate(0,0);}
10%{transform:translate(-2%,-3%);}
20%{transform:translate(3%,2%);}
30%{transform:translate(-1%,4%);}
40%{transform:translate(1%,-2%);}
50%{transform:translate(-3%,1%);}
60%{transform:translate(4%,0);}
70%{transform:translate(0,3%);}
80%{transform:translate(-2%,1%);}
90%{transform:translate(2%,-2%);}
100%{transform:translate(0,0);}
}

@keyframes scanlines{
0%{background-position:0 0;}
100%{background-position:0 100vh;}
}

@keyframes rgbShift{
0%{transform:translateX(0);}
25%{transform:translateX(.5px);}
50%{transform:translateX(-.5px);}
75%{transform:translateX(.4px);}
100%{transform:translateX(0);}
}

body{
animation:rgbShift .08s infinite;
}

/* VIÑETA */
body::before{
content:"";
position:fixed;
inset:0;
pointer-events:none;
z-index:9998;
background:
radial-gradient(circle,
transparent 35%,
rgba(0,0,0,.25) 55%,
rgba(0,0,0,.75) 78%,
rgba(0,0,0,.95) 100%);
mix-blend-mode:multiply;
animation:vignetteFlicker 2s infinite;
}

/* VHS NOISE */
body::after{
content:"";
position:fixed;
inset:-20%;
pointer-events:none;
z-index:9999;
opacity:.16;
background:url("https://i.imgur.com/8KrmP.gif");
background-size:cover;
mix-blend-mode:screen;
animation:noiseMove .4s infinite;
}

/* SCANLINES */
#scanlines{
position:fixed;
inset:0;
pointer-events:none;
z-index:9997;
background:
repeating-linear-gradient(
to bottom,
rgba(255,255,255,.03) 0px,
rgba(255,255,255,.03) 1px,
transparent 2px,
transparent 4px
);
opacity:.25;
animation:scanlines 8s linear infinite;
mix-blend-mode:overlay;
}

/* VHS FLASH */
#flash{
position:fixed;
inset:0;
pointer-events:none;
z-index:9996;
background:rgba(255,255,255,.02);
mix-blend-mode:overlay;
}

</style>

</head>

<body style="
margin:0;
overflow:hidden;
background:#050505;
font-family:Courier New, monospace;
height:100vh;
color:white;
">

<div id="scanlines"></div>
<div id="flash"></div>

<!-- AUDIO -->
<audio id="bgMusic" loop>
<source src="tarot.mp3" type="audio/mpeg">
</audio>

<!-- FONDO -->
<div style="
position:fixed;
inset:0;
background:
linear-gradient(rgba(0,0,0,.84), rgba(0,0,0,.92)),
url('casfo.gif');
background-size:cover;
background-position:center;
filter:contrast(1.15) saturate(.8) brightness(.85);
"></div>

<!-- LLUVIA -->
<div id="rain"></div>

<!-- BOTON VOLVER -->
<button onclick="window.close()" style="
position:fixed;
top:20px;
right:20px;
z-index:50;
background:rgba(0,0,0,.65);
border:1px solid #777;
color:#ddd;
padding:10px 18px;
cursor:pointer;
font-size:15px;
letter-spacing:1px;
backdrop-filter:blur(4px);
">
VOLVER
</button>

<!-- GIF DERECHA -->
<img id="oracleGif"
src="cas1.gif"
style="
position:fixed;
right:0;
bottom:0;
height:100%;
width:38%;
object-fit:cover;
opacity:.92;
pointer-events:none;
filter:
brightness(.7)
contrast(1.2)
saturate(.7)
blur(.2px);
mix-blend-mode:screen;
">

<!-- DESVANECER -->
<div style="
position:fixed;
right:38%;
top:0;
width:240px;
height:100%;
background:linear-gradient(to right, transparent, rgba(0,0,0,.95));
pointer-events:none;
"></div>

<!-- PANEL -->
<div style="
position:absolute;
left:60px;
top:50%;
transform:translateY(-50%);
width:45%;
z-index:3;
">

<div style="
border:2px solid #666;
padding:28px;
background:rgba(0,0,0,.52);
backdrop-filter:blur(3px);
box-shadow:0 0 30px rgba(255,255,255,.05);
">

<div style="
font-size:35px;
letter-spacing:4px;
color:#e6c189;
margin-bottom:12px;
text-shadow:
0 0 10px rgba(255,210,120,.25),
2px 0 rgba(255,0,0,.18),
-2px 0 rgba(0,120,255,.18);
">
CASSANDRA COSMOS
</div>


<div style="
font-size:18px;
line-height:1.8;
color:#d2d2d2;
min-height:80px;
text-shadow:
1px 0 rgba(255,0,0,.12),
-1px 0 rgba(0,120,255,.12);
">
Inserta una moneda para consultar la fortuna.
</div>

<div style="
display:flex;
align-items:center;
gap:20px;
margin-top:30px;
">

<button id="coinBtn" style="
background:#b88a45;
border:none;
padding:15px 30px;
font-size:18px;
font-weight:bold;
cursor:pointer;
color:black;
box-shadow:0 0 20px rgba(255,190,100,.25);
transition:.2s;
">
INSERTAR MONEDA
</button>

<div id="coins" style="
font-size:18px;
color:#f0d2a2;
">
MONEDAS: 3
</div>

</div>

</div>
</div>

<!-- ESPACIO DIALOGO -->
<div style="
position:fixed;
left:40px;
bottom:35px;
width:52%;
height:180px;
z-index:20;
pointer-events:none;
">

<!-- DIALOGO -->
<div id="dialogueBox" style="
display:none;
width:100%;
background:rgba(0,0,0,.9);
border:2px solid #777;
padding:20px;
pointer-events:auto;
box-shadow:0 0 25px rgba(255,255,255,.06);
">

<div style="
font-size:20px;
color:#e2b577;
margin-bottom:14px;
text-shadow:
2px 0 rgba(255,0,0,.18),
-2px 0 rgba(0,120,255,.18);
">
CASSANDRA COSMOS
</div>

<div id="dialogueText" style="
font-size:19px;
line-height:1.8;
color:#d9d9d9;
min-height:80px;
white-space:pre-wrap;
text-shadow:
1px 0 rgba(255,0,0,.14),
-1px 0 rgba(0,120,255,.14);
">
</div>

<div style="
display:flex;
justify-content:flex-end;
margin-top:14px;
">

<button id="okBtn" style="
background:#1d1d1d;
border:1px solid #666;
color:#ddd;
padding:10px 25px;
cursor:pointer;
display:none;
">
OKAY
</button>

</div>

</div>
</div>

<script>

const fortunes = [

[
"Las luces del bulevar Independencia volverán a encenderse durante 3 minutos exactos.",
"Una figura sin rostro te observará desde lo alto, quizás un edificio abandonado.",
"Deberías intentar recordar quién eras antes de la lluvia."
],

[
"Un teatro derrumbado conservará aún el olor del óleo húmedo.",
"Escucharás aplausos aunque el edificio esté vacío.",
"El artista desaparecido todavía sigue dentro del escenario."
],

[
"Ten cuidado, se empieza a murmurar tu nombre de nuevo.",
"Pero tú, durante unos segundos olvidarás cuál era tu nombre original.",
"Después de eso, la ciudad comenzará a reconocerte."
],

[
"Las escuelas de arte abrirán una sola noche.",
"Los pasillos estarán llenos de esculturas hechas con algo que nunca debió tocarse.",
"Al amanecer nadie recordará haber entrado."
],

[
"Encontrarás una cinta etiquetada como 'la obra más humana posible'.",
"La grabación estará destruida excepto por una respiración.",
"No intentes verla, o él la reproducirá una y otra vez."
],

[
"Un periódico mojado hablará de un eclipse inexistente.",
"Las fotografías mostrarán personas que nunca nacieron.",
"Tu rostro aparecerá en una esquina del archivo."
],

[
"La lluvia comenzará a caer dentro de los edificios.",
"Las computadoras viejas intentarán rezar.",
"Algo responderá desde los drenajes."
],

[
"Rostros luminosos aprenderán tu voz.",
"Cada palabra que digas será repetida horas después.",
"Entonces comprenderás que la ciudad te escucha."
],

[
"Una galería abandonada conservará cuadros que cambian de forma.",
"Los visitantes saldrán llorando sin saber por qué.",
"Alguien con susurros llamará a eso arte auténtico."
],

[
"Los perros callejeros seguirán a alguien invisible.",
"En sus ojos aparecerán reflejos de estrellas artificiales.",
"La lluvia habrá regresado al desierto."
],

[
"Una estación de radio transmitirá recuerdos humanos comprimidos.",
"Escucharás conversaciones que nunca ocurrieron.",
"Al final reconocerás una voz muy cercana a la tuya."
],

[
"Torreón perderá partes de sí misma.",
"Calles enteras serán reemplazadas por océanos negros.",
"Victor insistirá en que siempre estuvieron ahí."
],

[
"Encontrarás un museo construido debajo de un estacionamiento.",
"Las esculturas estarán hechas con órganos impresos.",
"El guardia dirá que todavía respiran."
],

[
"Una inteligencia artificial aprenderá a sentir culpa.",
"Intentará disculparse usando canciones viejas.",
"Nadie comprenderá el mensaje excepto tú."
],

[
"Las estrellas falsas del domo central comenzarán a apagarse.",
"Por primera vez aparecerá el cielo real.",
"Victor tendrá miedo de mirarlo."
]

];

const dialogueBox = document.getElementById("dialogueBox");
const dialogueText = document.getElementById("dialogueText");
const okBtn = document.getElementById("okBtn");
const coinBtn = document.getElementById("coinBtn");
const coinsText = document.getElementById("coins");
const oracleGif = document.getElementById("oracleGif");
const bgMusic = document.getElementById("bgMusic");

const idleGif =
"cas1.gif";

const activeGif =
"cas2.gif";

let coins = 3;
let currentFortune = null;
let currentLine = 0;
let introFinished = false;
let locked = true;

function typeWriter(text, callback){

dialogueText.innerHTML = "";
okBtn.style.display = "none";

let i = 0;

const interval = setInterval(() => {

dialogueText.innerHTML += text.charAt(i);

i++;

if(i >= text.length){

clearInterval(interval);

okBtn.style.display = "block";

if(callback) callback();

}

}, 28);

}

function openDialogue(text){

dialogueBox.style.display = "block";

typeWriter(text);

}

function closeDialogue(){

dialogueBox.style.display = "none";

}

// INTRO
openDialogue(
"Bienvenido, hoy exploraremos la fortuna esta eterna lluvia."
);

okBtn.onclick = () => {

closeDialogue();

if(!introFinished){

bgMusic.volume = 0.45;
bgMusic.play();

introFinished = true;
locked = false;

}

};

// INSERTAR MONEDA

coinBtn.onclick = () => {

if(locked) return;

if(coins <= 0){

locked = true;

openDialogue(
"Oh lo siento...\nparece que ya no tienes monedas, vuelve mañana para saber más."
);

okBtn.onclick = () => {

closeDialogue();
locked = false;

};

return;

}

coins--;

coinsText.innerHTML = "MONEDAS: " + coins;

oracleGif.src = activeGif;

if(currentFortune === null){

currentFortune =
fortunes[Math.floor(Math.random()*fortunes.length)];

currentLine = 0;

}

locked = true;

openDialogue(currentFortune[currentLine]);

currentLine++;

okBtn.onclick = () => {

closeDialogue();

locked = false;

oracleGif.src = idleGif;

};

if(currentLine >= currentFortune.length){

currentFortune = null;
currentLine = 0;

}

};

// LLUVIA

const rain = document.getElementById("rain");

for(let i=0;i<170;i++){

const drop = document.createElement("div");

drop.style.position = "fixed";
drop.style.width = "1px";
drop.style.height = Math.random()*18+10+"px";
drop.style.background = "rgba(180,180,255,.18)";
drop.style.left = Math.random()*100+"%";
drop.style.top = "-20px";
drop.style.opacity = Math.random();

drop.style.animation =
`fall ${Math.random()*1+.8}s linear infinite`;

drop.style.animationDelay =
Math.random()*2+"s";

rain.appendChild(drop);

}

const style = document.createElement("style");

style.innerHTML = `

@keyframes fall{
to{
transform:translateY(110vh);
}
}

button:hover{
transform:scale(1.04);
filter:brightness(1.1);
}

`;

document.head.appendChild(style);

</script>

</body>
</html>
